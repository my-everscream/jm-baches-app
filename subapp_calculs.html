<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JM Bâches — Volets PVC & Poly — Fiches de production</title>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F4F4F2; --paper:#FFFFFF; --ink:#16181D; --ink-soft:#565A63; --ink-faint:#8B8F98;
    --border:#E2E3E6; --border-strong:#C7C9CE; --accent:#1B5FCC; --accent-deep:#14479B;
    --navy:#1B5FCC; --teal:#4E9D8E; --teal-deep:#3A7A6E; --cream:#EAF0F9; --charcoal:#1C1E22;
    --ok:#2F7D5B; --ok-bg:#E4F0EA; --bad:#C0392B; --bad-bg:#F8E6E3;
    --ease:cubic-bezier(0.22,0.61,0.36,1);
    --shadow-sm:0 1px 2px rgba(22,24,29,.04),0 1px 3px rgba(22,24,29,.05);
    --shadow-md:0 2px 6px rgba(22,24,29,.06),0 4px 14px rgba(22,24,29,.06);
    --shadow-lg:0 6px 18px rgba(22,24,29,.10),0 12px 40px rgba(22,24,29,.10);
    --ring:0 0 0 3px rgba(27,95,204,.18);
  }
  *{ -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; text-rendering:optimizeLegibility; }
  body{ background:var(--bg); color:var(--ink); font-family:'DM Sans',system-ui,sans-serif; margin:0; }
  .font-display{ font-family:'JetBrains Mono',monospace; font-weight:700; letter-spacing:-0.01em; }
  .font-mono{ font-family:'JetBrains Mono',monospace; font-variant-numeric:tabular-nums; }
  .stripe{ background:repeating-linear-gradient(45deg,rgba(27,95,204,0.07),rgba(27,95,204,0.07) 8px,transparent 8px,transparent 16px); }
  .diamond-sep{ color:rgba(255,255,255,0.35); font-size:9px; }
  .label-cap{ font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--ink-faint); font-weight:600; font-family:'JetBrains Mono',monospace; }

  .card{ background:var(--paper); border:1px solid var(--border); border-radius:4px; box-shadow:var(--shadow-sm); }
  .btn-primary{ background:var(--charcoal); color:#fff; padding:10px 18px; border-radius:3px; font-weight:500; font-size:14px; display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; border:none; box-shadow:var(--shadow-sm); transition:background .2s var(--ease),transform .2s var(--ease),box-shadow .2s var(--ease); font-family:inherit; }
  .btn-primary:hover{ background:#000; transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .btn-accent{ background:var(--accent); color:#fff; padding:10px 18px; border-radius:3px; font-weight:500; font-size:14px; display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; border:none; box-shadow:var(--shadow-sm); transition:background .2s var(--ease),transform .2s var(--ease),box-shadow .2s var(--ease); font-family:inherit; }
  .btn-accent:hover{ background:var(--accent-deep); transform:translateY(-1px); box-shadow:var(--shadow-md); }
  .btn-accent:disabled{ opacity:.5; cursor:wait; transform:none; }
  .btn-secondary{ background:transparent; color:var(--ink); padding:9px 16px; border-radius:3px; font-weight:500; font-size:14px; border:1px solid var(--border-strong); display:inline-flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; transition:background .2s var(--ease),border-color .2s var(--ease),transform .2s var(--ease); font-family:inherit; }
  .btn-secondary:hover{ background:var(--cream); border-color:var(--accent); transform:translateY(-1px); }

  input[type=text],input[type=number]{ background:var(--paper); border:1px solid var(--border); border-radius:3px; padding:9px 11px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--ink); width:100%; box-sizing:border-box; transition:border-color .2s var(--ease),box-shadow .2s var(--ease); }
  input:hover{ border-color:var(--border-strong); }
  input:focus{ outline:none; border-color:var(--accent); box-shadow:var(--ring); }
  .unit{ position:relative; } .unit input{ padding-right:34px; }
  .unit span{ position:absolute; right:11px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--ink-faint); font-family:'JetBrains Mono',monospace; }

  .switch{ position:relative; width:38px; height:21px; background:var(--border-strong); border-radius:20px; transition:background .18s; flex:none; }
  .switch::after{ content:""; position:absolute; top:2px; left:2px; width:17px; height:17px; background:#fff; border-radius:50%; transition:transform .18s; box-shadow:0 1px 2px rgba(0,0,0,.25); }
  .toggle input{ display:none; } .toggle input:checked + .switch{ background:var(--accent); } .toggle input:checked + .switch::after{ transform:translateX(17px); }

  .chip{ font-size:12px; border:1px solid var(--border-strong); border-radius:20px; padding:6px 12px; cursor:pointer; background:var(--paper); color:var(--ink-soft); transition:all .15s; user-select:none; font-weight:500; }
  .chip.on{ background:var(--accent); border-color:var(--accent); color:#fff; } .chip input{ display:none; }

  .seg{ display:flex; border:1px solid var(--border-strong); border-radius:3px; overflow:hidden; }
  .seg label{ flex:1; text-align:center; font-size:12px; padding:7px 4px; cursor:pointer; color:var(--ink-soft); background:var(--paper); transition:all .15s; font-weight:500; }
  .seg label.on{ background:var(--accent); color:#fff; font-weight:600; } .seg input{ display:none; }

  /* matière (nav charcoal) */
  .matnav{ background:var(--charcoal); border-bottom:3px solid var(--accent); }
  .mattab{ padding:13px 22px; font-family:'JetBrains Mono',monospace; text-transform:uppercase; font-size:14px; letter-spacing:.08em; white-space:nowrap; cursor:pointer; color:rgba(255,255,255,0.55); background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-3px; transition:color .15s; font-weight:600; }
  .mattab:hover{ color:#fff; }
  .mattab.on{ color:#fff; font-weight:800; border-bottom-color:var(--accent); }

  /* types (sous-onglets) */
  .subnav{ display:flex; gap:2px; overflow-x:auto; border-bottom:1px solid var(--border); }
  .subtab{ padding:9px 14px; font-size:13px; font-weight:600; white-space:nowrap; cursor:pointer; color:var(--ink-soft); background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s; font-family:inherit; }
  .subtab:hover{ color:var(--ink); }
  .subtab.on{ color:var(--accent-deep); border-bottom-color:var(--accent); }

  .fiche{ background:var(--paper); border:1px solid var(--border); border-radius:4px; overflow:hidden; box-shadow:var(--shadow-md); }
  .fiche-head{ background:var(--charcoal); color:#fff; padding:18px 22px; display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
  .fiche-head .meta{ text-align:right; font-size:11px; line-height:1.85; color:rgba(255,255,255,0.55); }
  .fiche-head .meta b{ color:#fff; font-family:'JetBrains Mono',monospace; font-weight:600; }

  .badges{ display:flex; gap:10px; padding:14px 22px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
  .badge{ display:flex; align-items:center; gap:9px; border-radius:4px; padding:8px 13px; font-size:13px; font-weight:600; border:1px solid; }
  .badge .lab{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.12em; text-transform:uppercase; font-weight:600; opacity:.75; }
  .badge .stk{ display:flex; flex-direction:column; line-height:1.3; }
  .badge.ok{ background:var(--ok-bg); border-color:#BBD9C8; color:var(--ok); }
  .badge.bad{ background:var(--bad-bg); border-color:#E6BDB6; color:var(--bad); }
  .badge.info{ background:var(--cream); border-color:#C3D5EE; color:var(--accent-deep); }

  .sect{ padding:16px 22px; border-bottom:1px solid var(--border); } .sect:last-child{ border-bottom:none; }
  .sect-h{ font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:9px; }
  .sect-h .n{ width:18px; height:18px; border-radius:3px; background:var(--accent); color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px; font-family:'JetBrains Mono',monospace; font-weight:700; }

  .kv{ display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:4px; overflow:hidden; }
  .kv.c2{ grid-template-columns:repeat(2,1fr); } .kv.c4{ grid-template-columns:repeat(4,1fr); }
  .kv .cell{ background:var(--paper); padding:11px 13px; }
  .kv .cell .k{ font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--ink-faint); letter-spacing:.06em; margin-bottom:4px; text-transform:uppercase; }
  .kv .cell .val{ font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700; color:var(--ink); line-height:1; letter-spacing:-.01em; }
  .kv .cell .val .u{ font-size:11px; color:var(--ink-faint); font-weight:400; margin-left:3px; }
  .kv .cell.hl{ background:var(--charcoal); } .kv .cell.hl .k{ color:rgba(255,255,255,0.5); } .kv .cell.hl .val{ color:#fff; } .kv .cell.hl .val .u{ color:rgba(255,255,255,0.5); }

  table.ref{ width:100%; border-collapse:collapse; font-size:13px; }
  table.ref th{ text-align:left; font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); font-weight:600; padding:6px 10px; border-bottom:1px solid var(--border-strong); }
  table.ref th.r,table.ref td.v{ text-align:right; }
  table.ref td{ padding:8px 10px; border-bottom:1px solid var(--border); }
  table.ref tr:last-child td{ border-bottom:none; }
  table.ref td.v{ font-family:'JetBrains Mono',monospace; font-weight:700; font-size:15px; width:96px; }
  table.ref td .tag{ display:inline-block; font-family:'JetBrains Mono',monospace; font-size:9px; background:var(--cream); color:var(--accent-deep); border-radius:3px; padding:1px 6px; margin-left:6px; letter-spacing:.04em; font-weight:600; }
  .faisa{ font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; }
  .faisa.ok{ background:var(--ok-bg); color:var(--ok); } .faisa.bad{ background:var(--bad-bg); color:var(--bad); }

  .opt-pill{ font-size:12px; border:1px solid var(--border-strong); border-radius:3px; padding:5px 11px; color:var(--ink-soft); background:var(--bg); font-weight:500; }
  .opt-none{ font-size:12px; color:var(--ink-faint); font-style:italic; }
  .empty{ color:var(--ink-faint); font-style:italic; font-size:13px; padding:26px; text-align:center; }
  .note{ font-size:11px; color:var(--ink-faint); margin-top:10px; line-height:1.5; }
  .evi{ font-family:'JetBrains Mono',monospace; font-weight:700; color:var(--ink); background:transparent; border:1px solid transparent; border-radius:4px; text-align:right; width:100%; max-width:120px; padding:1px 4px; -moz-appearance:textfield; }
  .evi:hover{ border-color:var(--border); }
  .evi:focus{ outline:none; border-color:var(--accent); background:#fff; }
  .evi.ov{ color:var(--accent); background:rgba(27,95,204,0.06); }
  .evi::-webkit-outer-spin-button,.evi::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .kv .cell .val .evi{ font-size:20px; max-width:none; }
  .kv .cell.hl .val .evi{ color:#fff; } .kv .cell.hl .val .evi.ov{ color:#fff; background:rgba(255,255,255,0.18); }
  table.ref .evi{ font-size:14px; display:inline-block; }
  @media print { .evi{ border-color:transparent !important; background:transparent !important; padding:0; } }
  /* Wrapper EVal avec bouton reset flottant */
  .evi-wrap{ position:relative; display:inline-flex; align-items:center; }
  .evi-wrap .evi-reset{ display:none; position:absolute; right:-16px; top:50%; transform:translateY(-50%); width:14px; height:14px; border-radius:50%; background:var(--accent); color:#fff; font-size:9px; line-height:14px; text-align:center; cursor:pointer; border:none; padding:0; font-family:inherit; flex:none; }
  .evi-wrap:hover .evi-reset.visible{ display:flex; align-items:center; justify-content:center; }
  .kv .cell .val .evi-wrap{ width:100%; }
  .kv .cell .val .evi-wrap .evi{ max-width:none; width:100%; }
  .kv .cell .val .evi-wrap .evi-reset{ right:-18px; }
  @media print { .evi-wrap .evi-reset{ display:none !important; } }
  /* Accordion escalier */
  .acc-header{ display:flex; align-items:center; justify-content:space-between; cursor:pointer; padding:10px 12px; border-radius:6px; background:var(--bg); border:1px solid var(--border); margin-bottom:6px; user-select:none; transition:background .15s; }
  .acc-header:hover{ background:var(--cream); border-color:var(--accent); }
  .acc-header .acc-title{ font-size:11px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; color:var(--ink-soft); font-family:'JetBrains Mono',monospace; }
  .acc-header .acc-chev{ font-size:11px; color:var(--ink-faint); transition:transform .2s; }
  .acc-header.open .acc-chev{ transform:rotate(180deg); }
  .acc-body{ overflow:hidden; transition:max-height .25s var(--ease); }
  .acc-body.open{ max-height:2000px; }
  .acc-body.closed{ max-height:0; }
  .print-only{ display:none; }
  /* Import PDF */
  .pdf-import-btn{ width:100%; padding:11px 16px; border:2px dashed var(--border-strong); border-radius:6px; background:var(--bg); color:var(--ink-soft); font-size:13px; font-weight:600; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:all .18s; font-family:inherit; }
  .pdf-import-btn:hover{ border-color:var(--accent); color:var(--accent); background:var(--cream); }
  .pdf-import-btn:disabled{ opacity:.5; cursor:wait; }
  /* Modal confirmation import */
  .modal-overlay{ position:fixed; inset:0; background:rgba(22,24,29,0.55); z-index:100; display:flex; justify-content:center; align-items:flex-start; padding:40px 16px; overflow-y:auto; }
  .modal-box{ background:var(--paper); border-radius:6px; box-shadow:var(--shadow-lg); max-width:580px; width:100%; }
  .modal-head{ background:var(--charcoal); color:#fff; padding:16px 20px; border-radius:6px 6px 0 0; display:flex; justify-content:space-between; align-items:center; }
  .modal-head h2{ font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:.08em; text-transform:uppercase; margin:0; font-weight:700; }
  .modal-body{ padding:20px; max-height:65vh; overflow-y:auto; }
  .modal-foot{ padding:14px 20px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }
  .import-field{ display:flex; align-items:center; justify-content:space-between; padding:9px 12px; border-radius:4px; border:1px solid var(--border); margin-bottom:6px; font-size:13px; }
  .import-field .ikey{ color:var(--ink-faint); font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.06em; text-transform:uppercase; min-width:140px; }
  .import-field .ival{ font-weight:700; color:var(--ink); font-family:'JetBrains Mono',monospace; font-size:13px; }
  .import-field.found{ background:var(--ok-bg); border-color:#BBD9C8; }
  .import-field.empty{ background:var(--bg); opacity:.6; }
  .import-section{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-faint); font-weight:600; margin:14px 0 7px; }
  /* Clé API setting */
  .api-key-row{ display:flex; gap:8px; align-items:center; }
  .api-key-row input{ flex:1; font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.04em; }

  @media print{
    @page{ size:A4 portrait; margin:12mm; }
    html,body{ background:#fff !important; }
    .print-only{ display:flex !important; }
    *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
    .no-print{ display:none !important; }

    /* neutraliser les conteneurs de mise en page écran */
    .max-w-6xl{ max-width:none !important; margin:0 !important; padding:0 !important; }
    .grid{ display:block !important; }

    /* la fiche occupe toute la largeur de la page */
    #fiche-print{ width:100% !important; border:1px solid #000 !important; box-shadow:none !important; border-radius:0 !important; }
    .card,.btn-primary,.btn-accent,.btn-secondary{ box-shadow:none !important; }

    /* éviter les coupures malheureuses */
    .fiche-head{ -webkit-print-color-adjust:exact; }
    .sect{ break-inside:avoid; page-break-inside:avoid; }
    .kv,.badge,table.ref tr{ break-inside:avoid; page-break-inside:avoid; }
    table.ref thead{ display:table-header-group; }
    .badges{ break-inside:avoid; }

    /* compacter légèrement pour tenir sur une page */
    .sect{ padding:11px 18px; }
    .kv .cell{ padding:8px 11px; }
    .kv .cell .val{ font-size:17px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useMemo} = React;
const fmt=(n,dec=2)=>{ if(n===null||n===undefined||isNaN(n)) return "—"; const r=Math.round(n*Math.pow(10,dec))/Math.pow(10,dec); return r.toLocaleString('fr-FR',{maximumFractionDigits:dec}); };
const num=v=>(v===""||v===null||v===undefined||isNaN(parseFloat(v)))?null:parseFloat(v);
const espVis=p=>{ if(p===null) return null; const e=p-16; const k=Math.ceil(e/50); return (k>0)?e/k:null; };
const fpCeil=x=>Math.ceil(Math.round(x*1e6)/1e6);
// Pas de lame utilisé dans les calculs escalier : 74 mm = 7,4 cm.
// On l'utilise aussi pour le tablier afin d'éviter l'ancienne approximation longueur*0.14.
const LAME_PITCH_CM=7.4;
const calcNbLames=longueurCm=>(longueurCm!=null)?fpCeil(longueurCm/LAME_PITCH_CM):null;
const calcNbFagots=nbLames=>(nbLames!=null)?fpCeil(nbLames/3):null;
// Stockage : localStorage (marche en fichier local) avec repli window.storage si présent
const store={
  key:k=>'jmbaches_volets_'+k,
  async get(k){
    try{ const v=localStorage.getItem(store.key(k)); if(v!=null) return v; }catch(e){}
    try{ if(window.storage&&window.storage.get){ const r=await window.storage.get(k); return r&&r.value!=null?r.value:null; } }catch(e){}
    return null;
  },
  async set(k,v){
    let ok=false;
    try{ localStorage.setItem(store.key(k),v); ok=true; }catch(e){}
    try{ if(window.storage&&window.storage.set){ await window.storage.set(k,v); ok=true; } }catch(e){}
    return ok;
  }
};

const Icon={
  printer:(p)=>(<svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>),
  download:(p)=>(<svg width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>),
};

const TYPES=[
  {id:'hors_sol',     label:'Hors sol',      base:'Volet hors sol',      margelles:false, debord:false, caillebotis:false, m2:98},
  {id:'mouv',         label:'Mouv & Roll',   base:'Volet Mouv en Roll',  margelles:true,  debord:false, caillebotis:false, m2:null},
  {id:'nouveau_mouv', label:'Nouveau Mouv',  base:'Volet Nouveau Mouv',  margelles:true,  debord:false, caillebotis:false, m2:98},
  {id:'banc',         label:'Banc',          base:'Volet Banc',          margelles:true,  debord:false, caillebotis:false, m2:null},
  {id:'immerge',      label:'Immergé',       base:'Volet immergé',       margelles:false, debord:true,  caillebotis:true,  m2:72},
  {id:'immerge_total',label:'Immergé total', base:'Volet immergé total', margelles:false, debord:false, caillebotis:false, m2:60},
];

function compute(material,type,f){
  const poly=material==='poly';
  const T=TYPES.find(t=>t.id===type);
  const max=num(f.largeurMax), mini=num(f.largeurMini), lon=num(f.longueur);
  const marg=(num(f.largeurMargelles)!=null ? num(f.largeurMargelles) : (T.margelles ? 33 : null)), debord=num(f.debordMargelles)||0, cailLarg=num(f.largeurCaillebotis);
  const escLon=num(f.longueurEscalier), escLar=num(f.largeurEscalier);
  const diag=(max!=null&&lon!=null)?Math.sqrt(max*max+lon*lon):null;
  const m2=(T.m2!=null&&max!=null&&lon!=null)?max*lon/10000:null;
  const m2ok=(m2!=null)?m2<=T.m2:null;

  // lames + conformité
  let coupees,finies,confRef,lamesMm;
  if(poly){
    lamesMm=true;
    if(type==='immerge'||type==='immerge_total'){ coupees=(mini!=null)?(mini-7)*10-4:null; confRef=(mini!=null)?mini-5:null; }
    else { coupees=(mini!=null)?(mini-6)*10-4:null; confRef=(mini!=null)?mini-4:null; }
    finies=(coupees!=null)?coupees+24:null;
  } else {
    lamesMm=false;
    if(type==='immerge'){ coupees=(mini!=null)?mini-6:null; finies=(coupees!=null)?coupees+2:null; confRef=(mini!=null)?mini-5:null; }
    else if(type==='immerge_total'){ coupees=(mini!=null)?mini-6:null; finies=(coupees!=null)?coupees+2:null; confRef=finies; }
    else { coupees=(mini!=null)?mini-5:null; finies=(coupees!=null)?coupees+2:null; confRef=finies; }
  }
  const f15=(max!=null&&confRef!=null)?max-confRef:null;
  const conforme=(f15!=null)?f15<=7:null;
  const nbLames=calcNbLames(lon);
  const nbFagots=calcNbFagots(nbLames);

  // escalier
  const escMm = poly ? true : (type==='immerge');
  let escCoupees,escFinies;
  if(escMm){ escCoupees=(escLar!=null)?(escLar-6)*10-4:null; escFinies=(escCoupees!=null)?escCoupees+24:null; }
  else { escCoupees=(escLar!=null)?escLar-5:null; escFinies=(escCoupees!=null)?escCoupees+2:null; }
  const escLames=calcNbLames(escLon);
  const escFagots=calcNbFagots(escLames);

  // bloc spécifique
  let block=null;
  if(type==='hors_sol'){
    block={kind:'axes', rows:(max!=null)?[
      {label:'Axe margelles + de 25 cm', tag:'200S · 120bd', v:max+20},
      {label:'Axe margelles − de 25 cm', tag:'200S · 120bd', v:max+15},
      {label:'Axe moteur C80 / C120 · margelles +25', v:max+15},
      {label:'Axe moteur C80 / C120 · margelles −25', v:max+10},
      {label:'Axe avec bite', tag:'COVEO', v:max+10},
    ]:null};
  } else if(type==='mouv'||type==='nouveau_mouv'||type==='banc'){
    const ok=(max!=null&&marg!=null);
    let primary,rows,faisa=null,title;
    if(type==='mouv'){
      const cC=ok?2*marg+25+max:null, cE=ok?marg+10+max:null;
      title='Moteur Unicum − 8,5 cm'; primary={label:'Contre-axe', c:cC, e:cE};
      rows=[ {label:'Moteur 80/120 b avec pièce débrayable', c:cC!=null?cC-28:null, e:cE!=null?cE-28:null},
             {label:'Axe moteur', tag:'COVEO', c:cC!=null?cC-25.5:null, e:cE!=null?cE-25.5:null},
             {label:'Axe moteur débrayable', c:cC!=null?cC-24.5:null, e:cE!=null?cE-24.5:null},
             {label:'Axe moteur avec bite', c:cC!=null?cC-35.5:null, e:cE!=null?cE-35.5:null} ];
    } else if(type==='nouveau_mouv'){
      const cC=ok?max+2*marg+17:null, cE=ok?max+marg+2:null;
      title='Moteur Unicum − 8,5 cm'; primary={label:'Contre-axe', c:cC, e:cE};
      faisa={c:cC!=null?cC<=600:null, e:cE!=null?cE<=600:null};
      rows=[ {label:'Axe moteur 80s / 120 Becker', c:cC!=null?cC-16.5:null, e:cE!=null?cE-16.5:null},
             {label:'Axe moteur', tag:'COVEO', c:cC!=null?cC-18.5:null, e:cE!=null?cE-18.5:null},
             {label:'Axe moteur débrayable', c:cC!=null?cC-17.5:null, e:cE!=null?cE-17.5:null},
             {label:'Axe moteur avec bite', c:cC!=null?cC-28.5:null, e:cE!=null?cE-28.5:null} ];
    } else {
      const cC=ok?max+2*marg+30:null, cE=ok?max+marg+10:null;
      title='Coffre & poutre'; primary={label:'Poutre ×2', c:cC, e:cE};
      faisa={c:cC!=null?cC<=600:null, e:cE!=null?cE<=600:null};
      rows=[ {label:'Lames de coffre ×5', c:cC!=null?cC-1:null, e:cE!=null?cE-1:null},
             {label:'Axe moteur', tag:'COVEO', c:cC!=null?cC-26.5:null, e:cE!=null?cE-26.5:null} ];
    }
    block={kind:'moteurs', title, primary, rows, faisa};
  } else if(type==='immerge'){
    const ok=(max!=null);
    const pp=(mini!=null)?(poly?mini-2:mini-1)-2*debord:null;
    const plg=(mini!=null)?(poly?mini-3:mini-7):null;
    // Caillebotis immergé : calcul autonome et robuste.
    // La longueur utilise la largeur max si elle existe, sinon la largeur mini.
    // PVC dépend uniquement du nombre de paquets : il ne doit pas être bloqué par la largeur caillebotis.
    const cailBase=(max!=null)?max:mini;
    const cailLong=(cailBase!=null)?cailBase-2.5-2*debord:null;
    const cailL=(cailLarg!=null)?cailLarg-debord:null;
    const paquets=(cailLong!=null)?cailLong/60:null;
    const pvc=(paquets!=null)?paquets*5:null;
    const nbLames600=(pvc!=null&&paquets!=null&&cailL!=null)?(pvc*cailL/600)+(paquets*58/600):null;
    block={kind:'immerge', axe:ok?max-18:null, vis62:62, visA:ok?max/2-10:null, visB:ok?max-82:null,
      poutreParoi:pp, espVisParoi:espVis(pp), poutrePlage:plg, espVisPlage:espVis(plg),
      cloison:(mini!=null)?mini-1.5:null, cailLong, cailL, paquets, pvc, nbLames600,
      cailBaseMissing:(cailBase==null), cailLargMissing:(cailLarg==null)};
  } else if(type==='immerge_total'){
    const base = poly ? mini : max;
    const ok=(base!=null);
    const caillebotis=ok?base-0.5:null, paquets=(caillebotis!=null)?caillebotis/60:null, pvc=(paquets!=null)?paquets*5:null;
    block={kind:'immerge_total', axe:ok?base-18:null, vis62:62, visA:ok?base/2-10:null, visB:ok?base-82:null,
      poutre:ok?base-4:null, cloison:ok?base-2:null, caillebotis, paquets, pvc,
      lames725:(pvc!=null)?pvc*72.5/600:null, robinier:(paquets!=null)?paquets*6:null, ipe:(paquets!=null)?paquets*4:null};
  }
  return {T,poly,max,mini,lon,m2,m2ok,diag,coupees,finies,conforme,f15,nbLames,nbFagots,lamesMm,escMm,escCoupees,escFinies,escFagots,block};
}

function validate(type,T,f){
  const w=[]; const max=num(f.largeurMax),mini=num(f.largeurMini),lon=num(f.longueur),
    marg=num(f.largeurMargelles),deb=num(f.debordMargelles),cail=num(f.largeurCaillebotis),
    eLon=num(f.longueurEscalier),eLar=num(f.largeurEscalier);
  const neg=(v,n)=>{ if(v!=null&&v<0) w.push(n+" est négative."); };
  neg(max,"La largeur max"); neg(mini,"La largeur mini"); neg(lon,"La longueur");
  neg(marg,"La largeur margelles"); neg(deb,"Le débord margelles"); neg(cail,"La largeur caillebotis");
  if(max!=null&&mini!=null&&mini>max) w.push("La largeur mini ("+fmt(mini)+") est supérieure à la largeur max ("+fmt(max)+").");
  if(max!=null&&max===0) w.push("La largeur max est à 0.");
  if(T.margelles&&marg!=null&&marg<=0&&(max!=null||mini!=null)) w.push("La largeur margelles est à 0.");
  if(f.hasEscalier){
    neg(eLon,"La longueur escalier"); neg(eLar,"La largeur escalier");
    if((eLon!=null&&eLon>0)&&(eLar==null||eLar===0)) w.push("Longueur escalier saisie mais largeur escalier manquante.");
    if((eLar!=null&&eLar>0)&&(eLon==null||eLon===0)) w.push("Largeur escalier saisie mais longueur escalier manquante.");
    if(eLar!=null&&mini!=null&&eLar>mini) w.push("La largeur escalier ("+fmt(eLar)+") dépasse la largeur mini du bassin.");
  }
  return w;
}

function MoteurTable({block,axeChoisi,poseAxes,EVal}){
  const pose=(poseAxes==='sans')?'sans':'sur';
  const key=pose==='sans'?'c':'e';
  const suffix=pose==='sans'?'c':'e';
  const head=pose==='sans'?'Sans margelles':'Sur margelles';
  const selRaw=(axeChoisi==null||axeChoisi==='all')?null:String(axeChoisi);
  const sel=(selRaw!==null && Number(selRaw)<block.rows.length)?selRaw:null;
  const Cell=({v,id})=> <td className="v">{EVal?<EVal id={id} v={v} dec={1}/>:fmt(v)}</td>;
  return (
    <table className="ref">
      <thead><tr><th>{block.title}</th><th className="r">{head}</th></tr></thead>
      <tbody>
        <tr style={{background:'var(--cream)'}}>
          <td style={{fontWeight:700}}>{block.primary.label}</td>
          <Cell v={block.primary[key]} id={'motP'+suffix}/>
        </tr>
        {block.faisa && (
          <tr>
            <td>Faisabilité <span style={{color:'var(--ink-faint)',fontSize:11}}>(≤ 600)</span></td>
            <td className="v">{block.faisa[key]===null?'—':<span className={"faisa "+(block.faisa[key]?'ok':'bad')}>{block.faisa[key]?'FAISABLE':'NON FAIS.'}</span>}</td>
          </tr>
        )}
        {block.rows.map((r,i)=>(
          (sel===null||String(i)===sel) &&
          <tr key={i}><td>{r.label}{r.tag&&<span className="tag">{r.tag}</span>}</td><Cell v={r[key]} id={'mot'+i+suffix}/></tr>
        ))}
      </tbody>
    </table>
  );
}

const EMPTY_ESC={ ref:"",numero:"", material:"pvc", shape:"droit", family:"equerre", edge:"vif",
  // DROIT
  largeur:"", profG:"", profD:"",
  rGd:"",rGf:"",rDd:"",rDf:"",                                   // droit arrondi
  cGd1:"",cGd2:"",cGf1:"",cGf2:"",cDd1:"",cDd2:"",cDf1:"",cDf2:"", // droit pans coupés
  // TRAPÈZE  (X1..X6 saisis ; X7,X8 calculés)
  tX1:"",tX2:"",tX3:"",tX4:"",tX5:"",tX6:"",
  tR2:"",tR3:"",tR4:"",tR5:"",                                   // trapèze arrondi (R gauche-fin / gauche-début / droite-début / droite-fin)
  tcR3a:"",tcR3b:"",tcR2a:"",tcR2b:"",tcR4a:"",tcR4b:"",tcR5a:"",tcR5b:"", // trapèze pans coupés (prof/larg)
  // ROMAN  (X2,X5,X6 saisis ; Rayon calculé)
  rX2:"",rX5:"",rX6:"",
  roH17:"",roH18:"",                                            // roman arrondi (gauche / droite)
  roM17a:"",roM17b:"",roM18a:"",roM18b:"",                    // roman pans coupés (prof/larg)
  // ANGLE BASSIN (coins) : mode + cotes des 4 coins (A,B,C,D)
  bassinAngle:"vif",                                            // vif | arrondi | coupe
  abA:"",abB:"",abC:"",abD:"",                                  // arrondi : rayon de chaque coin (G6..G9)
  acA1:"",acA2:"",acB1:"",acB2:"",acC1:"",acC2:"",acD1:"",acD2:"" }; // pans coupés : a1/a2 de chaque coin (M/O 6..9)
const clamp1=x=>Math.max(-1,Math.min(1,x));
const sinacos=x=>Math.sin(Math.acos(clamp1(x)));
const cosasin=x=>Math.cos(Math.asin(clamp1(x)));

const ESC_GEO_KEYS=['largeur','profG','profD','rGd','rGf','rDd','rDf','cGd1','cGd2','cGf1','cGf2','cDd1','cDd2','cDf1','cDf2','tX1','tX2','tX3','tX4','tX5','tX6','tR2','tR3','tR4','tR5','tcR3a','tcR3b','tcR2a','tcR2b','tcR4a','tcR4b','tcR5a','tcR5b','rX2','rX5','rX6','roH17','roH18','roM17a','roM17b','roM18a','roM18b','abA','abB','abC','abD','acA1','acA2','acB1','acB2','acC1','acC2','acD1','acD2'];
function escInputsToMm(f){ const o={...f}; ESC_GEO_KEYS.forEach(k=>{ const v=o[k]; if(v!==''&&v!=null&&!isNaN(parseFloat(v))) o[k]=String(parseFloat(v)*10); }); return o; }
function escResultToCm(c){ if(!c||!c.ready) return c; const d=x=>(x==null?x:x/10);
  return {...c, longEsc:d(c.longEsc), wStart:d(c.wStart), wEnd:d(c.wEnd),
    deriv:c.deriv?Object.fromEntries(Object.entries(c.deriv).map(([k,v])=>[k,d(v)])):c.deriv,
    lames:(c.lames||[]).map(L=>({...L,T:d(L.T),X:d(L.X),AA:d(L.AA),AB:d(L.AB)}))}; }

function computeEsc(f){
  const fam=f.family, edge=f.edge, shape=f.shape||'droit', mat=f.material||'pvc';
  const PM=ESC_PARAMS_MAT[mat]||ESC_PARAMS_MAT.pvc;
  const P=PM[fam]||PM.equerre;
  let g=null;
  if(shape==='droit'){
    const largeur=num(f.largeur),profG=num(f.profG),profD=num(f.profD);
    if(largeur==null||profG==null||profD==null||largeur<=0) return {ready:false};
    const longEsc=Math.max(profG,profD);
    g={longEsc,end:longEsc,profG,profD,width:T=>(T<longEsc?largeur:0),wStart:largeur,wEnd:largeur};
  } else if(shape==='trapeze'){
    const X1=num(f.tX1),X2=num(f.tX2),X3=num(f.tX3),X4=num(f.tX4),X5=num(f.tX5),X6=num(f.tX6);
    if([X1,X2,X3,X4,X5,X6].some(v=>v==null)||X6<=0) return {ready:false};
    const X7=(X2+X3+X5)-(X1+X4);
    const X8=Math.sqrt(X6*X6+(X4-X5)*(X4-X5));
    g={longEsc:Math.max(X6,X8),end:X6,X1,X2,X3,X4,X5,X6,X7,X8,
       width:T=>(T<X6? X7+(X3-X7)/X6*T : 0), wStart:X7, wEnd:X3};
  } else { // roman
    const X2=num(f.rX2),X5=num(f.rX5),X6=num(f.rX6)||0;
    if(X2==null||X5==null||X5<=0) return {ready:false};
    const R=(((X2/2)*(X2/2)/X5)+X5)/2, end=X5+X6;
    g={longEsc:end,end,X2,X5,X6,R,
       width:T=>(T<X5? 2*Math.sqrt(Math.max(0,T*(2*R-T))) : (T<=end? X2 : 0)), wStart:0, wEnd:X2};
  }
  const pitch=P.lame, lames=[], LGMIN=500;
  const bAngle=f.bassinAngle||'vif';
  function bassinRetrait(side,T){
    if(bAngle==='vif') return 0;
    if(bAngle==='arrondi'){
      const r=side==='G'?(num(f.abC)||0):(num(f.abD)||0);
      if(r<=0) return 0;
      return T<=r ? r*(1-cosasin((r-T)/r)) : 0;
    } else {
      const m=side==='G'?(num(f.acC1)||0):(num(f.acD1)||0);
      const o=side==='G'?(num(f.acC2)||0):(num(f.acD2)||0);
      if(m<=0) return 0;
      return T<=m ? o*(1-(T/m)) : 0;
    }
  }
  const isPleines=fam==='pleines';
  let baseOffset=0;
  if(isPleines){ baseOffset=pitch; }
  else if(shape==='roman'){ const R=g.R; const b=R*(1-Math.sqrt(Math.max(0,1-(LGMIN*LGMIN)/(4*R*R)))); baseOffset=(b<g.longEsc)?b:0; }
  let prevU=null;
  for(let n=1;n<=600;n++){
    const T=baseOffset+(n-1)*pitch;
    let U=g.width(T);
    const bG=bassinRetrait('G',T), bD=bassinRetrait('D',T);
    if(U>0){ U=U-bG-bD; }
    if(!(U>0)) break;
    let V=0,W=0;
    if(edge!=='vif'){
      if(shape==='droit'){
        const {profG,profD,end}=g;
        if(edge==='arrondi'){
          const rGd=num(f.rGd)||0,rGf=num(f.rGf)||0,rDd=num(f.rDd)||0,rDf=num(f.rDf)||0;
          if(rGd>0&&T<rGd) V=rGd*(1-sinacos(1-T/rGd));
          else if(rGf>0&&T>end-rGf&&T<=end) V=-(rGf*(1-cosasin((T-(profG-rGf))/rGf)));
          if(rDd>0&&T<rDd) W=rDd*(1-sinacos(1-T/rDd));
          else if(rDf>0&&T>end-rDf&&T<=end) W=-(rDf*(1-cosasin((T-(profD-rDf))/rDf)));
        } else {
          const Gd1=num(f.cGd1)||0,Gd2=num(f.cGd2)||0,Gf1=num(f.cGf1)||0,Gf2=num(f.cGf2)||0,
                Dd1=num(f.cDd1)||0,Dd2=num(f.cDd2)||0,Df1=num(f.cDf1)||0,Df2=num(f.cDf2)||0;
          if(Gd1>0&&T<Gd1) V=Gd2/Gd1*(Gd1-T);
          else if(Gf1>0&&T>end-Gf1&&T<=end) V=-(Gf2/Gf1*(T-(profG-Gf1)));
          if(Dd1>0&&T<Dd1) W=Dd2/Dd1*(Dd1-T);
          else if(Df1>0&&T>end-Df1&&T<=end) W=-(Df2/Df1*(T-(profD-Df1)));
        }
      } else if(shape==='trapeze'){
        const {X1,X2,X4,X5,X6}=g;
        const aL=Math.atan(X6/((X1-X2)||1e-9)), aR=Math.atan(X6/((X4-X5)||1e-9));
        if(edge==='arrondi'){
          const R3=num(f.tR3)||0,R2=num(f.tR2)||0,R4=num(f.tR4)||0,R5=num(f.tR5)||0;
          if(R3>0&&T<(1-Math.cos(aL))*R3) V=(Math.sin(aL)*R3)-(((1-Math.cos(aL))*R3-T)/Math.tan(aL))-(sinacos(1-T/R3)*R3);
          else if(R2>0&&T>X6-(1-Math.cos(aL))*R2&&T<=X6) V=-((Math.sin(aL)*R2)-(((1-Math.cos(aL))*R2-(X6-T))/Math.tan(aL))-(sinacos(1-(X6-T)/R2)*R2));
          if(R4>0&&T<(1-Math.cos(aR))*R4) W=(Math.sin(aR)*R4)-(((1-Math.cos(aR))*R4-T)/Math.tan(aR))-(sinacos(1-T/R4)*R4);
          else if(R5>0&&T>X6-(1-Math.cos(aR))*R5&&T<=X6) W=-((Math.sin(aR)*R5)-(((1-Math.cos(aR))*R5-(X6-T))/Math.tan(aR))-(sinacos(1-(X6-T)/R5)*R5));
        } else {
          const R3a=num(f.tcR3a)||0,R3b=num(f.tcR3b)||0,R2a=num(f.tcR2a)||0,R2b=num(f.tcR2b)||0,
                R4a=num(f.tcR4a)||0,R4b=num(f.tcR4b)||0,R5a=num(f.tcR5a)||0,R5b=num(f.tcR5b)||0;
          if(R3a>0&&T<R3a) V=R3b-(R3b/R3a*T)-(R3a-T)/Math.tan(aL);
          else if(R2a>0&&T>X6-R2a&&T<=X6) V=-(R2b-(R2b/R2a*(X6-T))-(R2a-(X6-T))/Math.tan(aL));
          if(R4a>0&&T<R4a) W=R4b-(R4b/R4a*T)-(R4a-T)/Math.tan(aR);
          else if(R5a>0&&T>X6-R5a&&T<=X6) W=-(R5b-(R5b/R5a*(X6-T))-(R5a-(X6-T))/Math.tan(aR));
        }
      } else { // roman
        const end=g.end;
        if(edge==='arrondi'){
          const H17=num(f.roH17)||0,H18=num(f.roH18)||0;
          if(H17>0&&T>end-H17&&T<=end) V=-(H17*(1-cosasin((T-(end-H17))/H17)));
          if(H18>0&&T>end-H18&&T<=end) W=-(H18*(1-cosasin((T-(end-H18))/H18)));
        } else {
          const M17=num(f.roM17a)||0,O17=num(f.roM17b)||0,M18=num(f.roM18a)||0,O18=num(f.roM18b)||0;
          if(M17>0&&T>end-M17&&T<=end) V=-(O17/M17*(T-(end-M17)));
          if(M18>0&&T>end-M18&&T<=end) W=-(O18/M18*(T-(end-M18)));
        }
      }
    }
    const X=U-V-W;
    let AA,AB;
    if(isPleines){
      // Excel, feuille Lames colonnes Y/Z :
      // - en trapèze/roman, les extrémités sont libres ;
      // - en droit, une extrémité est bouchonnée si la largeur de la lame suivante est identique
      //   et si le bord correspondant est vif.
      let y=false,z=false;
      if(shape==='droit'){
        const Tnext=baseOffset+n*pitch;
        let Unext=g.width(Tnext);
        const bGn=bassinRetrait('G',Tnext), bDn=bassinRetrait('D',Tnext);
        if(Unext>0){ Unext=Unext-bGn-bDn; }
        const sameNext=(U!==0 && Math.abs((Unext||0)-U)<1e-9);
        y=sameNext && V===0;
        z=sameNext && W===0;
      }
      const freeEnds=(y?0:1)+(z?0:1);
      const blockedEnds=(y?1:0)+(z?1:0);
      AA=X - P.jeu + (P.surlong/2)*freeEnds;
      AB=AA - (P.bouchon+P.balais-5)*blockedEnds;
    } else if(fam==='lisse'){
      AA=X-P.jeu;
      AB=AA-2*(P.bouchon+P.lamelle);
    } else { // equerre
      AA=X-P.jeu;
      AB=AA-2*(P.bouchon+P.balais-5);
    }
    lames.push({n,T,X,AA,AB});
    prevU=U;
  }
  // Lame de raccord de fond (uniquement en lames pleines, ajoutée après la dernière lame de corps)
  if(isPleines && lames.length>0){
    const freeEnds=2;
    let fond=0, extra=0;
    if(shape==='trapeze'){
      fond=(g.X3!=null?g.X3:0);                              // X3 (grande largeur, côté fond)
      if(edge==='arrondi') extra=(num(f.tR5)||0)+(num(f.tR2)||0);   // Z19+Z16
      else if(edge==='coupe') extra=(num(f.tcR2b)||0)+(num(f.tcR5b)||0); // AF16+AF19
    } else if(shape==='roman'){
      fond=(g.X2!=null?g.X2:0);                              // X2 (largeur)
      if(edge==='arrondi') extra=(num(f.roH17)||0)+(num(f.roH18)||0);
      else if(edge==='coupe') extra=(num(f.roM17b)||0)+(num(f.roM18b)||0);
    } else { // droit
      fond=(g.profG!=null? (num(f.largeur)||0) :0);          // largeur (T31)
      if(edge==='arrondi') extra=(num(f.rGd)||0)+(num(f.rDf)||0);
      else if(edge==='coupe') extra=(num(f.cGd2)||0)+(num(f.cDf2)||0);
    }
    const AAr=(-P.jeu + (P.surlong/2)*freeEnds) + fond + extra;
    lames.push({n:lames.length+1, T:null, X:0, AA:AAr, AB:AAr, raccord:true});
  }
  // Alarmes (reprises de la feuille DONNEES de l'Excel, adaptées aux cotes disponibles)
  const alarms=[];
  const wMin=Math.min(g.wStart||0,g.wEnd||0), wMax=Math.max(g.wStart||0,g.wEnd||0);
  if(wMax>0){
    if(Math.abs((g.wStart||0)-(g.wEnd||0))>100) alarms.push("Écart de largeur début/fin élevé (>10 cm) — vérifier la saisie.");
    if(wMin>0 && wMin<2000) alarms.push("Largeur escalier faible (<200 cm) — à vérifier.");
    if(wMax>8500) alarms.push("Largeur escalier importante (>850 cm) — à vérifier.");
  }
  if(bAngle!=='vif'){
    const angVals=bAngle==='arrondi'
      ? [num(f.abC)||0,num(f.abD)||0]
      : [num(f.acC1)||0,num(f.acC2)||0,num(f.acD1)||0,num(f.acD2)||0];
    const amax=Math.max(0,...angVals);
    if(amax>0 && amax<30) alarms.push("Angle de bassin très faible (<3 cm) — passer en angle vif ?");
    if(amax>1500) alarms.push("Angle de bassin élevé (>150 cm) — vérifier la saisie.");
  }
  if(count_check(lames)>=600) alarms.push("Plus de 600 lames calculées — vérifier les cotes (longueur anormale).");
  return {ready:true,shape,longEsc:g.longEsc,wStart:g.wStart,wEnd:g.wEnd,
    deriv: shape==='trapeze'?{X7:g.X7,X8:g.X8}:(shape==='roman'?{R:g.R}:null),
    pitch,family:fam,edge,count:lames.length,lames,alarms};
}
function count_check(a){ return a.length; }

// ===== BLOC FILTRATION =====
function computeBlocFiltration(f, material){
  const ecartG = num(f.bfEcartG), largBloc = num(f.bfLargeurBloc), ecartD = num(f.bfEcartD), prof = num(f.bfProfondeur);
  if(ecartG==null || ecartD==null || prof==null || prof<=0) return {ready:false};
  const mat = material||'pvc';
  const fam = f.family||'equerre';
  const PM = ESC_PARAMS_MAT[mat]||ESC_PARAMS_MAT.pvc;
  const P = PM[fam]||PM.equerre;
  const pitch = P.lame; // mm

  // Calcul cotes pour une largeur nette donnée (en cm → mm)
  function calcCotes(largCm){
    const largMm = largCm * 10;
    let AA, AB;
    if(fam==='lisse'){
      AA = largMm - P.jeu;
      AB = AA - 2*(P.bouchon + P.lamelle);
    } else {
      AA = largMm - P.jeu;
      AB = AA - 2*(P.bouchon + P.balais - 5);
    }
    return {AA:AA/10, AB:AB/10};
  }

  const cotesG = calcCotes(ecartG);
  const cotesD = calcCotes(ecartD);

  // Nombre de lames : profondeur (cm→mm) / pitch
  const profMm = prof * 10;
  const nbEntier = Math.floor(profMm / pitch);
  const reste = profMm - nbEntier * pitch;
  const hasRaccord = reste > 0.5;

  // Vérification : écart G + A + écart D = largeur bassin
  const largBassin = num(f.largeurMax);
  const somme = ecartG + (largBloc||0) + ecartD;
  const verifOk = (largBloc!=null && largBassin!=null) ? Math.abs(somme - largBassin) < 0.5 : null;

  return {
    ready:true, ecartG, largBloc, ecartD, prof,
    pitch: pitch/10,
    nbCorps: nbEntier,
    hasRaccord,
    G: cotesG,
    D: cotesD,
    somme, largBassin, verifOk,
  };
}

        <div className="cell"><div className="k">Largeur début</div><div className="val">{fmt(c.wStart,1)}<span className="u">cm</span></div></div>
        <div className="cell"><div className="k">Largeur fin</div><div className="val">{fmt(c.wEnd,1)}<span className="u">cm</span></div></div>

        <div className="cell"><div className="k">Forme escalier</div><div className="val" style={{fontSize:14}}>{shapeLabel}</div></div>
        <div className="cell"><div className="k">Famille lames</div><div className="val" style={{fontSize:14}}>{familyLabel}</div></div>
        <div className="cell"><div className="k">Bord lames</div><div className="val" style={{fontSize:14}}>{edgeLabel}</div></div>
      </div>
      {c.deriv && c.shape==='trapeze' &&
        <div className="kv" style={{marginTop:8}}>
          <div className="cell"><div className="k">X7 (calculé)</div><div className="val">{fmt(c.deriv.X7,1)}<span className="u">cm</span></div></div>
          <div className="cell"><div className="k">X8 (calculé)</div><div className="val">{fmt(c.deriv.X8,1)}<span className="u">cm</span></div></div>
        </div>}
      {c.deriv && c.shape==='roman' &&
        <div className="kv" style={{marginTop:8}}>
          <div className="cell"><div className="k">Rayon (calculé)</div><div className="val">{fmt(c.deriv.R,1)}<span className="u">cm</span></div></div>
        </div>}
    </div>
    {c.alarms && c.alarms.length>0 &&
      <div className="sect" style={{background:'var(--bad-bg)',borderColor:'#E6BDB6'}}>
        <div className="sect-h" style={{color:'var(--bad)'}}><span className="n" style={{background:'var(--bad)'}}>!</span>Alarmes escalier</div>
        <ul style={{margin:'4px 0 0',paddingLeft:18,fontSize:12.5,color:'var(--bad)',lineHeight:1.6}}>
          {c.alarms.map((a,i)=><li key={i}>{a}</li>)}
        </ul>
      </div>}
    <div className="sect">
      <div className="sect-h"><span className="n">★</span>Escalier · Débit lame par lame</div>
      {(()=>{
        // Pour l'escalier droit : regrouper les lames de corps identiques (même AB arrondi à 0.1)
        const isDroit = c.shape==='droit';
        if(!isDroit){
          // Trapèze / Roman : affichage normal
          return (<>
            <table className="ref">
              <thead><tr><th>Lame</th><th className="r">Position</th><th className="r">Largeur nette</th><th className="r">Cote coupe</th><th className="r">Cote finie</th></tr></thead>
              <tbody>
                {c.lames.map(L=>(
                  <tr key={L.n}><td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{L.n}{L.raccord?' R':''}</td>
                    <td className="v" style={{fontWeight:400}}>{L.T==null?'—':fmt(L.T,1)}</td>
                    <td className="v">{fmt(L.X,1)}</td>
                    <td className="v"><EV id={'escC'+L.n} v={L.AB} dec={1}/></td>
                    <td className="v"><EV id={'escF'+L.n} v={L.AA} dec={1}/></td></tr>
                ))}
              </tbody>
            </table>
            <div className="note">Cotes en cm. Lame « R » = lame de raccord de fond.</div>
          </>);
        }
        // Droit : regrouper par cote coupe identique (arrondie à 0.1)
        const key=L=>L.raccord?'R':Math.round((L.AB||0)*10)+'_'+Math.round((L.AA||0)*10);
        const groupes=[];
        const seen={};
        c.lames.forEach(L=>{
          const k=key(L);
          if(!seen[k]){
            seen[k]={...L, count:1, ns:[L.n]};
            groupes.push(seen[k]);
          } else {
            seen[k].count++;
            seen[k].ns.push(L.n);
          }
        });
        const standard=groupes.filter(g=>!g.raccord && g.count>1);
        const speciales=groupes.filter(g=>g.raccord || g.count===1);
        return (<>
          {standard.length>0 && (<>
            <div style={{marginBottom:6,fontSize:12,fontWeight:600,color:'var(--ink-soft)'}}>Lames standard</div>
            <table className="ref" style={{marginBottom:10}}>
              <thead><tr><th className="r">Quantité</th><th className="r">Largeur nette</th><th className="r">Cote coupe</th><th className="r">Cote finie</th></tr></thead>
              <tbody>
                {standard.map((g,i)=>(
                  <tr key={i}>
                    <td className="v" style={{fontWeight:700,fontSize:15}}>{g.count}<span style={{fontSize:11,fontWeight:400,color:'var(--ink-soft)'}}> lames</span></td>
                    <td className="v">{fmt(g.X,1)}</td>
                    <td className="v"><EV id={'escCg'+i} v={g.AB} dec={1}/></td>
                    <td className="v"><EV id={'escFg'+i} v={g.AA} dec={1}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </>)}
          {speciales.length>0 && (<>
            <div style={{marginBottom:6,fontSize:12,fontWeight:600,color:'var(--ink-soft)'}}>Lames spécifiques</div>
            <table className="ref">
              <thead><tr><th>Lame</th><th className="r">Largeur nette</th><th className="r">Cote coupe</th><th className="r">Cote finie</th></tr></thead>
              <tbody>
                {speciales.map((g,i)=>(
                  <tr key={i}>
                    <td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>
                      {g.raccord ? 'R' : (g.ns.length===1 ? g.ns[0] : g.ns[0]+'…'+g.ns[g.ns.length-1])}
                    </td>
                    <td className="v">{fmt(g.X,1)}</td>
                    <td className="v"><EV id={'escCs'+i} v={g.AB} dec={1}/></td>
                    <td className="v"><EV id={'escFs'+i} v={g.AA} dec={1}/></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </>)}
          <div className="note">Cotes en cm. Lame « R » = lame de raccord de fond.</div>
        </>);
      })()}
    </div>
  </>);
}

  // --- Lecture PDF via Claude Vision ---
  const readPdf=async(file)=>{

    setPdfReading(true); setPdfError(''); setPdfResult(null);
    try{
      // Convertir le PDF en base64
      const b64=await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(',')[1]);

        r.readAsDataURL(file);
      });

      const PROMPT=`Tu es un expert en lecture de fiches de prise de côtes de volets de piscine. Tu dois extraire les valeurs écrites (manuscrites ou imprimées) avec la plus grande précision possible.

═══════════════════════════════════════════════
RÈGLES ABSOLUES — NE JAMAIS ENFREINDRE
═══════════════════════════════════════════════
1. Ne renvoie une valeur QUE si tu la vois clairement écrite. Case vide = null.
2. Ne calcule rien, ne déduis rien, ne complète rien. Seulement ce qui est écrit.
3. En cas de doute sur un chiffre manuscrit → renvoie null, jamais une approximation.

═══════════════════════════════════════════════
LECTURE DES COTES DU BASSIN
═══════════════════════════════════════════════
Sur une fiche Aquamaster (format JM Bâches), les cotes apparaissent à DEUX endroits :

► SOURCE PRINCIPALE : tableau "Dimensions intérieures" (côté droit de la fiche)
  - AC = longueur côté gauche
  - BD = longueur côté droit
  - AB = largeur côté axe (haut)
  - CD = largeur côté fond (bas)
  → Prends ces valeurs en priorité. Elles sont plus fiables que le quadrillage.

► SOURCE SECONDAIRE : quadrillage à gauche (mesures tous les mètres)
  - Les flèches montrent la largeur à chaque mètre de profondeur
  - La PREMIÈRE valeur en haut = largeur côté axe ≈ largeurMax
  - La DERNIÈRE valeur en bas = largeur côté fond ≈ largeurMini
  - Le nombre de segments "1m" × 100 cm = longueur approximative
  - Si plusieurs valeurs identiques → bassin rectangulaire → largeurMax = largeurMini
  - Utilise cette source SEULEMENT si le tableau "Dimensions intérieures" est vide

LOGIQUE MÉTIER :
- "largeurMax" = la PLUS GRANDE largeur transversale (⊥ à l'axe du volet)
- "largeurMini" = la PLUS PETITE largeur transversale (= largeurMax si bassin rectangulaire)
- "longueur" = dimension dans le sens où le volet se déroule (axe A→C ou B→D)
- La longueur est TOUJOURS ≥ largeur pour un volet de piscine

═══════════════════════════════════════════════
LECTURE DES CHIFFRES MANUSCRITS
═══════════════════════════════════════════════
Les chiffres sont souvent écrits à la main sur une fiche imprimée. Sois très attentif :
- "6" et "0" se ressemblent quand mal formés → relis le contexte
- Un "1" devant un "00" donne "100", pas "00"
- Les largeurs de bassin sont TOUJOURS entre 200 et 1000 cm (2 à 4 chiffres)
- Les longueurs de bassin sont TOUJOURS entre 300 et 2000 cm
- Si tu lis une valeur < 200 là où tu attends une largeur → tu as sûrement manqué un chiffre → renvoie null
- Si une valeur > 1500 cm → elle est probablement en mm → divise par 10

COHÉRENCE : AC ≈ BD (±10%) et AB ≈ CD (±10%). Si trop différentes → null pour les deux.

═══════════════════════════════════════════════
ANGLES DU BASSIN (section "ANGLES DU BASSIN")
═══════════════════════════════════════════════
Cherche quelle case est cochée parmi : VIF / ARRONDIS / PANS COUPÉS
- Une case cochée = croix (×), coche (✓), ou trait à l'intérieur de la case
- Une case vide = pas de marque visible
- "bassinAngle" = "vif" | "arrondi" | "coupe" | null selon la case cochée
- Si "PANS COUPÉS" est coché mais les cases A/B/C/D n'ont pas de valeurs → bassinAngle = "coupe" quand même, et les valeurs abA/abB/etc = null
- Si "ARRONDIS" est coché avec des valeurs → bassinAngle = "arrondi" et remplis abA/abB/abC/abD

═══════════════════════════════════════════════
MARGELLES
═══════════════════════════════════════════════
- Cherche "Largeur :" dans la section MARGELLES
- C'est une valeur en cm, généralement entre 20 et 50 cm

═══════════════════════════════════════════════
ESCALIER — RÈGLE STRICTE
═══════════════════════════════════════════════
- hasEscalier = true UNIQUEMENT si la case "Escalier" dans "À positionner sur le plan" est visuellement cochée (croix ou coche dans la case)
- Ne jamais déduire la présence d'un escalier depuis des cotes ou du texte libre
- Si non coché → hasEscalier = false

═══════════════════════════════════════════════
RÉFÉRENCE CLIENT
═══════════════════════════════════════════════
- "ref" : NOM DE FAMILLE du client + numéro de commande (ex: "DUPONT 2024-001")
- Si seulement le nom → juste le nom. Si rien → null.
- "numero" : numéro de commande seul

Réponds UNIQUEMENT avec un objet JSON valide, sans markdown, sans texte avant ou après :
{
  "ref": string|null,
  "numero": string|null,

      const resp=await fetch('/api/claude',{
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'X-Api-Key':apiKey,
        },
        body:JSON.stringify({
          model:'claude-haiku-4-5-20251001',
          max_tokens:1500,
          messages:[{
            role:'user',
            content:[
              {type:'document', source:{type:'base64', media_type:'application/pdf', data:b64}},
              {type:'text', text:PROMPT}
            ]
          }]
        })
      });

      if(!resp.ok){
        const err=await resp.json().catch(()=>({}));
        const status=resp.status;
        const msg=err.error?.message||'';
        if(status===401) throw new Error('CLE_INVALIDE');
        if(status===429) throw new Error('QUOTA_DEPASSE');
        if(status===413||msg.toLowerCase().includes('too large')||msg.toLowerCase().includes('file size')) throw new Error('FICHIER_TROP_LOURD');
        if(status===400) throw new Error('REQUETE_INVALIDE: '+msg);
        if(status>=500) throw new Error('SERVEUR_ANTHROPIC');
        throw new Error('ERREUR_HTTP_'+status+': '+msg);
      }

      const data=await resp.json();
      const raw=data.content?.find(b=>b.type==='text')?.text||'';
      if(!raw) throw new Error('REPONSE_VIDE');
      const clean=raw.replace(/```json\n?/g,'').replace(/```/g,'').trim();
      let parsed;
      try{ parsed=JSON.parse(clean); }
      catch(e){ throw new Error('JSON_INVALIDE'); }
      setPdfResult(parsed);
    }catch(e){
      const code=e.message||'';
      let msg='';
      if(code==='CLE_INVALIDE') msg='❌ Clé API invalide — vérifie ta clé Anthropic dans le champ ci-dessous.';
      else if(code==='QUOTA_DEPASSE') msg='⏳ Quota API dépassé — attends quelques secondes et réessaie.';
      else if(code==='FICHIER_TROP_LOURD') msg='📄 Fichier trop lourd — essaie de compresser le PDF ou de prendre une photo moins lourde.';
      else if(code==='REPONSE_VIDE') msg='⚠️ L\'IA n\'a renvoyé aucune réponse — réessaie.';
      else if(code==='JSON_INVALIDE') msg='⚠️ La réponse de l\'IA n\'est pas lisible — réessaie.';
      else if(code==='SERVEUR_ANTHROPIC') msg='🔴 Serveur Anthropic indisponible — réessaie dans quelques minutes.';
      else if(code.startsWith('REQUETE_INVALIDE')) msg='⚠️ Requête invalide : '+code.split(': ')[1];
      else if(e.name==='TypeError'||code.includes('fetch')||code.includes('network')||code.includes('Failed')) msg='📡 Pas de connexion internet — vérifie ta connexion et réessaie.';
      else msg='⚠️ Erreur inattendue : '+code;
      setPdfError(msg);
    }
    setPdfReading(false);
  };

  // Appliquer le résultat Claude au formulaire
  const applyPdfResult=(res)=>{
    const patch={};
    const str=v=>(v!=null?String(v):'');
    const num_=v=>(v!=null?String(v):'');
    if(res.ref!=null) patch.ref=str(res.ref);
    if(res.numero!=null) patch.numero=str(res.numero);
    if(res.largeurMax!=null) patch.largeurMax=num_(res.largeurMax);
    if(res.largeurMini!=null) patch.largeurMini=num_(res.largeurMini);
    if(res.longueur!=null) patch.longueur=num_(res.longueur);
    if(res.largeurMargelles!=null) patch.largeurMargelles=num_(res.largeurMargelles);
    if(res.bassinAngle!=null) patch.bassinAngle=res.bassinAngle;
    ['abA','abB','abC','abD','acA1','acA2','acB1','acB2','acC1','acC2','acD1','acD2'].forEach(k=>{ if(res[k]!=null) patch[k]=num_(res[k]); });
    if(res.hasEscalier) patch.hasEscalier=true;
    if(res.shape!=null) patch.shape=res.shape;
    ['largeur','profG','profD','tX1','tX2','tX3','tX4','tX5','tX6','rX2','rX5','rX6',
     'rGd','rGf','rDd','rDf','tR2','tR3','tR4','tR5','roH17','roH18'].forEach(k=>{ if(res[k]!=null) patch[k]=num_(res[k]); });
    setAll(s=>({...s,[material]:{...s[material],[type]:{...s[material][type],...patch}}}));
    setPdfResult(null);
  };
  const f=(all[material]&&all[material][type])||all.pvc[type];
  const set=(k,v)=>setAll(s=>({...s,[material]:{...s[material],[type]:{...s[material][type],[k]:v}}}));
  const resetType=()=>setAll(s=>({...s,[material]:{...s[material],[type]:{...EMPTY}}}));

  // --- chargement initial (brouillon en cours + historique) ---
  useEffect(()=>{
    let on=true;
    (async()=>{
      try{ const d=await store.get('draft'); if(on&&d){ const p=JSON.parse(d);
        if(p.all) setAll(p.all); if(p.material) setMaterial(p.material); if(p.type) setType(p.type); } }catch(e){}

    // Empêche la molette de modifier accidentellement un champ numérique :

    const wheelGuard=(e)=>{ const a=document.activeElement; if(a&&a.tagName==='INPUT'&&a.type==='number'&&a===e.target){ a.blur(); } };
    document.addEventListener('wheel',wheelGuard,{passive:true});
    return ()=>{on=false; document.removeEventListener('wheel',wheelGuard);};
  },[]);

  // --- sauvegarde auto du brouillon (debounce) ---

      try{ await store.set('draft',JSON.stringify({all,material,type})); setSavedAt(Date.now()); }catch(e){}

  const persistHist=async(list)=>{ setSaved(list); try{ await store.set('history',JSON.stringify(list)); }catch(e){} };

  const cBF=useMemo(()=>f.hasBlocFiltration?computeBlocFiltration(f,material):null,[f,material]);

  function BfField({k,f,set}){
    const {useState:useLS}=React;
    const [local,setLocal]=useLS(f[k]||'');

  const T=c.T;

  const lamesDec  = c.lamesMm ? 1 : 0;

    const o=ov[id]; const has=(o!=null&&o!=='');

      <span className="evi-wrap">
        <input className={"evi"+(has?' ov':'')} type="number" step="any" value={shown}
          onChange={e=>setOv(id,e.target.value)}

        {has && <button className="evi-reset visible" onClick={()=>setOv(id,'')} title={'Rétablir : '+(v==null?'—':fmt(v,dec))}>✕</button>}
      </span>
    );
  };
  // Valeur calculée non modifiable : utilisée pour les résultats automatiques sensibles
  // afin qu'un ancien override sauvegardé ne puisse pas masquer l'affichage.
  const CVal=({v,dec=0})=><>{(v==null||isNaN(v))?'—':fmt(v,dec)}</>;

  const options=[];
  if(f.hasEscalier)options.push("Escalier "+escShapeLabel);
  if(c.block && c.block.kind==='moteurs')options.push("Axes "+axePoseLabel.toLowerCase());

  let sn=0; const Nx=()=>{ sn+=1; return sn; };

                <div className="modal-box" onClick={e=>e.stopPropagation()}>
                  <div className="modal-head">
                    <h2>📄 Résultat de la lecture PDF</h2>
                    <button className="btn-secondary" style={{padding:'4px 12px',fontSize:12,color:'#fff',borderColor:'rgba(255,255,255,0.3)',background:'transparent'}} onClick={()=>setPdfResult(null)}>Annuler</button>
                  </div>
                  <div className="modal-body">
                    <div style={{background:'#FFF8E1',border:'1px solid #F59E0B',borderRadius:6,padding:'12px 14px',marginBottom:16,display:'flex',gap:10,alignItems:'flex-start'}}>
                      <span style={{fontSize:20,lineHeight:1}}>⚠️</span>
                      <div>
                        <div style={{fontWeight:700,fontSize:13,color:'#92400E',marginBottom:3}}>Vérifie et corrige si besoin</div>
                        <div style={{fontSize:12,color:'#92400E',lineHeight:1.5}}>Sur les fiches <b>manuscrites</b>, certains chiffres peuvent être mal lus (0↔8, 4↔9, 1↔7…). <b>Tu peux modifier directement les valeurs ci-dessous</b> avant d'appliquer.</div>
                      </div>
                    </div>
                    {SECTIONS.map(({section,fields})=>{
                      const visible=fields.filter(({k})=>draft[k]!=null&&draft[k]!==false);
                      if(!visible.length) return null;
                      return (<div key={section}>
                        <div className="import-section">{section}</div>
                        {visible.map(({k,label,type,opts})=>(
                          <div key={k} className="import-field found">
                            <span className="ikey">{label}</span>
                            {renderField(k,type,opts)}
                          </div>
                        ))}
                      </div>);
                    })}
                  </div>
                  <div className="modal-foot">
                    <button className="btn-secondary" onClick={()=>setPdfResult(null)}>Annuler</button>
                    <button className="btn-accent" onClick={()=>applyPdfResult(draft)}>✓ Appliquer ces valeurs</button>
                  </div>
                </div>
              </div>
            );
          };
          return <PdfModal/>;
        })()
      }

      {showHist &&
        <div className="no-print" onClick={()=>setShowHist(false)}
          style={{position:'fixed',inset:0,background:'rgba(22,24,29,0.45)',zIndex:50,display:'flex',justifyContent:'center',alignItems:'flex-start',padding:'40px 16px',overflowY:'auto'}}>
          <div className="card" onClick={e=>e.stopPropagation()} style={{maxWidth:560,width:'100%',boxShadow:'var(--shadow-lg)'}}>
            <div className="px-5 py-3 flex items-center justify-between" style={{borderBottom:'1px solid var(--border)'}}>
              <span className="label-cap" style={{color:'var(--ink-soft)'}}>Historique des fiches{saved.length?(' · '+saved.length):''}</span>
              <div className="flex items-center gap-2">
                <input type="file" accept="application/json,.json" ref={importRef} onChange={importHist} style={{display:'none'}}/>
                <button onClick={()=>importRef.current&&importRef.current.click()}
                  style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:6,border:'1.5px solid var(--accent)',background:'var(--cream)',color:'var(--accent-deep)',fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                  Importer
                </button>
                <button onClick={exportHist} disabled={!saved.length}
                  style={{display:'flex',alignItems:'center',gap:6,padding:'7px 14px',borderRadius:6,border:'1.5px solid #BBD9C8',background:'var(--ok-bg)',color:'var(--ok)',fontSize:13,fontWeight:600,cursor:saved.length?'pointer':'not-allowed',opacity:saved.length?1:0.45,fontFamily:'inherit'}}>
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Exporter
                </button>
                <button className="btn-secondary" style={{padding:'7px 12px'}} onClick={()=>setShowHist(false)}>✕</button>
              </div>
            </div>
            {saved.length>0 &&
              <div style={{padding:'10px 18px',borderBottom:'1px solid var(--border)'}}>
                <input type="text" value={histQuery} onChange={e=>setHistQuery(e.target.value)} placeholder="Rechercher (réf., n°, type, cote…)"/>
              </div>}
            {importMsg &&
              <div style={{padding:'8px 18px',background:importMsg.startsWith('⚠')?'var(--bad-bg)':'var(--ok-bg)',borderBottom:'1px solid var(--border)',fontSize:12.5,color:importMsg.startsWith('⚠')?'var(--bad)':'var(--ok)',fontWeight:600}}>
                {importMsg}
              </div>}
            <div style={{maxHeight:'55vh',overflowY:'auto'}}>
              {(()=>{
                if(saved.length===0) return <div className="empty">Aucune fiche enregistrée pour l'instant.</div>;
                const q=histQuery.trim().toLowerCase();
                const list=!q?saved:saved.filter(e=>{
                  const hay=[e.label,e.matLabel,e.ref,e.numero,e.dateStr,
                    e.data.largeurMax,e.data.largeurMini,e.data.longueur].join(' ').toLowerCase();
                  return hay.includes(q);
                });
                if(list.length===0) return <div className="empty">Aucune fiche ne correspond à « {histQuery} ».</div>;
                return list.map(e=>(
                  <div key={e.id} className="flex items-center gap-3" style={{padding:'12px 18px',borderBottom:'1px solid var(--border)'}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,fontSize:14}}>{e.label} {e.matLabel}
                        {e.ref&&<span className="font-mono" style={{fontSize:11,color:'var(--ink-faint)',marginLeft:8}}>Réf. {e.ref}</span>}
                        {e.numero&&<span className="font-mono" style={{fontSize:11,color:'var(--ink-faint)',marginLeft:8}}>N° {e.numero}</span>}
                      </div>
                      <div className="font-mono" style={{fontSize:11,color:'var(--ink-faint)',marginTop:2}}>
                        max {e.data.largeurMax||'—'} · mini {e.data.largeurMini||'—'} · long {e.data.longueur||'—'} · {e.dateStr}
                      </div>
                    </div>
                    <button className="btn-accent" style={{padding:'6px 12px',fontSize:12}} onClick={()=>openFiche(e)}>Ouvrir</button>
                    <button className="btn-secondary" style={{padding:'6px 10px',fontSize:12,borderColor:'#E6BDB6',color:'var(--bad)'}} onClick={()=>deleteFiche(e.id)}>✕</button>
                  </div>
                ));
              })()}
            </div>
            {saved.length>0 &&
              <div className="px-5 py-3" style={{borderTop:'1px solid var(--border)',textAlign:'right'}}>
                <button className="btn-secondary" style={{fontSize:12,borderColor:'#E6BDB6',color:'var(--bad)'}} onClick={clearHist}>Tout effacer</button>
              </div>}
          </div>
        </div>}

            <button key={m[0]} className={"mattab"+(material===m[0]?' on':'')} onClick={()=>setMaterial(m[0])}>{m[1]}</button>
          ))}
          <div style={{flex:1}}></div>
          <button onClick={()=>importRef.current&&importRef.current.click()}
            style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',borderRadius:5,border:'1px solid rgba(255,255,255,0.25)',background:'rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.75)',fontSize:12,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Importer
          </button>
          <button onClick={exportHist} disabled={!saved.length}
            style={{display:'flex',alignItems:'center',gap:5,padding:'5px 12px',borderRadius:5,border:'1px solid rgba(255,255,255,0.25)',background:'rgba(255,255,255,0.08)',color:saved.length?'rgba(255,255,255,0.75)':'rgba(255,255,255,0.3)',fontSize:12,fontWeight:600,cursor:saved.length?'pointer':'not-allowed',fontFamily:'inherit'}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exporter
          </button>
          <button className="mattab" style={{fontSize:12}} onClick={()=>setShowHist(true)}>
            Historique{saved.length?(' · '+saved.length):''}
          </button>
        </div>
      </nav>

      <div className="max-w-6xl mx-auto px-6 py-8">

        <div className="no-print subnav" style={{marginBottom:22}}>
          {TYPES.map(t=>(
            <button key={t.id} className={"subtab"+(type===t.id?' on':'')} onClick={()=>setType(t.id)}>{t.label}</button>
          ))}
        </div>

        <div className="no-print" style={{marginBottom:20}}>
          <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full stripe" style={{border:'1px solid var(--border-strong)'}}>
            <span className="label-cap" style={{color:'var(--accent-deep)'}}>{matLabel} · {T.label}</span>

          <p className="mt-2 text-base" style={{color:'var(--ink-soft)'}}>{fullName} — saisis les cotes, la fiche se calcule en direct.</p>
        </div>

        <div className="grid gap-6" style={{gridTemplateColumns:'370px 1fr'}}>

              <span style={{width:8,height:8,borderRadius:'50%',background:'var(--accent)'}}></span>
              <span className="label-cap" style={{color:'var(--ink-soft)'}}>Saisie</span>
            </div>
            <div className="p-5">
              {/* Import PDF */}

                  {pdfReading

                    : <><span style={{fontSize:18}}>📄</span>Charger un PDF Aquamaster</>}
                </button>
                {pdfError && <div style={{marginTop:8,padding:'8px 12px',background:'var(--bad-bg)',border:'1px solid #E6BDB6',borderRadius:4,fontSize:12,color:'var(--bad)'}}>{pdfError}</div>}

                <div style={{marginTop:10}}>
                  <button style={{background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--ink-faint)',fontFamily:'inherit',padding:0,textDecoration:'underline'}}

                    {showApiKey?'▲ Masquer la clé API':'▼ Clé API Anthropic'}
                  </button>

                    <div style={{marginTop:8}}>
                      <div className="api-key-row">
                        <input type="password" value={apiKey} onChange={e=>saveApiKey(e.target.value)}

                  <div className="unit"><input type="number" value={f.largeurMax} onChange={e=>set('largeurMax',e.target.value)} placeholder="0"/><span>cm</span></div></div>
                <div className="mb-3"><label className="block text-xs mb-1" style={{color:'var(--ink-soft)'}}>Largeur bassin mini</label>
                  <div className="unit"><input type="number" value={f.largeurMini} onChange={e=>set('largeurMini',e.target.value)} placeholder="0"/><span>cm</span></div></div>

                  <div className="unit"><input type="number" value={f.longueur} onChange={e=>set('longueur',e.target.value)} placeholder="0"/><span>cm</span></div></div>
                {T.margelles &&
                  <>

                      <div className="seg">
                        <label className={(f.poseAxes||'sur')==='sur'?'on':''}><input type="radio" name={'poseAxes-'+material+'-'+type} checked={(f.poseAxes||'sur')==='sur'} onChange={()=>set('poseAxes','sur')}/>Sur margelles</label>
                        <label className={f.poseAxes==='sans'?'on':''}><input type="radio" name={'poseAxes-'+material+'-'+type} checked={f.poseAxes==='sans'} onChange={()=>set('poseAxes','sans')}/>Sans margelles</label>
                      </div>
                    </div>
                  </>}

                  <div className="label-cap" style={{marginBottom:9}}>Immergé</div>

                  {T.caillebotis &&
                    <div><label className="block text-xs mb-1" style={{color:'var(--ink-soft)'}}>Largeur caillebotis</label>
                      <div className="unit"><input type="number" value={f.largeurCaillebotis} onChange={e=>set('largeurCaillebotis',e.target.value)} placeholder="0"/><span>cm</span></div></div>}
                </div>}

                <div className="label-cap" style={{marginBottom:9}}>Escalier</div>
                <label className="toggle flex items-center gap-2 cursor-pointer" style={{fontSize:13,fontWeight:500,marginBottom:f.hasEscalier?12:0}}>
                  <input type="checkbox" checked={f.hasEscalier} onChange={e=>set('hasEscalier',e.target.checked)}/>
                  <span className="switch"></span><span>Le bassin comporte un escalier</span>

                {f.hasEscalier &&
                  <div>
                    <div className="note" style={{marginBottom:11}}>L'escalier suit la matière du volet ({matLabel}).</div>

                      const somme=g+a+d;

                      return (
                        <div style={{padding:'8px 10px',borderRadius:4,background: ok===false?'var(--bad-bg)':ok===true?'var(--ok-bg)':'#f0f0f0',

                          fontSize:12,fontWeight:600}}>
                          {ok===true && '✓ '}
                          {ok===false && '⚠ '}
                          Écart G + A + Écart D = {fmt(somme,1)} cm

                          {ok===false && ' — ne correspond pas à la largeur du bassin'}
                          {ok===true && ' — correspond à la largeur du bassin'}
                          {ok===null && ' — saisir la largeur max du bassin pour vérifier'}
                        </div>

                {(f.rayonsEquerre||f.rayonsForme||(f.hasEscalier&&f.rayonsEscalier)) &&

                  </div>}
              </div>

                  </ul>
                </div>}

                <div className="label-cap" style={{marginBottom:9}}>Informations supplémentaires</div>

                        G + A + D = {fmt(cBF.somme,1)} cm

                              <td className="v"><EV id="bfGC" v={cBF.G.AB} dec={1}/></td>
                              <td className="v"><EV id="bfGF" v={cBF.G.AA} dec={1}/></td>
                            </tr>
                          </tbody>
                        </table>
                      </div>
                      <div>
                        <div className="label-cap" style={{marginBottom:6}}>Côté droit — {fmt(cBF.ecartD,1)} cm</div>

                          <tbody>
                            <tr>
                              <td style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:700}}>{cBF.nbCorps+(cBF.hasRaccord?1:0)}<span style={{fontSize:11,fontWeight:400,color:'var(--ink-soft)'}}> lames</span></td>

                      </div>

                    <div className="note" style={{marginTop:8}}>Cotes en cm.</div>

                    </table>

                      <div className="cell"><div className="k">Nb de paquets</div><div className="val"><EVal id="imPaq" v={c.block.paquets} dec={2}/></div></div>

                    <div className="kv c2" style={{marginTop:8}}>
                      <div className="cell hl"><div className="k">PVC</div><div className="val"><CVal v={c.block.pvc} dec={2}/></div></div>

                    {c.block.cailLargMissing && <div className="note">Renseigne la largeur caillebotis pour calculer Largeurs et Nb lames 600 ml.</div>}
                  </div>

                      <div className="cell"><div className="k">Caillebotis</div><div className="val"><EVal id="itCai" v={c.block.caillebotis} dec={1}/></div></div>

                    <div className="sect-h"><span className="n">{Nx()}</span>Débit caillebotis</div>

                  <div className="sect-h"><span className="n">{Nx()}</span>Caractéristiques</div>
                  <div className="flex flex-wrap gap-2">
                    {options.map((o,i)=><span key={i} className="opt-pill">{o}</span>)}
                  </div>
                </div>}

              {f.infosSupp && f.infosSupp.trim() &&
                <div className="sect">
                  <div className="sect-h"><span className="n">{Nx()}</span>Informations supplémentaires</div>
                  <div style={{whiteSpace:'pre-wrap',fontSize:13,color:'var(--ink-soft)',lineHeight:1.5}}>{f.infosSupp}</div>
                </div>}
            </>
            )}
          </div>
        </div>

        <div className="no-print" style={{marginTop:30,textAlign:'center'}}>
          <span className="text-xs" style={{color:'var(--ink-soft)'}}>© 2026 Sacha Jourdan · Tous droits réservés</span>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
