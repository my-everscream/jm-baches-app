            {c.notBefore && c.notAfter ? `À poser entre le ${fmtDate(c.notBefore)} et le ${fmtDate(c.notAfter)}`
              : c.notBefore ? `Pas avant le ${fmtDate(c.notBefore)}`
              : `Pas après le ${fmtDate(c.notAfter)}`}
          </div>
        )}
        {c.scheduledDate && (
          <div className="flex items-center gap-2 font-medium" style={{ color: 'var(--ink)' }}>
            <I.calendarDays size={12} />{fmtDate(c.scheduledDate)}{c.fixedTime ? ` · ${c.fixedTime}` : ''} · <span style={{ color: bin?.color || 'var(--ink-faint)' }}>{bin?.name || '—'}</span>
          </div>
        )}
      </div>
      {isWaiting && (
        <div className="text-xs p-2 rounded mb-3 flex items-center gap-1" style={{ background: STATUTS.en_attente.bg, color: STATUTS.en_attente.color }}>
          <I.clock size={12} /> En attente : ce chantier est exclu de l'optimisation automatique.
        </div>
      )}
      {!isDone && (
        <button onClick={() => onFeedback(isWaiting ? { status: 'a_planifier' } : { status: 'en_attente', scheduledDate: '', scheduledBinome: '', fixedTime: '' })} className="w-full justify-center mb-3 text-xs font-medium flex items-center gap-1 py-2 rounded"
          style={isWaiting
            ? { background: STATUTS.a_planifier.bg, border: '1px solid ' + STATUTS.a_planifier.color, color: STATUTS.a_planifier.color, cursor: 'pointer' }
            : { background: STATUTS.en_attente.bg, border: '1px solid ' + STATUTS.en_attente.color, color: STATUTS.en_attente.color, cursor: 'pointer' }}>
          {isWaiting ? <><I.arrowR size={13} /> Réactiver / à planifier</> : <><I.clock size={13} /> Mettre en attente</>}
        </button>
      )}
      {/* Validation client d'un clic (seulement si planifié) */}
      {!isWaiting && (canValidate || isValide) && (
        <button onClick={onToggleValidate} className="w-full justify-center mb-3 text-xs font-medium flex items-center gap-1 py-2 rounded"
          style={isValide
            ? { background: 'transparent', border: '1px solid var(--border)', color: 'var(--ink-soft)', cursor: 'pointer' }
            : { background: STATUTS.valide.bg, border: '1px solid ' + STATUTS.valide.color, color: STATUTS.valide.color, cursor: 'pointer' }}>
          {isValide ? <><I.unlock size={13} /> Dévalider</> : <><I.check size={13} /> Valider avec le client</>}
        </button>
      )}
      {/* Marquer terminé + Retour de pose */}
      {(c.scheduledDate && c.scheduledBinome && !isDone && !isWaiting) && (
        <button onClick={() => onFeedback({ status: 'fait' })} className="w-full justify-center mb-3 text-xs font-medium flex items-center gap-1 py-2 rounded"
          style={{ background: STATUTS.fait.bg, border: '1px solid ' + STATUTS.fait.color, color: STATUTS.fait.color, cursor: 'pointer' }}>
          <I.check size={13} /> Marquer comme terminé
        </button>
      )}
      {isDone && (
        <div className="mb-3 p-3 rounded" style={{ background: 'var(--cream)' }}>
          <div className="label-cap mb-2">Retour de pose</div>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xs" style={{ color: 'var(--ink-soft)' }}>Durée réelle</span>
            <input type="number" min="0" step="0.5" value={durDraft} onChange={e => setDurDraft(e.target.value)}
              onBlur={() => { const v = parseFloat(durDraft); onFeedback({ realDuration: isNaN(v) ? null : v }); }}
              style={{ width: 70, padding: '4px 6px' }} />
            <span className="text-xs" style={{ color: 'var(--ink-faint)' }}>h (estimé : {c.estimatedDuration}h)</span>
          </div>
          <div className="flex gap-1.5">
            {OUTCOMES.map(o => (
              <button key={o.id} onClick={() => onFeedback({ outcome: o.id })}
                className="text-xs px-2 py-1 rounded font-medium" style={{
                  background: c.outcome === o.id ? o.bg : 'transparent',
                  color: c.outcome === o.id ? o.color : 'var(--ink-faint)',
                  border: '1px solid ' + (c.outcome === o.id ? o.color : 'var(--border)'), cursor: 'pointer',
                }}>{o.label}</button>
            ))}
          </div>
          <button onClick={() => onFeedback({ status: 'planifie' })} className="text-xs mt-2" style={{ background: 'none', border: 'none', color: 'var(--ink-faint)', cursor: 'pointer' }}>↩ Rouvrir le chantier</button>
        </div>
      )}
      <div className="flex gap-3 pt-3 border-t items-center" style={{ borderColor: 'var(--border)' }}>
        <button onClick={onEdit} className="text-xs flex items-center gap-1 font-medium" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink)' }}>
          <I.edit size={12} /> Modifier
        </button>
        {(isDone || c.archived) && (
          <button onClick={onArchive} className="text-xs flex items-center gap-1" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-soft)' }}>
            <I.layers size={12} /> {c.archived ? 'Désarchiver' : 'Archiver'}
          </button>
        )}
        <button onClick={onDelete} className="text-xs flex items-center gap-1 ml-auto" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-faint)' }}>
          <I.trash size={12} /> Supprimer
        </button>
      </div>
    </div>
  );
}

/* ---------- Form ---------- */
function ChantierForm({ existing, binomes, poseTypes, apiKey, onSave, onCancel, showToast, goToSettings }) {
  const empty = { id:'', clientName:'', clientPhone:'', clientEmail:'', address:'', city:'', postalCode:'', type:'', dimensions:'', estimatedDuration:4, materials:[], constraints:'', notes:'', weatherSensitive:true, status:'a_planifier', scheduledDate:'', scheduledBinome:'', fixedTime:'', notBefore:'', notAfter:'', linkId:'', linkRole:0, linkGap:0 };
  const [data, setData] = useState(existing || empty);
  // Option "deux interventions" (immergé total) : durées des deux interventions + délai mini entre elles.
  const [twoVisits, setTwoVisits] = useState(false);
  const [dur1, setDur1] = useState(3);
  const [dur2, setDur2] = useState(3);
  const [gapDays, setGapDays] = useState(7);
  const isImmergeTotal = /immerg.*total/i.test(data.type || '');
  const [extracting, setExtracting] = useState(false);
  const [extractError, setExtractError] = useState(null);
  const fileRef = useRef(null);

  const set = (f, v) => setData(d => ({ ...d, [f]: v }));

  const handlePDF = async (file) => {
    if (!file) return;
    if (file.type !== 'application/pdf') { setExtractError('Le fichier doit être un PDF.'); return; }
    if (!apiKey) { setExtractError('Aucune clé API Anthropic configurée — va dans Paramètres pour en ajouter une.'); return; }
    setExtracting(true); setExtractError(null);
    try {
      const base64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(r.result.split(',')[1]);
        r.onerror = () => rej(new Error('Lecture échouée'));
        r.readAsDataURL(file);
      });
      const ex = await extractContractFromPDF(base64, apiKey, sGet(SK.modelName, DEFAULT_MODEL));
      setData(d => ({ ...d, ...ex, materials: Array.isArray(ex.materials) ? ex.materials : [], estimatedDuration: Number(ex.estimatedDuration) || 4 }));
      showToast('Contrat lu avec succès ✨');
    } catch (e) {
      console.error(e);
      setExtractError(e.message || 'Erreur d\'extraction');
    } finally {
      setExtracting(false);
    }
  };

  const submit = () => {
    if (!data.clientName.trim()) { showToast('Le nom du client est requis'); return; }
    // Cas "deux interventions" (immergé total) : on crée DEUX chantiers liés.
    if (twoVisits && isImmergeTotal && !existing) {
      const link = uid();
      const base = { ...data };
      const c1 = { ...base, id: uid(), type: base.type + ' — interv. 1/2', estimatedDuration: Number(dur1) || 0,
        status: 'a_planifier', scheduledDate: '', scheduledBinome: '', linkId: link, linkRole: 1, linkGap: Number(gapDays) || 0 };
      const c2 = { ...base, id: uid(), type: base.type + ' — interv. 2/2', estimatedDuration: Number(dur2) || 0,
        status: 'a_planifier', scheduledDate: '', scheduledBinome: '', linkId: link, linkRole: 2, linkGap: Number(gapDays) || 0 };
      onSave([c1, c2]);
      return;
    }
    const final = { ...data, id: data.id || uid() };
    if (final.status === 'en_attente') {
      final.scheduledDate = '';
      final.scheduledBinome = '';
      final.fixedTime = '';
    }
    if (!final.scheduledDate) final.fixedTime = ''; // une heure imposée n'a de sens qu'avec une date
    if (final.scheduledDate && final.scheduledBinome && final.status === 'a_planifier') final.status = 'planifie';
    onSave(final);
  };

  return (
    <div className="pt-10 fadein">
      <button onClick={onCancel} className="text-sm flex items-center gap-1 mb-6" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-soft)' }}>
        <I.chevL size={14} /> Retour
      </button>
      <h1 className="font-display text-4xl mb-2">{existing ? 'Modifier le chantier' : 'Nouveau chantier'}</h1>
      <p className="text-sm mb-8" style={{ color: 'var(--ink-soft)' }}>
        {existing ? 'Mets à jour les informations.' : 'Charge un contrat PDF pour remplissage auto, ou saisis manuellement.'}
      </p>

      {!existing && (
        <div className="card p-6 mb-8 relative overflow-hidden">
          <div className="absolute top-0 left-0 right-0 h-1 stripe" />
          <div className="flex items-start gap-4">
            <div className="w-12 h-12 rounded flex items-center justify-center shrink-0" style={{ background: 'var(--ink)' }}>
              <span style={{ color: 'var(--cream)' }}><I.sparkles size={20} /></span>
            </div>
            <div className="flex-1 min-w-0">
              <h3 className="font-display text-xl font-semibold mb-1">Extraction automatique du contrat</h3>
              <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>
                Charge le contrat PDF, l'IA en extrait toutes les infos. {!apiKey && <span style={{ color: 'var(--accent)' }}>Clé API requise (Paramètres).</span>}
              </p>
              <input ref={fileRef} type="file" accept="application/pdf" style={{ display: 'none' }} onChange={e => handlePDF(e.target.files?.[0])} />
              <div className="flex gap-3 flex-wrap items-center">
                <button onClick={() => fileRef.current?.click()} disabled={extracting} className="btn-primary">
                  {extracting ? <><span className="spin"><I.loader size={16} /></span> Analyse en cours...</> : <><I.upload size={16} /> Charger un contrat PDF</>}
                </button>
                {!apiKey && (
                  <button onClick={goToSettings} className="btn-secondary"><I.key size={14} /> Configurer la clé API</button>
                )}
                {extractError && <span className="text-xs" style={{ color: 'var(--accent)' }}>{extractError}</span>}
              </div>
            </div>
          </div>
        </div>
      )}

      <div className="grid md:grid-cols-2 gap-6">
        <section className="card p-6">
          <div className="label-cap mb-4">Client</div>
          <div className="space-y-3">
            <Field label="Nom du client *"><input value={data.clientName} onChange={e => set('clientName', e.target.value)} placeholder="Mme Dupont" /></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Téléphone"><input value={data.clientPhone} onChange={e => set('clientPhone', e.target.value)} /></Field>
              <Field label="Email"><input value={data.clientEmail} onChange={e => set('clientEmail', e.target.value)} /></Field>
            </div>
          </div>
        </section>

        <section className="card p-6">
          <div className="label-cap mb-4">Lieu du chantier</div>
          <div className="space-y-3">
            <Field label="Adresse"><input value={data.address} onChange={e => set('address', e.target.value)} placeholder="N° et rue" /></Field>
            <div className="grid grid-cols-3 gap-3">
              <Field label="Code postal"><input value={data.postalCode} onChange={e => set('postalCode', e.target.value)} /></Field>
              <div className="col-span-2"><Field label="Ville"><input value={data.city} onChange={e => set('city', e.target.value)} /></Field></div>
            </div>
          </div>
        </section>

        <section className="card p-6">
          <div className="label-cap mb-4">Pose</div>
          <div className="space-y-3">
            <Field label="Type de produit">
              <select value={data.type} onChange={e => {
                const t = poseTypes.find(p => p.name === e.target.value);
                set('type', e.target.value);
                if (t) { set('estimatedDuration', t.duration); set('weatherSensitive', t.weather); }
              }}>
                <option value="">— Sélectionner —</option>
                {poseTypes.map(p => <option key={p.name} value={p.name}>{p.name}</option>)}
              </select>
            </Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Dimensions"><input value={data.dimensions} onChange={e => set('dimensions', e.target.value)} placeholder="4m x 3,5m" /></Field>
              <Field label="Durée estimée (h)"><input type="number" min="0.5" step="0.5" value={data.estimatedDuration} onChange={e => set('estimatedDuration', parseFloat(e.target.value) || 0)} /></Field>
            </div>
            <label className="flex items-center gap-2 text-sm">
              <input type="checkbox" checked={data.weatherSensitive} onChange={e => set('weatherSensitive', e.target.checked)} />
              <I.wind size={14} /> Sensible à la météo
            </label>

            {isImmergeTotal && !existing && (
              <div className="mt-2 p-3 rounded" style={{ background: 'var(--cream)', border: '1px solid var(--border)' }}>
                <label className="flex items-center gap-2 text-sm font-medium">
                  <input type="checkbox" checked={twoVisits} onChange={e => setTwoVisits(e.target.checked)} />
                  Pose en deux interventions (2 journées séparées)
                </label>
                {twoVisits && (
                  <div className="mt-3 grid grid-cols-3 gap-3">
                    <Field label="Durée interv. 1 (h)">
                      <input type="number" min="0.5" step="0.5" value={dur1} onChange={e => setDur1(parseFloat(e.target.value) || 0)} />
                    </Field>
                    <Field label="Durée interv. 2 (h)">
                      <input type="number" min="0.5" step="0.5" value={dur2} onChange={e => setDur2(parseFloat(e.target.value) || 0)} />
                    </Field>
                    <Field label="Délai mini (jours)">
                      <input type="number" min="0" step="1" value={gapDays} onChange={e => setGapDays(parseInt(e.target.value) || 0)} />
                    </Field>
                  </div>
                )}
                {twoVisits && (
                  <p className="text-xs mt-2" style={{ color: 'var(--ink-faint)' }}>
                    Deux chantiers liés seront créés (interv. 1/2 et 2/2). La 2ᵉ intervention sera planifiée au moins {gapDays} jour(s) après la 1ʳᵉ.
                  </p>
                )}
              </div>
            )}
          </div>
        </section>

        <section className="card p-6">
          <div className="label-cap mb-4">Planification</div>
          <div className="space-y-3">
            <div className="grid grid-cols-2 gap-3">
              <Field label="Date prévue"><input type="date" value={data.scheduledDate} onChange={e => set('scheduledDate', e.target.value)} /></Field>
              <Field label="Binôme">
                <select value={data.scheduledBinome} onChange={e => set('scheduledBinome', e.target.value)}>
                  <option value="">—</option>
                  {binomes.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              </Field>
            </div>
            <Field label="Heure imposée par le client (optionnel)">
              <input type="time" value={data.fixedTime} step="900" disabled={!data.scheduledDate}
                onChange={e => set('fixedTime', e.target.value)} />
              <p className="text-xs mt-1" style={{ color: 'var(--ink-faint)' }}>
                {data.scheduledDate
                  ? 'Le chantier sera calé au plus près de cette heure, ce jour-là, et ne sera pas déplacé par l\'optimisation.'
                  : 'Renseigne d\'abord une date prévue pour pouvoir imposer une heure.'}
              </p>
            </Field>
            <Field label="Statut">
              <select value={data.status} onChange={e => set('status', e.target.value)}>
                {Object.entries(STATUTS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
              </select>
            </Field>
          </div>
        </section>

        <section className="card p-6 md:col-span-2">
          <div className="label-cap mb-4">Détails techniques</div>
          <div className="grid md:grid-cols-2 gap-3">
            <Field label="Matériel spécifique (séparé par virgules)">
              <input value={Array.isArray(data.materials) ? data.materials.join(', ') : ''}
                     onChange={e => set('materials', e.target.value.split(',').map(s => s.trim()).filter(Boolean))}
                     placeholder="Nacelle, scellement chimique..." />
            </Field>
            <Field label="Contraintes (accès, étage, etc.)">
              <input value={data.constraints} onChange={e => set('constraints', e.target.value)} />
            </Field>
          </div>
          <div className="mt-3">
            <Field label="Notes internes"><textarea rows={3} value={data.notes} onChange={e => set('notes', e.target.value)} /></Field>
          </div>
          <div className="mt-3">
            <div className="label-cap mb-2">Fenêtre de pose imposée par le client (optionnel)</div>
            <div className="grid md:grid-cols-2 gap-4">
              <Field label="Pas avant le">
                <input type="date" value={data.notBefore || ''} max={data.notAfter || undefined} onChange={e => set('notBefore', e.target.value)} />
              </Field>
              <Field label="Pas après le">
                <input type="date" value={data.notAfter || ''} min={data.notBefore || undefined} onChange={e => set('notAfter', e.target.value)} />
              </Field>
            </div>
            <p className="text-xs mt-1" style={{ color: 'var(--ink-faint)' }}>
              L'optimisation ne placera ce chantier que dans cette fenêtre. Laisse vide si aucune contrainte.
            </p>
          </div>
        </section>
      </div>

      <div className="flex gap-3 mt-8 justify-end">
        <button onClick={onCancel} className="btn-secondary">Annuler</button>
        <button onClick={submit} className="btn-primary"><I.save size={16} /> Enregistrer</button>
      </div>
    </div>
  );
}

function Field({ label, children }) {
  return <label className="block"><span className="label-cap block mb-1.5">{label}</span>{children}</label>;
}

function QuickModal({ chantier, binomes, onClose, onSave }) {
  const [date, setDate] = useState(chantier.scheduledDate || '');
  const [binId, setBinId] = useState(chantier.scheduledBinome || '');
  const [fixedTime, setFixedTime] = useState(chantier.fixedTime || '');
  const [status, setStatus] = useState(chantier.status || 'a_planifier');
  const canValidate = !!(date && binId && status !== 'en_attente'); // on ne valide qu'un chantier ayant date + binôme, hors attente
  const submit = (forceStatus) => {
    let newStatus = forceStatus || status;
    if (newStatus === 'valide' && !canValidate) newStatus = status; // garde-fou
    const finalDate = newStatus === 'en_attente' ? '' : date;
    const finalBinId = newStatus === 'en_attente' ? '' : binId;
    const finalFixedTime = newStatus === 'en_attente' ? '' : fixedTime;
    if (finalDate && finalBinId && newStatus === 'a_planifier') newStatus = 'planifie';
    onSave({ ...chantier, scheduledDate: finalDate, scheduledBinome: finalBinId, fixedTime: finalFixedTime || '', status: newStatus });
  };
  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-6 no-print" style={{ background: 'rgba(26,26,26,0.5)' }}>
      <div className="card p-6 max-w-md w-full fadein">
        <div className="flex items-start justify-between mb-4">
          <div>
            <h3 className="font-display text-2xl font-semibold">{chantier.clientName}</h3>
            <div className="text-sm" style={{ color: 'var(--ink-soft)' }}>{chantier.type} · {chantier.city}</div>
          </div>
          <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-soft)' }}><I.x size={20} /></button>
        </div>
        <div className="space-y-3 mb-6">
          <Field label="Date"><input type="date" value={date} onChange={e => setDate(e.target.value)} /></Field>
          <Field label="Heure approximative (optionnel)">
            <input type="time" value={fixedTime} onChange={e => setFixedTime(e.target.value)} step="900" />
            <p className="text-xs mt-1" style={{ color: 'var(--ink-faint)' }}>Pour une urgence à caser à un moment précis (ex : 14:00). Le chantier sera placé au plus près de cette heure dans la journée.</p>
          </Field>
          <Field label="Binôme">
            <select value={binId} onChange={e => setBinId(e.target.value)}>
              <option value="">—</option>
              {binomes.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
            </select>
          </Field>
          <Field label="Statut">
            <select value={status} onChange={e => setStatus(e.target.value)}>
              {Object.entries(STATUTS).map(([k, v]) => <option key={k} value={k} disabled={k === 'valide' && !canValidate}>{v.label}</option>)}
            </select>
          </Field>
          {status === 'valide' && (
            <div className="text-xs p-2 rounded flex items-center gap-1" style={{ background: STATUTS.valide.bg, color: STATUTS.valide.color }}>
              <I.lock size={12} /> Chantier verrouillé : il ne sera plus déplacé lors des réoptimisations.
            </div>
          )}
          {status === 'en_attente' && (
            <div className="text-xs p-2 rounded flex items-center gap-1" style={{ background: STATUTS.en_attente.bg, color: STATUTS.en_attente.color }}>
              <I.clock size={12} /> Chantier en attente : il sort de l'optimisation et sa date/binôme seront vidés.
            </div>
          )}
        </div>
        {chantier.status !== 'valide' ? (
          <div className="mb-4 pb-4" style={{ borderBottom: '1px solid var(--border)' }}>
            <button onClick={() => submit('valide')} disabled={!canValidate} className="btn-secondary w-full justify-center"
              style={{ borderColor: STATUTS.valide.color, color: canValidate ? STATUTS.valide.color : 'var(--ink-faint)' }}>
              <I.check size={16} /> Valider avec le client (verrouiller)
            </button>
            {!canValidate && <p className="text-xs mt-1" style={{ color: 'var(--ink-faint)' }}>Renseigne d'abord une date et un binôme pour pouvoir valider.</p>}
          </div>
        ) : (
          <div className="mb-4 pb-4" style={{ borderBottom: '1px solid var(--border)' }}>
            <button onClick={() => submit('planifie')} className="btn-secondary w-full justify-center">
              <I.unlock size={16} /> Dévalider (déverrouiller)
            </button>
          </div>
        )}
        <div className="flex gap-3 justify-end">
          <button onClick={onClose} className="btn-secondary">Annuler</button>
          <button onClick={() => submit()} className="btn-primary"><I.save size={16} /> Enregistrer</button>
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   FEUILLES DE ROUTE
   ========================================================================= */
function FeuillesDeRoute({ chantiers, binomes, depot }) {
  const [scope, setScope] = useState('jour'); // 'jour' | 'semaine'
  const [weekScope, setWeekScope] = useState('un'); // en mode semaine : 'un' binôme | 'tous'
  const [date, setDate] = useState(toISO(new Date()));
  const [binId, setBinId] = useState(binomes[0]?.id || '');
  const [preview, setPreview] = useState(false);
  const [previewWeek, setPreviewWeek] = useState(false);
  const [optimizing, setOptimizing] = useState(false);
  const [optError, setOptError] = useState(null);
  const [optResult, setOptResult] = useState(null);
  const [returnToDepot, setReturnToDepot] = useState(true);

  // Semaine (lundi→vendredi) contenant la date choisie
  const weekStart = useMemo(() => getWeekStart(parseISO(date)), [date]);
  const weekDays = useMemo(() => Array.from({ length: 5 }, (_, i) => toISO(addDays(weekStart, i))), [weekStart]);
  // Chantiers planifiés de la semaine, regroupés par binôme puis par jour (triés par ordre/CP)
  const weekData = useMemo(() => {
    const bins = weekScope === 'tous' ? binomes : binomes.filter(b => b.id === binId);
    return bins.map(b => {
      const byDay = weekDays.map(iso => {
        const list = chantiers
          .filter(c => c.scheduledDate === iso && c.scheduledBinome === b.id && c.status !== 'fait' && c.status !== 'en_attente')
          .sort((a, b2) => (a.postalCode || '').localeCompare(b2.postalCode || ''));
        return { iso, list };
      }).filter(d => d.list.length);
      const total = byDay.reduce((s, d) => s + d.list.reduce((ss, c) => ss + (c.estimatedDuration || 0), 0), 0);
      return { bin: b, byDay, total };
    }).filter(x => x.byDay.length);
  }, [chantiers, binomes, weekScope, binId, weekDays]);

  const baseList = useMemo(() => chantiers
    .filter(c => c.scheduledDate === date && c.scheduledBinome === binId)
    .sort((a, b) => (a.postalCode || '').localeCompare(b.postalCode || '')), [chantiers, date, binId]);

  useEffect(() => { setOptResult(null); setOptError(null); }, [date, binId]);

  const list = useMemo(() => {
    if (!optResult) return baseList.map(c => ({ ...c, legFromPrev: null }));
    const byId = Object.fromEntries(baseList.map(c => [c.id, c]));
    return optResult.orderIds.filter(id => byId[id]).map(id => ({ ...byId[id], legFromPrev: optResult.legs[id] ?? null }));
  }, [baseList, optResult]);

  const bin = binomes.find(b => b.id === binId);
  const totalH = list.reduce((s, c) => s + (c.estimatedDuration || 0), 0);
  const hasDepot = !!(depot && (depot.address || depot.city || depot.postalCode));

  const runOptimize = async () => {
    if (baseList.length < 2) { setOptError('Il faut au moins 2 chantiers planifiés ce jour-là pour optimiser une tournée.'); return; }
    setOptimizing(true); setOptError(null);
    try {
      const stopPts = [];
      for (const c of baseList) {
        const p = await geocodeFr(c.address, c.postalCode, c.city);
        if (!p) throw new Error(`Adresse introuvable : ${c.clientName} — « ${c.address} ${c.postalCode} ${c.city} ». Vérifie l'adresse du chantier.`);
        stopPts.push(p);
      }
      let depotPt = null;
      if (hasDepot) {
        depotPt = await geocodeFr(depot.address, depot.postalCode, depot.city);
        if (!depotPt) throw new Error("Adresse du dépôt introuvable — vérifie-la dans Paramètres.");
      }
      const points = depotPt ? [depotPt, ...stopPts] : stopPts;
      const { matrix, source } = await durationMatrix(points);
      const { order } = optimizeOrder(matrix, { start: 0, returnToStart: depotPt ? returnToDepot : false });

      const legs = {}; const orderIds = [];
      for (let i = 0; i < order.length; i++) {
        const idx = order[i];
        if (depotPt && idx === 0) continue;
        const ch = baseList[depotPt ? idx - 1 : idx];
        legs[ch.id] = i > 0 ? matrix[order[i - 1]][idx] : null;
        orderIds.push(ch.id);
      }
      let returnLeg = null;
      if (depotPt && returnToDepot) returnLeg = matrix[order[order.length - 1]][0];
      const totalDrive = order.reduce((s, idx, i) => i === 0 ? 0 : s + matrix[order[i - 1]][idx], 0) + (returnLeg || 0);

      setOptResult({ orderIds, legs, totalDrive, returnLeg, source, depotLabel: depotPt?.label || null });
    } catch (e) {
      console.error(e);
      setOptError(e.message || "Erreur pendant l'optimisation.");
    } finally {
      setOptimizing(false);
    }
  };

  if (previewWeek) return <PrintSheetWeek weekStart={weekStart} weekData={weekData} onBack={() => setPreviewWeek(false)} />;
  if (preview) return <PrintSheet date={date} binome={bin} chantiers={list} driveInfo={optResult} onBack={() => setPreview(false)} />;

  return (
    <div className="pt-10 fadein">
      <div className="mb-8">
        <div className="label-cap mb-2">Génération</div>
        <h1 className="font-display text-5xl leading-none tracking-tight">Feuilles de route</h1>
        <p className="mt-3 text-base max-w-xl" style={{ color: 'var(--ink-soft)' }}>
          Génère une feuille de route pour un <strong>jour</strong> (avec optimisation de l'ordre des arrêts) ou pour la <strong>semaine complète</strong> d'un binôme ou de tous les binômes.
        </p>
      </div>
      <div className="card p-6 mb-6">
        {/* Sélecteur de portée */}
        <div className="flex items-center gap-1 mb-5">
          {[{ id: 'jour', label: 'Un jour' }, { id: 'semaine', label: 'Semaine complète' }].map(s => (
            <button key={s.id} onClick={() => setScope(s.id)} className="px-4 py-2 text-sm font-medium"
              style={{ borderRadius: 3, border: '1px solid ' + (scope === s.id ? 'var(--accent)' : 'var(--border)'), background: scope === s.id ? 'var(--accent)' : 'transparent', color: scope === s.id ? '#fff' : 'var(--ink)', cursor: 'pointer' }}>
              {s.label}
            </button>
          ))}
        </div>

        {scope === 'jour' ? (
          <>
            <div className="grid md:grid-cols-3 gap-4">
              <Field label="Date"><input type="date" value={date} onChange={e => setDate(e.target.value)} /></Field>
              <Field label="Binôme">
                <select value={binId} onChange={e => setBinId(e.target.value)}>
                  {binomes.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              </Field>
              <div className="flex items-end">
                <button onClick={() => setPreview(true)} disabled={list.length === 0} className="btn-accent w-full justify-center">
                  <I.eye size={16} /> Aperçu / Imprimer
                </button>
              </div>
            </div>
            <div className="flex flex-wrap items-center gap-4 mt-4 pt-4" style={{ borderTop: '1px solid var(--border)' }}>
              <button onClick={runOptimize} disabled={optimizing || baseList.length < 2} className="btn-primary">
                {optimizing ? <><span className="spin"><I.loader size={16} /></span> Calcul des trajets...</> : <><I.mapPin size={16} /> Optimiser la tournée</>}
              </button>
              <label className="flex items-center gap-2 text-sm" style={{ color: 'var(--ink-soft)' }}>
                <input type="checkbox" checked={returnToDepot} onChange={e => setReturnToDepot(e.target.checked)} /> Retour au dépôt en fin de journée
              </label>
              {!hasDepot && <span className="text-xs" style={{ color: 'var(--ink-faint)' }}>Astuce : renseigne l'adresse du dépôt dans Paramètres pour un calcul plus juste.</span>}
              {optError && <span className="text-xs" style={{ color: 'var(--accent)' }}>{optError}</span>}
            </div>
            {optResult && (
              <div className="flex flex-wrap items-center gap-6 mt-4 p-3 rounded" style={{ background: 'var(--cream)' }}>
                <div><div className="label-cap">Temps de route total</div><div className="font-display text-2xl font-bold">{fmtDuration(optResult.totalDrive)}</div></div>
                <div><div className="label-cap">Journée (pose + route)</div><div className="font-display text-2xl font-bold" style={{ color: (totalH + optResult.totalDrive / 3600) > 8 ? 'var(--accent)' : 'var(--ink)' }}>{fmtDuration(totalH * 3600 + optResult.totalDrive)}</div></div>
                <div className="text-xs" style={{ color: 'var(--ink-faint)' }}>
                  {(optResult.source === 'ors' || optResult.source === 'osrm') ? 'Temps de trajet réels (réseau routier).' : "Estimation à vol d'oiseau (service de routage indisponible)."}
                </div>
              </div>
            )}
          </>
        ) : (
          <>
            <div className="grid md:grid-cols-3 gap-4">
              <Field label="Semaine du">
                <input type="date" value={date} onChange={e => setDate(e.target.value)} />
              </Field>
              <Field label="Portée">
                <select value={weekScope} onChange={e => setWeekScope(e.target.value)}>
                  <option value="un">Un binôme</option>
                  <option value="tous">Tous les binômes</option>
                </select>
              </Field>
              {weekScope === 'un' ? (
                <Field label="Binôme">
                  <select value={binId} onChange={e => setBinId(e.target.value)}>
                    {binomes.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                  </select>
                </Field>
              ) : <div />}
            </div>
            <div className="flex flex-wrap items-center gap-4 mt-4 pt-4" style={{ borderTop: '1px solid var(--border)' }}>
              <button onClick={() => setPreviewWeek(true)} disabled={weekData.length === 0} className="btn-accent">
                <I.eye size={16} /> Aperçu / Imprimer la semaine
              </button>
              <span className="text-xs" style={{ color: 'var(--ink-faint)' }}>
                Semaine du {weekStart.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })} · {weekData.length === 0 ? 'aucun chantier planifié' : `${weekData.reduce((s, w) => s + w.byDay.reduce((ss, d) => ss + d.list.length, 0), 0)} chantier(s)`}
              </span>
            </div>
            {weekData.length === 0 && (
              <p className="text-xs mt-3" style={{ color: 'var(--ink-faint)' }}>
                Aucun chantier planifié cette semaine pour cette sélection. Génère d'abord un planning dans l'onglet Planning (« Accepter et enregistrer »).
              </p>
            )}
          </>
        )}
      </div>
      {scope === 'jour' && (
      <div className="card p-6">
        <div className="flex items-center justify-between mb-4">
          <h2 className="font-display text-2xl font-semibold">{bin?.name} · {fmtDateLong(date)}</h2>
          <div className="text-right">
            <div className="label-cap">Total pose</div>
            <div className="font-display text-3xl font-bold" style={{ color: totalH > 8 ? 'var(--accent)' : 'var(--ink)' }}>{totalH}h</div>
          </div>
        </div>
        {list.length === 0 ? <EmptyState text="Aucun chantier prévu ce jour." /> : (
          <ol className="space-y-3">
            {hasDepot && optResult && (
              <li className="flex items-center gap-2 text-xs font-mono" style={{ color: 'var(--ink-faint)' }}>
                <I.mapPin size={14} /> Départ dépôt{optResult.depotLabel ? ` · ${optResult.depotLabel}` : ''}
              </li>
            )}
            {list.map((c, i) => (
              <li key={c.id}>
                {c.legFromPrev != null && (
                  <div className="flex items-center gap-2 text-xs font-mono py-1 pl-4" style={{ color: 'var(--ink-faint)' }}>
                    <I.arrowR size={12} /> {fmtDuration(c.legFromPrev)} de route
                  </div>
                )}
                <div className="flex gap-4 p-3 rounded" style={{ background: 'var(--cream)' }}>
                  <div className="w-8 h-8 rounded-full flex items-center justify-center font-display font-semibold shrink-0" style={{ background: bin?.color, color: 'white' }}>{i + 1}</div>
                  <div className="flex-1 min-w-0">
                    <div className="font-medium">{c.clientName}</div>
                    <div className="text-sm" style={{ color: 'var(--ink-soft)' }}>{c.address}, {c.postalCode} {c.city} · {c.type} · {c.estimatedDuration}h</div>
                    {c.constraints && <div className="text-xs mt-1" style={{ color: 'var(--accent)' }}>⚠ {c.constraints}</div>}
                  </div>
                </div>
              </li>
            ))}
            {optResult && optResult.returnLeg != null && (
              <li className="flex items-center gap-2 text-xs font-mono py-1 pl-4" style={{ color: 'var(--ink-faint)' }}>
                <I.arrowR size={12} /> {fmtDuration(optResult.returnLeg)} de route · retour dépôt
              </li>
            )}
          </ol>
        )}
      </div>
      )}
    </div>
  );
}

function PrintSheetWeek({ weekStart, weekData, onBack }) {
  const weekLabel = `${weekStart.toLocaleDateString('fr-FR', { day: '2-digit', month: 'long' })} – ${addDays(weekStart, 4).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' })}`;
  return (
    <div className="pt-10 fadein">
      <div className="no-print flex gap-3 mb-6">
        <button onClick={onBack} className="btn-secondary"><I.chevL size={16} /> Retour</button>
        <button onClick={() => window.print()} className="btn-primary"><I.printer size={16} /> Imprimer</button>
      </div>
      {weekData.map(({ bin, byDay, total }, bi) => (
        <div key={bin.id} className="card p-10 print-page mb-8" style={{ maxWidth: 820, margin: '0 auto 2rem', background: 'white', pageBreakAfter: bi < weekData.length - 1 ? 'always' : 'auto' }}>
          <div className="flex justify-between items-start pb-6 mb-6" style={{ borderBottom: '2px solid var(--ink)' }}>
            <div>
              <div className="font-mono text-xs uppercase tracking-widest" style={{ color: 'var(--ink-soft)' }}>FEUILLE DE ROUTE HEBDO · JM BÂCHES</div>
              <h1 className="font-display text-4xl font-bold mt-1">Semaine du {weekLabel}</h1>
            </div>
            <div className="text-right">
              <div className="label-cap">Binôme</div>
              <div className="font-display text-2xl font-semibold" style={{ color: bin.color }}>{bin.name}</div>
              <div className="text-sm" style={{ color: 'var(--ink-soft)' }}>{bin.members?.join(' · ')}</div>
              <div className="no-print flex gap-2 mt-2 justify-end">
                <button onClick={() => sendSMS(bin.phone, routeWeekText({ bin, byDay, weekLabel }))} className="btn-secondary" style={{ padding: '6px 10px', fontSize: 12 }}><I.phone size={13} /> SMS</button>
                <button onClick={() => sendEmail(bin.email, `Feuille de route ${bin.name} — semaine du ${weekLabel}`, routeWeekText({ bin, byDay, weekLabel }))} className="btn-secondary" style={{ padding: '6px 10px', fontSize: 12 }}><I.mail size={13} /> Email</button>
              </div>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-4 mb-8 pb-6" style={{ borderBottom: '1px solid var(--border)' }}>
            <div><div className="label-cap">Jours travaillés</div><div className="font-display text-3xl font-bold">{byDay.length}</div></div>
            <div><div className="label-cap">Chantiers</div><div className="font-display text-3xl font-bold">{byDay.reduce((s, d) => s + d.list.length, 0)}</div></div>
            <div><div className="label-cap">Heures pose</div><div className="font-display text-3xl font-bold">{total}h</div></div>
          </div>

          {byDay.map(({ iso, list }) => {
            const dayH = list.reduce((s, c) => s + (c.estimatedDuration || 0), 0);
            return (
              <div key={iso} className="mb-7">
                <div className="flex items-baseline justify-between mb-3 pb-1" style={{ borderBottom: '1px solid var(--border-strong)' }}>
                  <h2 className="font-display text-xl font-semibold" style={{ textTransform: 'capitalize' }}>{fmtDateLong(iso)}</h2>
                  <span className="font-mono text-xs" style={{ color: 'var(--ink-faint)' }}>{list.length} chantier(s) · {dayH}h</span>
                </div>
                <div className="space-y-3">
                  {list.map((c, i) => (
                    <div key={c.id} className="pl-4 pb-3" style={{ borderLeft: '4px solid ' + bin.color }}>
                      <div className="flex items-start justify-between">
                        <div>
                          <span className="font-mono text-xs mr-2" style={{ color: 'var(--ink-faint)' }}>{String(i + 1).padStart(2, '0')}</span>
                          <span className="font-display text-lg font-semibold">{c.clientName}</span>
                          <div className="text-sm mt-0.5" style={{ color: 'var(--ink-soft)' }}>{c.address}, {c.postalCode} {c.city}</div>
                          <div className="text-sm" style={{ color: 'var(--ink-soft)' }}>{c.type}{c.dimensions ? ` · ${c.dimensions}` : ''}{c.clientPhone ? ` · ${c.clientPhone}` : ''}</div>
                          {c.materials?.length > 0 && <div className="text-xs mt-1"><span className="label-cap mr-1">Matériel</span>{c.materials.join(', ')}</div>}
                          {c.constraints && <div className="mt-1 text-sm" style={{ color: 'var(--accent-deep)' }}>⚠ {c.constraints}</div>}
                        </div>
                        <div className="text-right shrink-0 ml-3">
                          <div className="font-display text-xl font-bold">{c.estimatedDuration}h</div>
                        </div>
                      </div>
                      <div className="mt-2 grid grid-cols-3 gap-3 text-xs" style={{ color: 'var(--ink-faint)' }}>
                        <div style={{ borderBottom: '1px dotted var(--border-strong)', paddingBottom: 10 }}>Arrivée : ____</div>
                        <div style={{ borderBottom: '1px dotted var(--border-strong)', paddingBottom: 10 }}>Départ : ____</div>
                        <div style={{ borderBottom: '1px dotted var(--border-strong)', paddingBottom: 10 }}>Signature : ____</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
          <div className="mt-6 pt-4 text-xs text-center" style={{ color: 'var(--ink-faint)', borderTop: '1px solid var(--border)' }}>
            Édité le {new Date().toLocaleDateString('fr-FR')} · JM Bâches · Feuille de route hebdomadaire
          </div>
        </div>
      ))}
    </div>
  );
}

              <div className="pl-4 pb-4" style={{ borderLeft: '4px solid ' + binome?.color, borderBottom: '1px solid var(--border)' }}>

          ))}
          {driveInfo && driveInfo.returnLeg != null && (
            <div className="font-mono text-xs pl-4" style={{ color: 'var(--ink-faint)' }}>↓ {fmtDuration(driveInfo.returnLeg)} de route · retour au dépôt</div>
          )}
        </div>
        <div className="mt-8 pt-4 text-xs text-center" style={{ color: 'var(--ink-faint)', borderTop: '1px solid var(--border)' }}>
          Édité le {new Date().toLocaleDateString('fr-FR')} · JM Bâches · Feuille de route à conserver
        </div>
      </div>
    </div>
  );
}

/* =========================================================================
   EXPORT EXCEL — emplois du temps vers .xlsx (onglet liste + onglet grille)
   ========================================================================= */
const JOURS_FR = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];

function eventLabel(ev) {
  switch (ev.type) {
    case 'pose': return ev.chantier ? (ev.chantier.clientName + (ev.contd ? ' (suite)' : '')) : 'Pose';
    case 'lunch': return 'Déjeuner';
    case 'travel': return 'Trajet inter-chantiers';
    case 'travelApproach': return ev.returnDepot ? 'Retour dépôt (matin)' : (ev.fromDepot ? 'Trajet depuis le siège' : 'Trajet (reporté au matin)');
    case 'travelEvening': return ev.returnDepot ? 'Retour au siège (soir)' : 'Trajet soir (nuit sur place)';
    default: return ev.type;
  }
}

// edtStore : { weekKey: { schedules, usedPools, ... } } ; binomes ; weeksToExport : liste de weekKey
function exportEdtToExcel(edtStore, binomes, weeksToExport, depot) {
  if (typeof XLSX === 'undefined') { alert("La librairie d'export n'est pas chargée. Vérifie ta connexion puis réessaie."); return false; }
  const binName = (id) => (binomes.find(b => b.id === id)?.name) || id;

  // ----- Onglet 1 : LISTE À PLAT -----
  const listRows = [['Semaine','Date','Jour','Binôme','Début','Fin','Durée','Type','Client','Adresse','Ville','CP','Téléphone','Contraintes']];
  // ----- Onglet 2 : GRILLE (jours en colonnes) -----
  const gridRows = [];
  // Coloration par durée : listFills[rowIndex] = hex ; gridFills["r,c"] = hex
  const listFills = {}; const gridFills = {};

  weeksToExport.forEach(wk => {
    const data = edtStore[wk];
    if (!data || !data.schedules) return;
    const monday = parseISO(wk);
    const weekLabel = `${monday.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit'})} – ${addDays(monday,5).toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'})}`;
    const dayISOs = Array.from({length:6},(_,i)=>toISO(addDays(monday,i)));

    binomes.forEach(bin => {
      const res = data.schedules[bin.id];
      if (!res) return;

      // LISTE : parcourt chaque jour, chaque event
      dayISOs.forEach((iso, di) => {
        const plan = res.dayPlans[iso];
        if (!plan || !plan.events.length) return;
        plan.events.forEach(ev => {
          const c = ev.chantier || {};
          if (ev.type === 'pose') listFills[listRows.length] = dureeColor(c.estimatedDuration).excel; // colore la ligne de pose
          listRows.push([
            weekLabel, iso, JOURS_FR[di], binName(bin.id),
            minToHHMM(ev.start), minToHHMM(ev.end),
            fmtDuration((ev.end - ev.start) * 60),
            eventLabel(ev),
            ev.type === 'pose' ? (c.clientName || '') : '',
            ev.type === 'pose' ? (c.address || '') : '',
            ev.type === 'pose' ? (c.city || '') : '',
            ev.type === 'pose' ? (c.postalCode || '') : '',
            ev.type === 'pose' ? (c.clientPhone || '') : '',
            ev.type === 'pose' ? (c.constraints || '') : '',
          ]);
        });
        // Ligne récap retour siège (durée + statut), sauf le dernier jour de pose (retour géré le vendredi)
        if (!plan.isLastPoseDay && !plan.returnOnly && plan.siegeReturnSec > 0) {
          listRows.push([
            weekLabel, iso, JOURS_FR[di], binName(bin.id), '', '',
            fmtDuration(plan.siegeReturnSec),
            plan.staysOnSite ? `Retour siège (info) — NUIT SUR PLACE` : `Retour au siège le soir`,
            '', '', '', '', '', '',
          ]);
        }
      });

      // GRILLE : un bloc par binôme, jours en colonnes, créneaux empilés
      gridRows.push([`Semaine ${weekLabel}`, bin.name, bin.members ? bin.members.join(' · ') : '']);
      gridRows.push(['', ...JOURS_FR]);
      // construit, pour chaque jour, la liste de {texte, couleur} ; couleur seulement pour les poses
      const cols = dayISOs.map(iso => {
        const plan = res.dayPlans[iso];
        if (!plan) return [];
        return plan.events.map(ev => ({
          text: `${minToHHMM(ev.start)}–${minToHHMM(ev.end)} ${eventLabel(ev)}`,
          fill: ev.type === 'pose' && ev.chantier ? dureeColor(ev.chantier.estimatedDuration).excel : null,
        }));
      });
      const maxLines = Math.max(0, ...cols.map(c => c.length));
      for (let r = 0; r < maxLines; r++) {
        const rowIdx = gridRows.length;
        cols.forEach((col, ci) => { if (col[r] && col[r].fill) gridFills[`${rowIdx},${ci + 1}`] = col[r].fill; });
        gridRows.push(['', ...cols.map(c => (c[r] ? c[r].text : ''))]);
      }
      // pied : fin de journée + temps de route
      gridRows.push(['Fin / route', ...dayISOs.map(iso => {
        const plan = res.dayPlans[iso];
        if (!plan) return '';
        if (plan.returnOnly) return 'Retour dépôt';
        return `fin ${minToHHMM(plan.endMin)} · ${fmtDuration(plan.totalDriveSec)} route`;
      })]);
      // pied : retour siège (durée + statut) pour chaque jour de pose
      gridRows.push(['Retour siège', ...dayISOs.map(iso => {
        const plan = res.dayPlans[iso];
        if (!plan || plan.returnOnly || plan.isLastPoseDay || !plan.siegeReturnSec) return '';
        return `${plan.staysOnSite ? 'Nuit sur place' : 'Rentre au siège'} · ${fmtDuration(plan.siegeReturnSec)}`;
      })]);
      gridRows.push([]); // ligne vide entre binômes
    });
  });

  if (listRows.length <= 1) { alert("Aucun emploi du temps enregistré à exporter pour cette sélection."); return false; }

  const wb = XLSX.utils.book_new();
  const wsList = XLSX.utils.aoa_to_sheet(listRows);
  wsList['!cols'] = [{wch:16},{wch:11},{wch:9},{wch:12},{wch:7},{wch:7},{wch:8},{wch:24},{wch:20},{wch:24},{wch:16},{wch:7},{wch:15},{wch:30}];

  // Style d'en-tête (bleu marque JM Bâches, texte blanc) — onglet Liste
  const headFill = { fill: { fgColor: { rgb: '1B5FCC' } }, font: { color: { rgb: 'FFFFFF' }, bold: true }, alignment: { vertical: 'center' } };
  for (let col = 0; col < listRows[0].length; col++) {
    const ref = XLSX.utils.encode_cell({ r: 0, c: col });
    if (wsList[ref]) wsList[ref].s = headFill;
  }
  // Coloration des lignes de pose selon la durée (toute la ligne)
  Object.entries(listFills).forEach(([rowIdx, rgb]) => {
    const r = parseInt(rowIdx, 10);
    for (let col = 0; col < listRows[0].length; col++) {
      const ref = XLSX.utils.encode_cell({ r, c: col });
      if (wsList[ref]) wsList[ref].s = { fill: { fgColor: { rgb } } };
    }
  });
  XLSX.utils.book_append_sheet(wb, wsList, 'Liste');

  const wsGrid = XLSX.utils.aoa_to_sheet(gridRows);
  wsGrid['!cols'] = [{wch:16},{wch:30},{wch:30},{wch:30},{wch:30},{wch:30},{wch:30}];
  // Coloration des cellules de pose dans la grille
  Object.entries(gridFills).forEach(([rc, rgb]) => {
    const [r, c] = rc.split(',').map(Number);
    const ref = XLSX.utils.encode_cell({ r, c });
    if (wsGrid[ref]) wsGrid[ref].s = { fill: { fgColor: { rgb } }, alignment: { vertical: 'center' } };
  });
  XLSX.utils.book_append_sheet(wb, wsGrid, 'Grille');

  const stamp = new Date().toISOString().split('T')[0];
  const fname = weeksToExport.length === 1
    ? `JM_Baches_planning_${weeksToExport[0]}.xlsx`
    : `JM_Baches_plannings_${stamp}.xlsx`;
  XLSX.writeFile(wb, fname);
  return true;
}

/* =========================================================================
   CARTE DES TRAJETS — marqueurs numérotés + lignes par binôme (Leaflet/OSM)
   ========================================================================= */
function TrajetsMap({ schedules, binomes, days }) {
  const mapRef = useRef(null);
  const containerRef = useRef(null);

  // Construit, par binôme, la liste ordonnée des points {lat, lon, label, day} à relier.
  const routes = useMemo(() => {
    const out = [];
    binomes.forEach(bin => {
      const res = schedules[bin.id];
      if (!res || !res.assignments) return;
      // points = dépôt (départ) + chantiers triés par date puis ordre, avec coords valides
      const pts = res.assignments
        .filter(a => a.geo && typeof a.geo.lat === 'number')
        .slice()
        .sort((a, b) => (a.iso || '').localeCompare(b.iso || '') || (a.order - b.order))
        .map(a => ({ lat: a.geo.lat, lon: a.geo.lon, iso: a.iso }));
      if (!pts.length) return;
      out.push({ bin, depotGeo: res.depotGeo, pts });
    });
    return out;
  }, [schedules, binomes]);

  const hasPoints = routes.some(r => r.pts.length);

  useEffect(() => {
    if (typeof L === 'undefined' || !containerRef.current || !hasPoints) return;
    // (ré)initialise la carte
    if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; }
    const map = L.map(containerRef.current, { scrollWheelZoom: false });
    mapRef.current = map;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap', maxZoom: 18,
    }).addTo(map);

    const allLatLng = [];
    routes.forEach(({ bin, depotGeo, pts }) => {
      const color = bin.color || '#1B5FCC';
      const seq = [];
      if (depotGeo) seq.push({ lat: depotGeo.lat, lon: depotGeo.lon, depot: true });
      pts.forEach(p => seq.push(p));

      // polyligne reliant dépôt → chantiers dans l'ordre
      const line = seq.map(p => [p.lat, p.lon]);
      if (line.length > 1) L.polyline(line, { color, weight: 3, opacity: 0.7 }).addTo(map);

      // marqueurs : dépôt (carré) + chantiers numérotés
      let n = 0;
      seq.forEach(p => {
        allLatLng.push([p.lat, p.lon]);
        if (p.depot) {
          L.marker([p.lat, p.lon], {
            icon: L.divIcon({ className: '', html: `<div style="background:#1C1E22;color:#fff;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">D</div>`, iconSize: [22, 22], iconAnchor: [11, 11] }),
          }).addTo(map).bindPopup('Dépôt JM Bâches');
        } else {
          n++;
          L.marker([p.lat, p.lon], {
            icon: L.divIcon({ className: '', html: `<div style="background:${color};color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)">${n}</div>`, iconSize: [24, 24], iconAnchor: [12, 12] }),
          }).addTo(map).bindPopup(`${bin.name} · arrêt ${n}`);
        }
      });
    });

    if (allLatLng.length) {
      map.fitBounds(allLatLng, { padding: [30, 30], maxZoom: 12 });
    }
    // Leaflet a besoin d'un recalcul de taille après rendu
    setTimeout(() => map.invalidateSize(), 200);

    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, [routes, hasPoints]);

  if (!hasPoints) return null;

  return (
    <div className="card p-6 mb-6">
      <div className="flex items-center justify-between flex-wrap gap-2 mb-3">
        <div>
          <div className="label-cap mb-1">Carte des tournées</div>
          <h2 className="font-display text-2xl font-semibold leading-none">Trajets de la semaine</h2>
        </div>
        <div className="flex items-center gap-4 text-xs" style={{ color: 'var(--ink-soft)' }}>
          <span className="flex items-center gap-1"><span style={{ width: 14, height: 14, background: 'var(--charcoal)', borderRadius: 3, display: 'inline-block' }} /> Dépôt</span>
          {binomes.map(b => schedules[b.id] && (
            <span key={b.id} className="flex items-center gap-1"><span style={{ width: 14, height: 14, background: b.color, borderRadius: '50%', display: 'inline-block' }} /> {b.name}</span>
          ))}
        </div>
      </div>
      <div ref={containerRef} style={{ height: 420, width: '100%', borderRadius: 6, overflow: 'hidden', border: '1px solid var(--border)' }} />
      <p className="text-xs mt-2" style={{ color: 'var(--ink-faint)' }}>
        Les numéros indiquent l'ordre de passage sur la semaine. Les lignes relient les points à vol d'oiseau (visualisation approximative, pas l'itinéraire routier exact).
      </p>
    </div>
  );
}

/* =========================================================================
   EMPLOI DU TEMPS — planning minuté heure par heure, jour par jour
   ========================================================================= */
function EmploiDuTemps({ chantiers, binomes, depot, workday, unavail, upsert, showToast, setTab }) {
  const [weekStart, setWeekStart] = useState(getWeekStart(new Date()));
  const [schedules, setSchedules] = useState({}); // binId -> { dayPlans, assignments, overflow, source, count }
  const [usedPools, setUsedPools] = useState(null); // pools réellement utilisés (clusters en mode auto)
  const [ungeocoded, setUngeocoded] = useState([]);
  const [computing, setComputing] = useState(false);
  const [progress, setProgress] = useState('');
  const [error, setError] = useState(null);
  const [applied, setApplied] = useState(false);
  const [mode, setMode] = useState('auto'); // 'auto' = par zone géographique · 'manual' = binômes déjà assignés
  const [editingCh, setEditingCh] = useState(null); // chantier en cours d'assignation manuelle
  const [forceAll, setForceAll] = useState(false); // true = "Tout réoptimiser" (ignore le figeage par semaine)
  const [savedAt, setSavedAt] = useState(null);     // horodatage du dernier enregistrement de cette semaine
  const [mailFor, setMailFor] = useState(null);     // chantier dont on prépare l'e-mail (affiche le choix proposition/confirmation)
  const [exportMenu, setExportMenu] = useState(false); // affiche le choix d'export Excel

  const weekKey = useMemo(() => toISO(weekStart), [weekStart]); // clé d'enregistrement = lundi ISO

  const days = useMemo(() => Array.from({ length: 6 }, (_, i) => addDays(weekStart, i)), [weekStart]);
  const weekLabel = `${weekStart.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' })} – ${addDays(weekStart, 5).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' })}`;

  // Un chantier est "figé" s'il a déjà une date planifiée sur une AUTRE semaine que celle affichée.
  // Par défaut, l'optimisation ne touche pas à ces chantiers (stabilité du planning).
  // Le bouton "Tout réoptimiser" (forceAll) ignore le figeage et repart de zéro sur tout.
  const weekEnd = useMemo(() => addDays(weekStart, 7), [weekStart]);
  const inThisWeek = (c) => c.scheduledDate && parseISO(c.scheduledDate) >= weekStart && parseISO(c.scheduledDate) < weekEnd;
  const isFrozenElsewhere = (c) => c.scheduledDate && !inThisWeek(c);

  const frozenCount = useMemo(() => chantiers.filter(c => c.status !== 'fait' && c.status !== 'en_attente' && isFrozenElsewhere(c)).length, [chantiers, weekStart]);

  // Indisponibilités tombant sur les jours de pose (lun→jeu) de la semaine affichée
  const weekUnavail = useMemo(() => {
    const poseISO = [0, 1, 2, 3].map(i => toISO(addDays(weekStart, i)));
    const out = [];
    (unavail || []).forEach(u => {
      const jours = poseISO.filter(iso => iso >= (u.from || u.to) && iso <= (u.to || u.from));
      if (jours.length) out.push({ ...u, jours });
    });
    return out;
  }, [unavail, weekStart]);

  // Chantiers VALIDÉS (verrouillés) tombant dans la semaine affichée
  const weekValidated = useMemo(() => {
    const poseISO = [0, 1, 2, 3].map(i => toISO(addDays(weekStart, i)));
    return chantiers.filter(c => c.status === 'valide' && poseISO.includes(c.scheduledDate))
      .sort((a, b) => (a.scheduledDate || '').localeCompare(b.scheduledDate || ''));
  }, [chantiers, weekStart]);

  // Chantiers PLANIFIÉS ou VALIDÉS de la semaine affichée (pour la liste de validation au cas par cas),
  // groupés par binôme puis triés par date.
  const weekByBin = useMemo(() => {
    const poseISO = [0, 1, 2, 3].map(i => toISO(addDays(weekStart, i)));
    return binomes.map(b => ({
      bin: b,
      list: chantiers
        .filter(c => c.scheduledBinome === b.id && poseISO.includes(c.scheduledDate) && (c.status === 'planifie' || c.status === 'valide'))
        .sort((x, y) => (x.scheduledDate || '').localeCompare(y.scheduledDate || '')),
    })).filter(g => g.list.length);
  }, [chantiers, binomes, weekStart]);

  const toggleValidate = (c) => {
    if (c.status === 'valide') { upsert({ ...c, status: 'planifie' }); showToast && showToast('Chantier dévalidé'); }
    else if (c.scheduledDate && c.scheduledBinome) { upsert({ ...c, status: 'valide' }); showToast && showToast('Chantier validé (verrouillé)'); }
  };

  // Ouvre la messagerie avec un e-mail de confirmation de la date de pose, pré-rempli.
  // Construit le corps de l'e-mail selon le genre ('proposition' ou 'confirmation') et le type de volet.
  const buildEmail = (c, genre) => {
    const dateTxt = c.scheduledDate ? parseISO(c.scheduledDate).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }) : '[Date]';
    const type = (c.type || '').toLowerCase();
    const sign = `Cordialement,\n\nService Planning\nJM Bâches — ZA, 11 rue des Tilleuls, 26120 Montélier\nTél. 04.75.58.92.55 — www.jmbaches.com`;

    if (genre === 'proposition') {
      return {
        objet: 'PROPOSITION RENDEZ-VOUS INTERVENTION',
        corps:
`Bonjour,

Je vous contacte dans le cadre de l'installation de votre volet de piscine / l'intervention sur votre volet de piscine.
Afin de planifier l'intervention, je vous propose le créneau suivant :

Date : ${dateTxt}

Merci de bien vouloir me confirmer votre disponibilité pour ce rendez-vous dans un délai de 7 jours.
Sans retour de votre part passé ce délai, ce créneau pourra être attribué à un autre client.

Dans le cas contraire, n'hésitez pas à me communiquer vos disponibilités afin que nous puissions convenir d'un autre créneau.
Je reste à votre disposition pour toute question complémentaire.

Dans l'attente de votre retour, je vous souhaite une excellente journée.

${sign}`,
      };
    }

    // --- Confirmation : consignes techniques selon le type de volet ---
    // valeurs par défaut (texte générique)
    let duree = c.estimatedDuration ? `${String(c.estimatedDuration).replace('.', 'h').replace('h5', 'h30')}${String(c.estimatedDuration).includes('.') ? '' : 'h00'}` : '';
    let consignes = '';
    let prepa = '';
    let objet = 'CONFIRMATION RENDEZ-VOUS INSTALLATION';

    const isImmergeTotal = /immerg.*total/.test(type);
    const isImmerge = /immerg/.test(type) && !isImmergeTotal;
    const isDeplacable = /d\u00e9pla\u00e7able|mouv/.test(type);
    const isHorsSol = /hors-sol|silver|golden|coffre|x-trem/.test(type);

    if (isImmergeTotal) {
      duree = '6H30'; objet = 'CONFIRMATION RENDEZ-VOUS INSTALLATION VOLET IMMERGE TOTAL';
      prepa = 'Le bassin devra être en eau et la fosse devra être vide. Les câbles devront être tirés,';
    } else if (isImmerge) {
      duree = '4H00'; objet = 'CONFIRMATION RENDEZ-VOUS INSTALLATION VOLET IMMERGE';
      prepa = 'Le bassin devra être en eau et le câblage électrique devra être tiré,';
    } else if (isDeplacable) {
      duree = '3H30'; objet = 'CONFIRMATION RENDEZ-VOUS INSTALLATION VOLET HORS SOL DEPLACABLE - MOUV';
      prepa = 'Le bassin devra être en eau, le câblage électrique tiré ainsi que les abords de la piscine faits,';
    } else if (isHorsSol) {
      duree = '2H30'; objet = 'CONFIRMATION RENDEZ-VOUS INSTALLATION VOLET HORS SOL FIXE - SILVER';
      prepa = 'Le bassin devra être en eau, le câblage électrique tiré ainsi que les abords de la piscine faits,';
    }

    // Texte spécifique (volets) vs générique (SAV, métrage, remplacement…)
    if (isImmergeTotal || isImmerge || isDeplacable || isHorsSol) {
      return {
        objet,
        corps:
`Bonjour,

C'est avec plaisir que je vous confirme la date d'installation de votre volet roulant de piscine, le ${dateTxt}. Le transporteur vous contactera pour la livraison de votre volet avant l'intervention afin de fixer un rendez-vous.
Notre équipe d'installateurs se permettra de vous joindre afin de vous indiquer avec plus de précisions leur heure d'arrivée.

Solde à régler au déchargement :
Solde à régler à l'issue de l'installation :
