Au plaisir de notre prochain contact, je vous prie de croire en toute ma considération.

${sign}`,
      };
    }

    // Générique (types sans mail dédié)
    const dureeTxt = c.estimatedDuration ? `${c.estimatedDuration} h` : '';
    return {
      objet: 'CONFIRMATION RENDEZ-VOUS INTERVENTION',
      corps:
`Bonjour,

C'est avec plaisir que je vous confirme la date de notre intervention sur votre volet de piscine, le ${dateTxt}.
Notre équipe se permettra de vous joindre afin de vous indiquer avec plus de précisions son heure d'arrivée.
Cette intervention nécessite en règle générale ${dureeTxt} de travail.

Votre présence en fin d'intervention reste nécessaire.

Au plaisir de notre prochain contact, je vous prie de croire en toute ma considération.

${sign}`,
    };
  };

  const openMail = (c, genre) => {
    const { objet, corps } = buildEmail(c, genre);
    const to = encodeURIComponent(c.clientEmail || '');
    const url = `mailto:${to}?subject=${encodeURIComponent(objet)}&body=${encodeURIComponent(corps)}`;
    const a = document.createElement('a');
    a.href = url; document.body.appendChild(a); a.click(); document.body.removeChild(a);
    if (!c.clientEmail) showToast && showToast('Aucun e-mail client : le message s\'ouvre sans destinataire.');
    setMailFor(null);
  };

  // Pool optimisable : tout sauf les chantiers terminés, VALIDÉS (verrouillés) ou EN ATTENTE, et sauf figés ailleurs.
  const optimizable = useMemo(() =>
    chantiers.filter(c => !(c.status === 'fait' || c.status === 'valide' || c.status === 'en_attente') && (forceAll || !isFrozenElsewhere(c))),
    [chantiers, weekStart, forceAll]);

  const manualPools = useMemo(() => binomes.map(b => ({ bin: b, pool: optimizable.filter(c => c.scheduledBinome === b.id) })), [binomes, optimizable]);
  const unassigned = useMemo(() => optimizable.filter(c => !c.scheduledBinome), [optimizable]);
  const allToPlan = optimizable;
  const hasAny = mode === 'auto' ? allToPlan.length > 0 : manualPools.some(p => p.pool.length);

  // Au changement de semaine (ou de mode), on repart à blanc PUIS on tente de recharger
  // l'emploi du temps enregistré pour cette semaine (affiché à l'identique).
  useEffect(() => {
    setSchedules({}); setUsedPools(null); setUngeocoded([]); setError(null); setApplied(false); setForceAll(false); setSavedAt(null);
    const all = sGet(SK.edt, {});
    const saved = all[weekKey];
    if (saved && saved.schedules) {
      setSchedules(saved.schedules);
      setUsedPools(saved.usedPools || null);
      setUngeocoded(saved.ungeocoded || []);
      setSavedAt(saved.savedAt || null);
    }
  }, [weekStart, mode]);

  const compute = async (force = false) => {
    setForceAll(force);
    setComputing(true); setError(null); setApplied(false); setUngeocoded([]);
    // pool recalculé ici selon 'force' (ne dépend pas du re-render de setForceAll)
    // Interv. 2 d'un chantier en deux temps : on ne la planifie pas tant que l'interv. 1 n'a pas de date
    // (sinon la 2ᵉ pourrait passer avant la 1ʳᵉ). Elle attendra le prochain calcul, une fois l'interv.1 posée.
    const interv1Planned = (c) => {
      if (!(c.linkId && c.linkRole === 2)) return true;
      const i1 = chantiers.find(x => x.linkId === c.linkId && x.linkRole === 1);
      return !!(i1 && i1.scheduledDate);
    };
    const pool = chantiers.filter(c => !(c.status === 'fait' || c.status === 'valide' || c.status === 'en_attente') && (force || !isFrozenElsewhere(c)) && interv1Planned(c));
    const mPools = binomes.map(b => ({ bin: b, pool: pool.filter(c => c.scheduledBinome === b.id) }));
    // Jours déjà occupés par un chantier VALIDÉ (verrouillé) cette semaine, par binôme → on n'y replanifie rien.
    const weekISO = days.slice(0, 4).map(d => toISO(d));
    const lockedDaysByBin = {};
    binomes.forEach(b => {
      lockedDaysByBin[b.id] = new Set(
        chantiers.filter(c => c.status === 'valide' && c.scheduledBinome === b.id && weekISO.includes(c.scheduledDate))
                 .map(c => c.scheduledDate)
      );
    });
    try {
      if (mode === 'auto') {
        setProgress('zones géographiques');
        const { byBin, pools, ungeocoded } = await autoAssignAndPlan(pool, binomes, depot, workday, days, unavail, lockedDaysByBin);
        setSchedules(byBin);
        setUsedPools(binomes.map(b => ({ bin: b, pool: pools[b.id] || [] })));
        setUngeocoded(ungeocoded);
      } else {
        const next = {};
        const candidateDays = days.slice(0, 4).map(d => toISO(d));
        for (const { bin, pool: bp } of mPools) {
          if (!bp.length) continue;
          setProgress(bin.name);
          const poseDaysISO = candidateDays.filter(iso => !isUnavailable(unavail, bin.id, iso) && !lockedDaysByBin[bin.id].has(iso));
          next[bin.id] = await planWeek(bp, depot, workday, days, poseDaysISO);
        }
        setSchedules(next);
        setUsedPools(mPools);
      }
    } catch (e) {
      console.error(e); setError(e.message || 'Erreur de calcul');
    } finally {
      setComputing(false); setProgress('');
    }
  };

  const applyToPlanning = () => {
    // 1) date attribuée à chaque chantier planifié cette semaine
    const newDates = {}; // id → iso
    binomes.forEach(bin => {
      const res = schedules[bin.id];
      if (!res) return;
      res.assignments.forEach(a => {
        const ch = chantiers.find(c => c.id === a.id);
        if (ch) { newDates[ch.id] = a.iso; upsert({ ...ch, scheduledDate: a.iso, scheduledBinome: bin.id, status: 'planifie' }); }
      });
    });
    // 2) Interventions liées : si l'interv. 1 vient d'être planifiée, on impose à l'interv. 2
    //    "pas avant (date interv.1 + délai)". Ainsi la 2ᵉ passe après, avec l'écart mini demandé.
    chantiers.forEach(c => {
      if (c.linkId && c.linkRole === 1) {
        const d1 = newDates[c.id] || c.scheduledDate;
        if (d1) {
          const interv2 = chantiers.find(x => x.linkId === c.linkId && x.linkRole === 2);
          if (interv2) {
            const minDate = toISO(addDays(parseISO(d1), (c.linkGap || 0)));
            if (interv2.notBefore !== minDate) upsert({ ...interv2, notBefore: minDate });
          }
        }
      }
    });
    // Enregistre l'emploi du temps minuté de cette semaine pour le retrouver à l'identique.
    const ts = Date.now();
    const all = sGet(SK.edt, {});
    all[weekKey] = { schedules, usedPools, ungeocoded, savedAt: ts };
    sSet(SK.edt, all);
    setSavedAt(ts);
    setApplied(true);
    // marque qu'il y a des changements non sauvegardés sur fichier (rappel d'export)
    try { localStorage.setItem('jmb_dirty_since', String(Date.now())); } catch (e) {}
  };

  const clearSaved = () => {
    const all = sGet(SK.edt, {});
    delete all[weekKey];
    sSet(SK.edt, all);
    setSavedAt(null);
    setSchedules({}); setUsedPools(null); setUngeocoded([]); setApplied(false);
  };

  // Supprime TOUS les emplois du temps enregistrés (toutes les semaines), après confirmation.
  // Ne touche pas aux chantiers ni aux binômes — uniquement les plannings minutés mémorisés.
  const clearAllSaved = () => {
    const all = sGet(SK.edt, {});
    const n = Object.keys(all).length;
    if (!window.confirm(`Supprimer TOUS les emplois du temps enregistrés (${n} semaine${n > 1 ? 's' : ''}) ?\n\nLes chantiers et les binômes ne sont pas touchés. Cette action est irréversible.`)) return;
    sSet(SK.edt, {});
    setSavedAt(null);
    setSchedules({}); setUsedPools(null); setUngeocoded([]); setApplied(false);
    if (typeof showToast === 'function') showToast(`${n} planning${n > 1 ? 's' : ''} supprimé${n > 1 ? 's' : ''}`);
  };

  // Export Excel — semaine affichée (grille à l'écran ou enregistrée)
  const exportCurrentWeek = () => {
    setExportMenu(false);
    const store = sGet(SK.edt, {});
    // si la semaine affichée a une grille à l'écran non encore enregistrée, on l'utilise telle quelle
    const effective = { ...store };
    if (Object.keys(schedules).length) effective[weekKey] = { schedules, usedPools, ungeocoded };
    exportEdtToExcel(effective, binomes, [weekKey], depot);
  };
  // Export Excel — toutes les semaines enregistrées
  const exportAllWeeks = () => {
    setExportMenu(false);
    const store = sGet(SK.edt, {});
    const keys = Object.keys(store).sort();
    if (!keys.length) { alert("Aucune semaine enregistrée. Accepte d'abord un emploi du temps avec « Accepter et enregistrer »."); return; }
    exportEdtToExcel(store, binomes, keys, depot);
  };

  const hasSchedules = Object.keys(schedules).length > 0;
  const allEvents = Object.values(schedules).flatMap(r => Object.values(r.dayPlans).flatMap(d => d.events));
  const computedStart = parseHHMM(workday?.start, 480);
  const rawStart = Math.min(computedStart, ...(allEvents.length ? allEvents.map(e => e.start) : [computedStart]));
  const rawEnd = Math.max(18 * 60, ...(allEvents.length ? allEvents.map(e => e.end) : []));
  const axisStartH = Math.floor(rawStart / 60);
  const axisEndH = Math.ceil(rawEnd / 60);
  const axisStartMin = axisStartH * 60;
  const HOUR_PX = 54;
  const PX = HOUR_PX / 60;
  const gridHeight = (axisEndH - axisStartH) * HOUR_PX;
  const hours = Array.from({ length: axisEndH - axisStartH + 1 }, (_, i) => axisStartH + i);
  const anyEstimated = Object.values(schedules).some(r => r.source && r.source !== 'ors' && r.source !== 'osrm');

  return (
    <div className="pt-10 fadein">
      <div className="flex items-end justify-between mb-8 flex-wrap gap-4 no-print">
        <div>
          <div className="label-cap mb-2">Optimisation hebdomadaire</div>
          <h1 className="font-display text-5xl leading-none tracking-tight">Planning</h1>
          <p className="mt-3 text-sm max-w-xl" style={{ color: 'var(--ink-soft)' }}>
            Choisis une semaine : l'algo répartit les chantiers sur les jours au plus court en trajet, journées plafonnées à 8h–18h, déplacement la veille / nuit sur place pour les chantiers éloignés. En mode <strong>par zone</strong>, il attribue aussi chaque chantier au binôme le plus proche géographiquement. Tu peux aussi assigner un chantier à la main ci-dessous.
          </p>
        </div>
        <div className="flex items-center gap-3">
          <button onClick={() => setWeekStart(addDays(weekStart, -7))} className="btn-secondary" style={{ padding: '8px 10px' }}><I.chevL size={16} /></button>
          <div className="text-sm font-medium font-mono px-3">{weekLabel}</div>
          <button onClick={() => setWeekStart(addDays(weekStart, 7))} className="btn-secondary" style={{ padding: '8px 10px' }}><I.chevR size={16} /></button>
          <button onClick={() => setWeekStart(getWeekStart(new Date()))} className="btn-secondary">Cette semaine</button>
        </div>
      </div>

      {weekUnavail.length > 0 && (
        <div className="card p-4 mb-6 no-print flex items-start gap-3 flex-wrap" style={{ borderLeft: '3px solid #C97A1E', background: '#FBF1E0' }}>
          <span style={{ color: '#9A5A12', marginTop: 2 }}><I.calendarDays size={18} /></span>
          <div className="flex-1 min-w-0">
            <div className="font-medium text-sm" style={{ color: '#9A5A12' }}>Indisponibilités cette semaine</div>
            <div className="text-xs mt-1 space-y-0.5" style={{ color: 'var(--ink-soft)' }}>
              {weekUnavail.map(u => (
                <div key={u.id}>
                  <strong>{u.scope === 'all' ? 'Tous les binômes' : (binomes.find(b => b.id === u.scope)?.name || u.scope)}</strong>
                  {' '}indisponible{u.jours.length > 1 ? 's' : ''} : {u.jours.map(j => parseISO(j).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric' })).join(', ')}
                  {u.label ? ` (${u.label})` : ''}
                </div>
              ))}
            </div>
            <div className="text-xs mt-1" style={{ color: 'var(--ink-faint)' }}>Ces jours sont exclus de la planification ; les chantiers sont reportés sur les autres jours disponibles.</div>
          </div>
        </div>
      )}

      {weekValidated.length > 0 && (
        <div className="card p-4 mb-6 no-print flex items-start gap-3 flex-wrap" style={{ borderLeft: '3px solid ' + STATUTS.valide.color, background: STATUTS.valide.bg }}>
          <span style={{ color: STATUTS.valide.color, marginTop: 2 }}><I.lock size={18} /></span>
          <div className="flex-1 min-w-0">
            <div className="font-medium text-sm" style={{ color: STATUTS.valide.color }}>Chantiers validés cette semaine (verrouillés)</div>
            <div className="text-xs mt-1 space-y-0.5" style={{ color: 'var(--ink-soft)' }}>
              {weekValidated.map(c => {
                const bin = binomes.find(b => b.id === c.scheduledBinome);
                return (
                  <div key={c.id}>
                    <strong>{parseISO(c.scheduledDate).toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric' })}</strong>
                    {' · '}{c.clientName} ({c.city}) · {c.type} · {c.estimatedDuration}h
                    {bin ? <span style={{ color: bin.color }}> · {bin.name}</span> : null}
                  </div>
                );
              })}
            </div>
            <div className="text-xs mt-1" style={{ color: 'var(--ink-faint)' }}>Ces chantiers ne sont pas déplacés par l'optimisation ; leur jour est réservé.</div>
          </div>
        </div>
      )}

      {savedAt && (
        <div className="card p-4 mb-6 no-print flex items-center gap-3 flex-wrap" style={{ borderLeft: '3px solid var(--teal)', background: '#E0F0EC' }}>
          <span style={{ color: 'var(--teal-deep)' }}><I.save size={18} /></span>
          <div className="flex-1 min-w-0">
            <div className="font-medium text-sm" style={{ color: 'var(--teal-deep)' }}>Emploi du temps enregistré</div>
            <div className="text-xs" style={{ color: 'var(--ink-soft)' }}>
              Semaine du {weekStart.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' })} · sauvegardé le {new Date(savedAt).toLocaleDateString('fr-FR')} à {new Date(savedAt).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' })}. Il sera retrouvé tel quel à la réouverture.
            </div>
          </div>
          <button onClick={clearSaved} className="text-xs flex items-center gap-1" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-faint)' }}>
            <I.trash size={12} /> Effacer cet enregistrement
          </button>
        </div>
      )}

      <div className="card p-6 mb-6 no-print">
        <div className="flex items-center gap-1 mb-4">
          {[{ id: 'auto', label: 'Répartir par zone géo' }, { id: 'manual', label: 'Binômes déjà assignés' }].map(m => (
            <button key={m.id} onClick={() => setMode(m.id)}
              className="px-3 py-2 text-xs font-mono uppercase tracking-wider rounded"
              style={{
                background: mode === m.id ? 'var(--ink)' : 'transparent',
                color: mode === m.id ? 'var(--cream)' : 'var(--ink-soft)',
                border: '1px solid ' + (mode === m.id ? 'var(--ink)' : 'var(--border)'), cursor: 'pointer',
              }}>{m.label}</button>
          ))}
        </div>
        <div className="flex flex-wrap items-center gap-4">
          <button onClick={() => compute(false)} disabled={computing || !hasAny} className="btn-accent">
            {computing ? <><span className="spin"><I.loader size={16} /></span> Optimisation... {progress}</> : <><I.sparkles size={16} /> Optimiser la semaine</>}
          </button>
          {frozenCount > 0 && (
            <button onClick={() => compute(true)} disabled={computing} className="btn-secondary" title="Réoptimise TOUS les chantiers, y compris ceux déjà planifiés sur d'autres semaines — ils peuvent être redéplacés.">
              <I.sparkles size={14} /> Tout réoptimiser
            </button>
          )}
          {hasSchedules && <button onClick={applyToPlanning} className="btn-primary"><I.save size={16} /> Accepter et enregistrer</button>}
          {hasSchedules && <button onClick={() => window.print()} className="btn-secondary"><I.printer size={16} /> Imprimer</button>}
          <div style={{ position: 'relative' }}>
            <button onClick={() => setExportMenu(v => !v)} className="btn-secondary"><I.download size={16} /> Exporter Excel</button>
            {exportMenu && (
              <div className="card" style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, zIndex: 30, minWidth: 240, boxShadow: 'var(--shadow-lg)' }}>
                <button onClick={exportCurrentWeek} className="w-full text-left px-4 py-3 text-sm" style={{ background: 'none', border: 'none', borderBottom: '1px solid var(--border)', cursor: 'pointer' }}>
                  <div className="font-medium">Semaine affichée</div>
                  <div className="text-xs" style={{ color: 'var(--ink-soft)' }}>{weekLabel}</div>
                </button>
                <button onClick={exportAllWeeks} className="w-full text-left px-4 py-3 text-sm" style={{ background: 'none', border: 'none', cursor: 'pointer' }}>
                  <div className="font-medium">Toutes les semaines enregistrées</div>
                  <div className="text-xs" style={{ color: 'var(--ink-soft)' }}>Un seul fichier, toutes les semaines acceptées</div>
                </button>
              </div>
            )}
          </div>
          {applied && <span className="text-xs" style={{ color: 'var(--teal-deep)' }}>✓ Emploi du temps enregistré — dates visibles dans Planning et Feuilles de route.</span>}
          <span className="text-xs" style={{ color: 'var(--ink-faint)' }}>
            Journée {workday?.start || '08:00'}–18:00 · déjeuner {workday?.lunchStart || '12:00'} ({workday?.lunchDuration ?? 60} min).
          </span>
          {error && <span className="text-xs" style={{ color: 'var(--accent)' }}>{error}</span>}
          <button onClick={clearAllSaved} className="text-xs flex items-center gap-1 ml-auto" style={{ background: 'none', border: '1px solid var(--border)', borderRadius: 6, padding: '6px 10px', cursor: 'pointer', color: 'var(--accent)' }} title="Supprime tous les emplois du temps enregistrés (toutes les semaines). Les chantiers et binômes ne sont pas touchés.">
            <I.trash size={13} /> Supprimer tous les plannings
          </button>
        </div>
        {frozenCount > 0 && !forceAll && (
          <div className="text-xs mt-3 flex items-center gap-1" style={{ color: 'var(--ink-faint)' }}>
            <I.clock size={12} /> {frozenCount} chantier{frozenCount > 1 ? 's' : ''} déjà planifié{frozenCount > 1 ? 's' : ''} sur d'autres semaines {frozenCount > 1 ? 'sont figés' : 'est figé'} et exclu{frozenCount > 1 ? 's' : ''} de cette optimisation. Utilise « Tout réoptimiser » pour les inclure.
          </div>
        )}
        {forceAll && hasSchedules && (
          <div className="text-xs mt-3 flex items-center gap-1" style={{ color: 'var(--accent)' }}>
            <I.alert size={12} /> Mode « tout réoptimiser » : les chantiers d'autres semaines ont pu être redéplacés. Vérifie avant d'appliquer.
          </div>
        )}
        {mode === 'manual' && unassigned.length > 0 && (
          <div className="text-xs mt-3" style={{ color: 'var(--accent)' }}>
            {unassigned.length} chantier{unassigned.length > 1 ? 's' : ''} sans binôme assigné — non planifiable{unassigned.length > 1 ? 's' : ''} dans ce mode. Bascule sur « Répartir par zone géo », ou assigne un binôme dans Chantiers.
          </div>
        )}
        {ungeocoded.length > 0 && (
          <div className="card p-4 mt-4 no-print flex items-start gap-3" style={{ borderLeft: '3px solid #C0392B', background: '#FBE4DC' }}>
            <span style={{ color: '#C0392B', marginTop: 2 }}><I.alert size={18} /></span>
            <div className="flex-1 min-w-0">
              <div className="font-medium text-sm" style={{ color: '#C0392B' }}>
                {ungeocoded.length} adresse{ungeocoded.length > 1 ? 's' : ''} non localisée{ungeocoded.length > 1 ? 's' : ''} — exclue{ungeocoded.length > 1 ? 's' : ''} du planning
              </div>
              <div className="text-xs mt-1" style={{ color: 'var(--ink-soft)' }}>
                Ces chantiers n'apparaissent pas dans le planning car leur adresse n'a pas pu être trouvée : <strong>{ungeocoded.map(c => `${c.clientName} (${c.address || '?'}, ${c.postalCode || ''} ${c.city || ''})`).join(' · ')}</strong>.
              </div>
              <div className="text-xs mt-1" style={{ color: 'var(--ink-faint)' }}>
                Corrige l'adresse (numéro, code postal, ville) puis relance l'optimisation.
              </div>
              {setTab && (
                <button onClick={() => setTab('chantiers')} className="mt-2 text-xs font-medium flex items-center gap-1 px-3 py-1.5 rounded"
                  style={{ background: '#C0392B', border: 'none', color: '#fff', cursor: 'pointer' }}>
                  <I.edit size={13} /> Corriger les adresses
                </button>
              )}
            </div>
          </div>
        )}
      </div>

      {!hasAny ? (
        <div className="card p-12 text-center"><p style={{ color: 'var(--ink-faint)' }}>{mode === 'auto' ? 'Aucun chantier à planifier. Crée des chantiers (avec une adresse).' : 'Aucun chantier assigné à un binôme. Assigne-les dans Chantiers, ou utilise « Répartir par zone géo ».'}</p></div>
      ) : !hasSchedules ? (
        <div className="card p-12 text-center"><p style={{ color: 'var(--ink-faint)' }}>Clique sur « Optimiser la semaine » pour {mode === 'auto' ? 'répartir les chantiers par zone et générer le planning' : 'générer le planning de chaque binôme'}.</p></div>
      ) : (
        <div className="space-y-10">
          {(() => {
            // Bandeau de fiabilité : les temps de trajet sont-ils RÉELS (ors/osrm) ou ESTIMÉS ?
            const sources = Object.values(schedules).map(r => r && r.source).filter(Boolean);
            if (!sources.length) return null;
            const allReal = sources.every(s => s === 'ors' || s === 'osrm');
            const allEstim = sources.every(s => s === 'estimation' || s === 'défaut');
            if (allReal) {
              return (
                <div className="card p-3 no-print flex items-center gap-2" style={{ borderLeft: '3px solid var(--teal)', background: '#E0F0EC' }}>
                  <span style={{ color: 'var(--teal-deep)' }}><I.check size={16} /></span>
                  <span className="text-sm" style={{ color: 'var(--teal-deep)' }}>Trajets calculés sur le réseau routier réel — planning fiable.</span>
                </div>
              );
            }
            return (
              <div className="card p-3 no-print flex items-start gap-2" style={{ borderLeft: '3px solid #C97A1E', background: '#FBF1E0' }}>
                <span style={{ color: '#9A5A12', marginTop: 1 }}><I.alert size={16} /></span>
                <div className="text-sm" style={{ color: '#9A5A12' }}>
                  <strong>{allEstim ? 'Trajets estimés à vol d\'oiseau' : 'Trajets partiellement estimés'} — planning approximatif.</strong>
                  <div className="text-xs mt-0.5" style={{ color: 'var(--ink-soft)' }}>
                    Le service de routage n'était pas disponible. {sGet(SK.orsKey, '') ? 'Vérifie ta clé ORS dans Paramètres' : 'Ajoute une clé OpenRouteService dans Paramètres pour des temps fiables'}, puis relance l'optimisation.
                  </div>
                </div>
              </div>
            );
          })()}
          {(usedPools || []).map(({ bin, pool }) => {
            const res = schedules[bin.id];
            if (!pool.length) return null;
            const placed = res ? res.assignments.length : 0;
            return (
              <section key={bin.id} className="print-page">
                <div className="flex items-center gap-3 mb-4 flex-wrap">
                  <div className="w-4 h-4 rounded-sm" style={{ background: bin.color }} />
                  <h2 className="font-display text-3xl font-semibold">{bin.name}</h2>
                  <span className="text-sm" style={{ color: 'var(--ink-soft)' }}>{bin.members.join(' · ')}</span>
                  {res && <span className="text-xs font-mono ml-auto" style={{ color: 'var(--ink-faint)' }}>{placed}/{pool.length} chantiers casés</span>}
                </div>
                {!res ? (
                  <div className="card p-6 text-sm" style={{ color: 'var(--ink-faint)' }}>—</div>
                ) : (
                  <div className="card overflow-x-auto">
                    <div style={{ minWidth: 760, display: 'grid', gridTemplateColumns: '52px repeat(6, 1fr)' }}>
                      <div style={{ borderBottom: '1px solid var(--border)' }} />
                      {days.map(d => {
                        const isToday = toISO(d) === toISO(new Date());
                        return (
                          <div key={'h' + toISO(d)} className="p-2 text-center" style={{ borderBottom: '1px solid var(--border)', borderLeft: '1px solid var(--border)', background: isToday ? 'var(--cream)' : 'transparent' }}>
                            <div className="label-cap">{d.toLocaleDateString('fr-FR', { weekday: 'short' })}</div>
                            <div className="font-display text-lg font-semibold" style={{ color: isToday ? 'var(--accent)' : 'var(--ink)' }}>{d.getDate()}</div>
                          </div>
                        );
                      })}

                      <div style={{ position: 'relative', height: gridHeight }}>
                        {hours.map(h => (
                          <div key={h} style={{ position: 'absolute', top: (h - axisStartH) * HOUR_PX - 6, right: 6, fontSize: 10, color: 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace' }}>{h}h</div>
                        ))}
                      </div>
                      {days.map(d => {
                        const plan = res.dayPlans[toISO(d)];
                        return (
                          <div key={'c' + toISO(d)} style={{ position: 'relative', height: gridHeight, borderLeft: '1px solid var(--border)' }}>
                            {hours.map(h => (
                              <div key={h} style={{ position: 'absolute', top: (h - axisStartH) * HOUR_PX, left: 0, right: 0, borderTop: '1px solid var(--border)', opacity: 0.45 }} />
                            ))}
                            {/* repère 18h (plafond) */}
                            <div style={{ position: 'absolute', top: (18 * 60 - axisStartMin) * PX, left: 0, right: 0, borderTop: '1px dashed var(--accent)', opacity: 0.5 }} />
                            {plan && plan.events.map((ev, i) => {
                              const top = (ev.start - axisStartMin) * PX;
                              const h = Math.max((ev.end - ev.start) * PX, 12);
                              if (ev.type === 'travel' || ev.type === 'travelApproach' || ev.type === 'travelEvening') {
                                const mins = Math.round(ev.end - ev.start);
                                const veille = ev.type !== 'travel';
                                const label = ev.type === 'travelApproach' ? (ev.returnDepot ? `dépôt ${mins}′` : `↧ ${mins}′`)
                                  : ev.type === 'travelEvening' ? (ev.returnDepot ? `dépôt ${mins}′` : `veille ${mins}′`)
                                  : `${mins}′`;
                                const tip = ev.type === 'travelApproach' ? (ev.returnDepot ? `Retour au dépôt — vendredi matin (${mins} min)` : ev.fromDepot ? `Approche depuis le dépôt — tôt le matin (${mins} min)` : `Trajet vers le chantier du jour — reporté au matin car il finissait après 18h (${mins} min)`)
                                  : ev.type === 'travelEvening' ? (ev.returnDepot ? `Retour au dépôt en fin de semaine (${mins} min)` : `Trajet du soir vers le chantier du lendemain — nuit sur place (${mins} min)`)
                                  : `${mins} min de route`;
                                return <div key={i} title={tip} style={{ position: 'absolute', top, left: 2, right: 2, height: h, background: 'repeating-linear-gradient(45deg, rgba(0,0,0,0.06), rgba(0,0,0,0.06) 4px, transparent 4px, transparent 8px)', border: veille ? '1px dashed var(--border-strong)' : 'none', borderRadius: 2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                  <span style={{ fontSize: 9, color: veille ? 'var(--ink-soft)' : 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace', whiteSpace: 'nowrap', overflow: 'hidden', padding: '0 2px' }}>{label}</span>
                                </div>;
                              }
                              if (ev.type === 'lunch') {
                                return <div key={i} style={{ position: 'absolute', top, left: 2, right: 2, height: h, background: 'var(--cream)', border: '1px dashed var(--border-strong)', borderRadius: 3, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                                  <span style={{ fontSize: 9, color: 'var(--ink-soft)' }}>Déjeuner</span>
                                </div>;
                              }
                              const c = ev.chantier;
                              const dc = dureeColor(c.estimatedDuration);
                              return <div key={i} title={`${minToHHMM(ev.start)}–${minToHHMM(ev.end)} · ${c.clientName} · ${c.type} · ${c.estimatedDuration}h${ev.fixed ? ' · heure fixée' : ''}`} style={{ position: 'absolute', top, left: 2, right: 2, height: h, background: dc.bg, color: dc.ink, borderRadius: 3, borderLeft: `4px solid ${bin.color}`, padding: '3px 5px 3px 6px', overflow: 'hidden', boxShadow: 'var(--shadow-sm)', outline: ev.fixed ? '2px solid var(--accent)' : 'none', outlineOffset: ev.fixed ? '-2px' : 0 }}>
                                <div style={{ fontSize: 10, fontWeight: 700, lineHeight: 1.1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{ev.fixed ? '📌 ' : ''}{minToHHMM(ev.start)} {c.clientName}{ev.contd ? ' (suite)' : ''}</div>
                                {h > 28 && <div style={{ fontSize: 9, opacity: 0.9, lineHeight: 1.15, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{c.type}</div>}
                                {h > 44 && <div style={{ fontSize: 8, opacity: 0.8, fontFamily: 'JetBrains Mono, monospace' }}>{c.city} · {c.estimatedDuration}h</div>}
                              </div>;
                            })}
                          </div>
                        );
                      })}

                      <div style={{ borderTop: '1px solid var(--border)' }} />
                      {days.map(d => {
                        const plan = res.dayPlans[toISO(d)];
                        return (
                          <div key={'f' + toISO(d)} className="p-1 text-center" style={{ borderLeft: '1px solid var(--border)', borderTop: '1px solid var(--border)' }}>
                            {plan
                              ? (plan.returnOnly
                                  ? <span style={{ fontSize: 10, color: 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace', lineHeight: 1.3 }}>
                                      retour dépôt<br />{fmtDuration(plan.approachSec)} route
                                    </span>
                                  : <span style={{ fontSize: 10, color: plan.oversized ? 'var(--accent)' : 'var(--ink-faint)', fontFamily: 'JetBrains Mono, monospace', lineHeight: 1.3 }}>
                                      fin {minToHHMM(plan.endMin)}{plan.oversized ? ' ⚠' : ''}<br />{fmtDuration(plan.totalDriveSec)} route
                                      {!plan.isLastPoseDay && plan.siegeReturnSec > 0 && (
                                        <><br /><span style={{ color: plan.staysOnSite ? 'var(--ink-faint)' : 'var(--teal-deep)' }}>
                                          {plan.staysOnSite ? '🛏 nuit sur place' : '↩ rentre siège'} {fmtDuration(plan.siegeReturnSec)}
                                        </span></>
                                      )}
                                    </span>)
                              : <span style={{ fontSize: 10, color: 'var(--ink-faint)' }}>—</span>}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
                {res && res.overflow.length > 0 && (() => {
                  const owIds = new Set((res.outOfWindow || []).map(c => c.id));
                  const fenetre = res.overflow.filter(c => owIds.has(c.id));
                  const autres = res.overflow.filter(c => !owIds.has(c.id));
                  return (
                    <div className="mt-3 p-3 rounded text-sm" style={{ background: '#FBF1D9', color: '#8B5E00' }}>
                      {autres.length > 0 && (
                        <div><strong>Ne tient pas dans la semaine</strong> ({autres.length}) — à reporter : {autres.map(c => c.clientName).join(', ')}.</div>
                      )}
                      {fenetre.length > 0 && (
                        <div className={autres.length ? 'mt-2' : ''}>
                          <strong>⚠ Fenêtre client hors de cette semaine</strong> ({fenetre.length}) : {fenetre.map(c => {
                            const w = c.notBefore && c.notAfter ? `entre ${fmtDate(c.notBefore)} et ${fmtDate(c.notAfter)}`
                              : c.notBefore ? `pas avant ${fmtDate(c.notBefore)}`
                              : c.notAfter ? `pas après ${fmtDate(c.notAfter)}` : '';
                            return `${c.clientName} (${w})`;
                          }).join(', ')}. Place-les sur une semaine compatible.
                        </div>
                      )}
                    </div>
                  );
                })()}
              </section>
            );
          })}
          <div className="flex flex-wrap gap-4 text-xs no-print" style={{ color: 'var(--ink-soft)' }}>
            <span className="flex items-center gap-1"><span style={{ width: 12, height: 12, background: 'var(--ink)', borderRadius: 2, display: 'inline-block' }} /> Pose</span>
            <span className="flex items-center gap-1"><span style={{ width: 12, height: 12, background: 'repeating-linear-gradient(45deg, rgba(0,0,0,0.2), rgba(0,0,0,0.2) 3px, transparent 3px, transparent 6px)', borderRadius: 2, display: 'inline-block' }} /> Trajet</span>
            <span className="flex items-center gap-1"><span style={{ width: 12, height: 12, background: 'repeating-linear-gradient(45deg, rgba(0,0,0,0.12), rgba(0,0,0,0.12) 3px, transparent 3px, transparent 6px)', border: '1px dashed var(--border-strong)', borderRadius: 2, display: 'inline-block' }} /> Trajet veille / soir (hors horaires)</span>
            <span className="flex items-center gap-1"><span style={{ width: 12, height: 12, background: 'var(--cream)', border: '1px dashed var(--border-strong)', borderRadius: 2, display: 'inline-block' }} /> Déjeuner</span>
            <span className="flex items-center gap-1"><span style={{ width: 14, borderTop: '1px dashed var(--accent)', display: 'inline-block' }} /> Plafond 18h</span>
          </div>
          <div className="flex flex-wrap items-center gap-3 text-xs no-print mt-1" style={{ color: 'var(--ink-soft)' }}>
            <span className="label-cap" style={{ letterSpacing: '0.12em' }}>Couleur = durée</span>
            {DUREE_COLORS.map((dc, i) => {
              const lbl = ['1h','1h30','2h','2h30','6h'][i];
              return <span key={i} className="flex items-center gap-1"><span style={{ width: 12, height: 12, background: dc.bg, borderRadius: 2, display: 'inline-block', border: '0.5px solid rgba(0,0,0,0.15)' }} /> {lbl}</span>;
            })}
            <span className="flex items-center gap-1" style={{ marginLeft: 8 }}><span style={{ width: 12, height: 12, background: '#fff', borderLeft: '4px solid var(--ink)', borderRadius: 2, display: 'inline-block' }} /> bordure = binôme</span>
          </div>
          {anyEstimated && (
            <p className="text-xs" style={{ color: 'var(--ink-faint)' }}>⚠ Certains temps de trajet sont estimés (routage indisponible ou adresse non géolocalisée — 20 min par défaut).</p>
          )}
        </div>
      )}

      {weekByBin.length > 0 && (
        <section className="card p-6 mb-6 no-print">
          <div className="mb-4">
            <h2 className="font-display text-2xl font-semibold mb-1">Chantiers de la semaine</h2>
            <p className="text-sm" style={{ color: 'var(--ink-soft)' }}>
              Après avoir contacté le client, valide le chantier d'un clic : il sera verrouillé et l'optimisation ne le déplacera plus.
            </p>
          </div>
          <div className="space-y-5">
            {weekByBin.map(({ bin, list }) => (
              <div key={bin.id}>
                <div className="flex items-center gap-2 mb-2">
                  <span style={{ width: 12, height: 12, background: bin.color, borderRadius: 3, display: 'inline-block' }} />
                  <span className="font-display font-semibold">{bin.name}</span>
                  <span className="text-xs" style={{ color: 'var(--ink-faint)' }}>
                    · {list.filter(c => c.status === 'valide').length}/{list.length} validé(s)
                  </span>
                </div>
                <div className="space-y-2">
                  {list.map(c => {
                    const isValide = c.status === 'valide';
                    return (
                      <div key={c.id} className="flex items-center justify-between gap-3 p-3 rounded flex-wrap"
                        style={{ background: isValide ? STATUTS.valide.bg : 'var(--cream)', border: isValide ? '1px solid ' + STATUTS.valide.color : '1px solid transparent' }}>
                        <div className="flex items-center gap-3 min-w-0 text-sm">
                          {isValide && <span style={{ color: STATUTS.valide.color }}><I.lock size={14} /></span>}
                          <span className="font-medium truncate">{c.clientName}</span>
                          <span style={{ color: 'var(--ink-soft)' }} className="truncate">{c.city} · {c.type} · {c.estimatedDuration}h</span>
                          <span className="font-mono text-xs" style={{ color: 'var(--ink-faint)' }}>{fmtDate(c.scheduledDate)}</span>
                        </div>
                        <div className="flex items-center gap-2 shrink-0 relative">
                          {!isValide && (
                            <div className="relative">
                              <button onClick={() => setMailFor(mailFor === c.id ? null : c.id)} title={c.clientEmail ? 'Préparer un e-mail au client' : 'Aucun e-mail client renseigné — le message s\'ouvrira sans destinataire'}
                                className="text-xs font-medium flex items-center gap-1 px-3 py-1.5 rounded"
                                style={{ background: 'transparent', border: '1px solid var(--accent)', color: 'var(--accent)', cursor: 'pointer' }}>
                                <I.mail size={13} /> Contacter
                              </button>
                              {mailFor === c.id && (
                                <div className="absolute right-0 mt-1 z-20 card p-1" style={{ minWidth: 230, boxShadow: '0 4px 16px rgba(0,0,0,0.15)' }}>
                                  <button onClick={() => openMail(c, 'proposition')} className="w-full text-left text-xs px-3 py-2 rounded mail-opt" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--ink)' }}>
                                    <strong>Proposition de RDV</strong><br /><span style={{ color: 'var(--ink-faint)' }}>Créneau à confirmer sous 7 jours</span>
                                  </button>
                                  <button onClick={() => openMail(c, 'confirmation')} className="w-full text-left text-xs px-3 py-2 rounded mail-opt" style={{ background: 'transparent', border: 'none', cursor: 'pointer', color: 'var(--ink)' }}>
                                    <strong>Confirmation d'installation</strong><br /><span style={{ color: 'var(--ink-faint)' }}>Consignes selon le type de volet</span>
                                  </button>
                                </div>
                              )}
                            </div>
                          )}
                          <button onClick={() => toggleValidate(c)} className="text-xs font-medium flex items-center gap-1 px-3 py-1.5 rounded"
                            style={isValide
                              ? { background: 'transparent', border: '1px solid var(--border)', color: 'var(--ink-soft)', cursor: 'pointer' }
                              : { background: STATUTS.valide.color, border: 'none', color: '#fff', cursor: 'pointer' }}>
                            {isValide ? <><I.unlock size={13} /> Dévalider</> : <><I.check size={13} /> Valider</>}
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </section>
      )}

      {hasSchedules && <TrajetsMap schedules={schedules} binomes={binomes} days={days} />}

      <section className="card p-6 mt-10 no-print">
        <h2 className="font-display text-2xl font-semibold mb-1">Assignation manuelle</h2>
        <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>
          Clique sur un chantier pour lui fixer une date et un binôme à la main, sans passer par l'optimisation automatique.
        </p>
        {allToPlan.length === 0 ? (
          <EmptyState text="Aucun chantier actif à planifier. Les chantiers en attente sont exclus." />
        ) : (
          <div className="grid md:grid-cols-3 gap-3">
            {allToPlan.map(c => {
              const b = binomes.find(x => x.id === c.scheduledBinome);
              const planned = c.scheduledDate && c.scheduledBinome;
              return (
                <button key={c.id} onClick={() => setEditingCh(c)}
                        className="text-left p-3 rounded"
                        style={{ border: '1px solid var(--border)', background: planned ? 'var(--paper)' : 'var(--cream)', cursor: 'pointer', borderLeft: '3px solid ' + (b?.color || 'var(--border-strong)') }}>
                  <div className="font-medium text-sm truncate">{c.clientName}</div>
                  <div className="text-xs" style={{ color: 'var(--ink-soft)' }}>{c.type} · {c.city} · {c.estimatedDuration}h</div>
                  <div className="text-xs font-mono mt-1" style={{ color: planned ? 'var(--ink-faint)' : 'var(--accent)' }}>
                    {planned ? `${fmtDate(c.scheduledDate)} · ${b?.name || ''}` : 'À planifier'}
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </section>

      {editingCh && <QuickModal chantier={editingCh} binomes={binomes} onClose={() => setEditingCh(null)} onSave={(ch) => { upsert(ch); setEditingCh(null); }} />}
    </div>
  );
}

/* =========================================================================
   STATISTIQUES — retours de pose des chantiers terminés
   ========================================================================= */
function Stats({ chantiers, binomes, poseTypes, setPoseTypes, showToast }) {
  const done = useMemo(() => chantiers.filter(c => c.status === 'fait' || c.status === 'valide'), [chantiers]);
  const withReal = useMemo(() => done.filter(c => typeof c.realDuration === 'number' && c.realDuration > 0), [done]);

  // Temps réel moyen par type de volet (vs estimé)
  const byType = useMemo(() => {
    const map = {};
    withReal.forEach(c => {
      const t = c.type || '(sans type)';
      if (!map[t]) map[t] = { real: 0, est: 0, n: 0 };
      map[t].real += c.realDuration;
      map[t].est += (c.estimatedDuration || 0);
      map[t].n++;
    });
    return Object.entries(map).map(([type, v]) => ({
      type, n: v.n,
      avgReal: v.real / v.n,
      avgEst: v.est / v.n,
      ecart: (v.real / v.n) - (v.est / v.n),
    })).sort((a, b) => b.n - a.n);
  }, [withReal]);

  // Taux de chantiers avec problème / SAV
  const outcomeStats = useMemo(() => {
    const withOutcome = done.filter(c => c.outcome);
    const ok = withOutcome.filter(c => c.outcome === 'ok').length;
    const pb = withOutcome.filter(c => c.outcome === 'probleme').length;
    const sav = withOutcome.filter(c => c.outcome === 'sav').length;
    const total = withOutcome.length;
    return { ok, pb, sav, total, tauxSouci: total ? Math.round((pb + sav) / total * 100) : 0 };
  }, [done]);

  const applyRealToPoseType = (type, avgReal) => {
    const rounded = Math.round(avgReal * 4) / 4; // au quart d'heure le plus proche
    const idx = poseTypes.findIndex(p => p.name === type);
    if (idx < 0) { showToast('Type introuvable dans les réglages'); return; }
    const next = [...poseTypes];
    next[idx] = { ...next[idx], duration: rounded };
    setPoseTypes(next);
    showToast(`Durée de « ${type} » mise à jour : ${rounded}h`);
  };

  return (
    <div className="pt-10 fadein">
      <div className="mb-8">
        <div className="label-cap mb-2">Analyse des retours terrain</div>
        <h1 className="font-display text-5xl leading-none tracking-tight">Statistiques</h1>
        <p className="mt-3 text-sm max-w-xl" style={{ color: 'var(--ink-soft)' }}>
          Basé sur les chantiers terminés et leurs retours de pose (durée réelle + statut). Marque un chantier « terminé » et renseigne son retour depuis l'onglet Chantiers.
        </p>
      </div>

      <div className="grid md:grid-cols-3 gap-4 mb-8">
        <StatCard label="Chantiers terminés" value={done.length} />
        <StatCard label="Avec durée réelle" value={withReal.length} />
        <StatCard label="Taux problème / SAV" value={outcomeStats.total ? outcomeStats.tauxSouci + '%' : '—'} alert={outcomeStats.tauxSouci >= 20} accent={outcomeStats.tauxSouci < 20} />
      </div>

      {/* Détail des chantiers comptés comme terminés (diagnostic des doublons) */}
      {done.length > 0 && (
        <details className="card p-4 mb-6">
          <summary style={{ cursor: 'pointer', color: 'var(--ink-soft)' }} className="text-sm font-medium">
            Voir les {done.length} chantier(s) comptés comme terminés
          </summary>
          <div className="mt-3 space-y-1">
            {done.map((c, i) => (
              <div key={c.id || i} className="flex items-center gap-3 text-xs py-1.5 px-2 rounded" style={{ background: i % 2 ? 'transparent' : 'var(--cream)' }}>
                <span className="font-mono" style={{ color: 'var(--ink-faint)', minWidth: 18 }}>{i + 1}</span>
                <span className="font-medium" style={{ minWidth: 140 }}>{c.clientName || '(sans nom)'}</span>
                <span style={{ color: 'var(--ink-soft)', flex: 1 }}>{[c.address, c.city].filter(Boolean).join(', ')}</span>
                <span style={{ color: 'var(--ink-faint)' }}>{c.type}</span>
                {c.archived && <span className="px-1.5 py-0.5 rounded" style={{ background: 'var(--border)', color: 'var(--ink-soft)' }}>archivé</span>}
                <span style={{ color: 'var(--ink-faint)' }}>{c.scheduledDate || '—'}</span>
              </div>
            ))}
          </div>
          <p className="text-xs mt-3" style={{ color: 'var(--ink-faint)' }}>
            Si une même pose apparaît deux fois ici, c'est un doublon : va dans Paramètres → « Nettoyer les doublons », ou supprime la fiche en trop dans l'onglet Chantiers.
          </p>
        </details>
      )}

      {/* Temps réel moyen par type */}
      <section className="card p-6 mb-6">
        <h2 className="font-display text-2xl font-semibold mb-1">Temps réel moyen par type de volet</h2>
        <p className="text-xs mb-4" style={{ color: 'var(--ink-soft)' }}>Comparé à la durée estimée. Le bouton applique la moyenne réelle comme nouvelle durée par défaut (arrondie au quart d'heure) — c'est ainsi que ton planning devient de plus en plus juste.</p>
        {byType.length === 0 ? <EmptyState text="Aucune durée réelle saisie pour l'instant." /> : (
          <div className="space-y-3">
            {byType.map(r => {
              const ecartPct = r.avgEst ? Math.round(r.ecart / r.avgEst * 100) : 0;
              const sousEstime = r.ecart > 0.1;
              return (
                <div key={r.type} className="flex items-center gap-4 p-3 rounded" style={{ background: 'var(--cream)' }}>
                  <div className="flex-1 min-w-0">
                    <div className="font-medium truncate">{r.type}</div>
                    <div className="text-xs" style={{ color: 'var(--ink-faint)' }}>{r.n} pose(s)</div>
                  </div>
                  <div className="text-right">
                    <div className="label-cap">Estimé</div>
                    <div className="font-display font-bold">{r.avgEst.toFixed(2)}h</div>
                  </div>
                  <div className="text-right">
                    <div className="label-cap">Réel moyen</div>
                    <div className="font-display font-bold" style={{ color: sousEstime ? 'var(--accent)' : 'var(--teal-deep)' }}>{r.avgReal.toFixed(2)}h</div>
                  </div>
                  <div className="text-right" style={{ minWidth: 60 }}>
                    <div className="label-cap">Écart</div>
                    <div className="font-mono text-sm font-bold" style={{ color: sousEstime ? 'var(--accent)' : 'var(--teal-deep)' }}>{r.ecart >= 0 ? '+' : ''}{ecartPct}%</div>
                  </div>
                  <button onClick={() => applyRealToPoseType(r.type, r.avgReal)} className="btn-secondary" style={{ padding: '6px 10px', fontSize: 12 }} title="Utiliser cette moyenne comme durée par défaut">
                    <I.save size={13} /> Appliquer
                  </button>
                </div>
              );
            })}
          </div>
        )}
      </section>

      {/* Réussite / problèmes */}
      <section className="card p-6">
        <h2 className="font-display text-2xl font-semibold mb-1">Réussite des poses</h2>
        <p className="text-xs mb-4" style={{ color: 'var(--ink-soft)' }}>Sur {outcomeStats.total} chantier(s) avec un statut renseigné.</p>
        {outcomeStats.total === 0 ? <EmptyState text="Aucun statut de réussite renseigné pour l'instant." /> : (
          <div className="grid grid-cols-3 gap-4">
            <div className="p-4 rounded text-center" style={{ background: '#DFEEDF' }}>
              <div className="font-display text-3xl font-bold" style={{ color: '#2D5A3D' }}>{outcomeStats.ok}</div>
