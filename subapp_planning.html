/* =========================================================================
   PARAMÈTRES
   ========================================================================= */
function Parametres({ binomes, setBinomes, poseTypes, setPoseTypes, depot, setDepot, workday, setWorkday, unavail, setUnavail, apiKey, setApiKey, chantiers, setChantiers, showToast, autoBackup, setAutoBackup, archiveMonths, setArchiveMonths }) {
  const [keyDraft, setKeyDraft] = useState(apiKey);
  const [modelDraft, setModelDraft] = useState(() => sGet(SK.modelName, DEFAULT_MODEL));
  const [orsDraft, setOrsDraft] = useState(() => sGet(SK.orsKey, ''));
  const [orsSaved, setOrsSaved] = useState(() => !!sGet(SK.orsKey, ''));
  const [orsTesting, setOrsTesting] = useState(false);
  const [orsTestResult, setOrsTestResult] = useState(null); // { ok, message }
  const [includeKeys, setIncludeKeys] = useState(true); // inclure les clés API dans la sauvegarde (coché par défaut)
  const importInputRef = useRef(null);
  // Formulaire d'ajout d'indisponibilité
  const [uScope, setUScope] = useState('all');
  const [uFrom, setUFrom] = useState(toISO(new Date()));
  const [uTo, setUTo] = useState(toISO(new Date()));
  const [uLabel, setULabel] = useState('');

  const addUnavail = () => {
    if (!uFrom || !uTo) { showToast('Renseigne au moins une date.'); return; }
    const from = uFrom <= uTo ? uFrom : uTo;
    const to = uFrom <= uTo ? uTo : uFrom;
    const entry = { id: uid(), scope: uScope, from, to, label: uLabel.trim() };
    setUnavail([...(unavail || []), entry].sort((a, b) => a.from.localeCompare(b.from)));
    setULabel('');
    showToast('Indisponibilité ajoutée');
  };
  const removeUnavail = (id) => setUnavail((unavail || []).filter(u => u.id !== id));
  const scopeLabel = (s) => s === 'all' ? 'Tous les binômes' : (binomes.find(b => b.id === s)?.name || s);

  // Pré-remplissage des jours fériés français
  const [holidayYear, setHolidayYear] = useState(new Date().getFullYear());
  const addHolidays = () => {
    const feries = joursFeriesFR(holidayYear);
    const existing = unavail || [];
    // évite les doublons : même date + scope 'all'
    const has = (iso) => existing.some(u => u.scope === 'all' && u.from === iso && u.to === iso);
    const toAdd = feries.filter(f => !has(f.iso)).map(f => ({ id: uid(), scope: 'all', from: f.iso, to: f.iso, label: f.label, ferie: true }));
    if (!toAdd.length) { showToast(`Les jours fériés ${holidayYear} sont déjà présents.`); return; }
    setUnavail([...existing, ...toAdd].sort((a, b) => a.from.localeCompare(b.from)));
    showToast(`${toAdd.length} jour(s) férié(s) ${holidayYear} ajouté(s)`);
  };

  // --- Sauvegarde : exporter toutes les données dans un fichier .json ---
  // Construit l'objet de sauvegarde (réutilisé par l'export manuel ET la sauvegarde auto).
  const buildBackup = () => {
    const data = {
      _app: 'JM Bâches', _version: 1, _exportedAt: new Date().toISOString(),
      chantiers: sGet(SK.chantiers, chantiers),
      binomes: sGet(SK.binomes, binomes),
      settings: sGet(SK.settings, {}),
      edt: sGet(SK.edt, {}),
    };
    if (includeKeys) {
      data.keys = { apiKey: sGet(SK.apiKey, '') || apiKey || '', orsKey: sGet(SK.orsKey, '') || '', modelName: sGet(SK.modelName, DEFAULT_MODEL) };
    }
    return data;
  };

  const triggerDownload = (data, filename) => {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  // Nettoie les doublons : regroupe les chantiers de même identité (client + adresse + ville)
  // et n'en garde qu'un — la version la plus complète (terminée/avec retour l'emporte).
  const dedupChantiers = () => {
    const norm = (s) => (s || '').toString().trim().toLowerCase().replace(/\s+/g, ' ');
    const sig = (c) => `${norm(c.clientName)}|${norm(c.address)}|${norm(c.city)}`;
    const rank = (c) => {
      let r = 0;
      if (c.scheduledDate && c.scheduledBinome) r = 1;
      if (c.status === 'valide') r = 2;
      if (c.status === 'fait' || typeof c.realDuration === 'number' || c.outcome) r = 3;
      return r;
    };
    const groups = new Map();
    chantiers.forEach(c => { const k = sig(c); if (!groups.has(k)) groups.set(k, []); groups.get(k).push(c); });
    let removed = 0;
    const cleaned = [];
    groups.forEach(list => {
      if (list.length === 1) { cleaned.push(list[0]); return; }
      // fusionne le groupe : on part de la version la plus avancée, et on récupère les champs utiles des autres
      const best = list.slice().sort((a, b) => rank(b) - rank(a))[0];
      const merged = { ...best };
      list.forEach(c => {
        if (merged.realDuration == null && c.realDuration != null) merged.realDuration = c.realDuration;
        if (!merged.outcome && c.outcome) merged.outcome = c.outcome;
        if (!merged.archived && c.archived) merged.archived = c.archived;
        if (!(merged.status === 'fait' || merged.status === 'valide') && (c.status === 'fait' || c.status === 'valide')) merged.status = c.status;
      });
      cleaned.push(merged);
      removed += list.length - 1;
    });
    if (!removed) { showToast('Aucun doublon trouvé'); return; }
    if (!window.confirm(`${removed} doublon(s) détecté(s) (même client + adresse).\n\nLes fusionner en gardant la version la plus complète ? Les retours de pose et l'archivage sont conservés.`)) return;
    setChantiers(cleaned);
    showToast(`${removed} doublon(s) fusionné(s)`);
  };

  const exportData = () => {
    triggerDownload(buildBackup(), `JM_Baches_sauvegarde_${stampFile()}.json`);
    try { localStorage.setItem('jmb_last_export', String(Date.now())); } catch (e) {}
    showToast(includeKeys ? 'Sauvegarde téléchargée (clés API incluses)' : 'Sauvegarde téléchargée');
  };

  // --- Restauration : importer un fichier, FUSIONNER en supprimant les doublons ---
  const onImportFile = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !Array.isArray(data.chantiers)) throw new Error('format');
        const nbImport = data.chantiers.length;
        if (!window.confirm(`Importer ${nbImport} chantier(s) depuis cette sauvegarde ?\n\nLes données sont FUSIONNÉES : les nouveaux chantiers sont ajoutés, et les chantiers déjà présents sont mis à jour avec les infos plus récentes (statut terminé, retours de pose, archivage). Rien n'est supprimé.`)) {
          if (importInputRef.current) importInputRef.current.value = '';
          return;
        }
        // Fusion des chantiers : on rapproche par id (ou client+adresse+date).
        // - chantier inconnu → ajouté
        // - chantier déjà présent → on FUSIONNE pour récupérer les infos plus avancées de la
        //   sauvegarde (statut terminé, durée réelle, statut de réussite, archivage), sans rien perdre.
        const current = sGet(SK.chantiers, chantiers) || [];
        // Signature d'identité : client + adresse + ville, normalisés. PAS la date (elle change
        // quand un chantier est replanifié/terminé) ni le code postal — sinon on crée des doublons.
        const norm = (s) => (s || '').toString().trim().toLowerCase().replace(/\s+/g, ' ');
        const sig = (c) => `${norm(c.clientName)}|${norm(c.address)}|${norm(c.city)}`;
        const byId = new Map(current.map(c => [c.id, c]));
        const bySig = new Map(current.map(c => [sig(c), c]));
        // "avancement" d'un chantier : plus c'est élevé, plus la version est aboutie
        const rank = (c) => {
          let r = 0;
          if (c.scheduledDate && c.scheduledBinome) r = 1;
          if (c.status === 'valide') r = 2;
          if (c.status === 'fait' || typeof c.realDuration === 'number' || c.outcome) r = 3;
          return r;
        };
        const result = current.map(c => ({ ...c }));
        const idxById = new Map(result.map((c, i) => [c.id, i]));
        const idxBySig = new Map(result.map((c, i) => [sig(c), i]));
        let added = [], updated = 0;
        data.chantiers.forEach(inc => {
          let i = idxById.has(inc.id) ? idxById.get(inc.id) : (idxBySig.has(sig(inc)) ? idxBySig.get(sig(inc)) : -1);
          if (i < 0) {
            // nouveau chantier
            const ni = result.length;
            result.push({ ...inc });
            idxById.set(inc.id, ni); idxBySig.set(sig(inc), ni);
            added.push(inc);
          } else {
            const local = result[i];
            // on récupère les champs de retour/statut si la version importée est plus avancée
            const incAhead = rank(inc) > rank(local);
            const merged = { ...local };
            if (incAhead) {
              merged.status = inc.status || local.status;
            }
            // ces champs ne doivent jamais être perdus : on prend la valeur renseignée
            if (inc.realDuration != null && local.realDuration == null) merged.realDuration = inc.realDuration;
            if (inc.outcome && !local.outcome) merged.outcome = inc.outcome;
            if (inc.archived && !local.archived) merged.archived = inc.archived;
            // si la version importée est terminée et pas la locale, on adopte le statut terminé
            if ((inc.status === 'fait' || inc.status === 'valide') && !(local.status === 'fait' || local.status === 'valide')) merged.status = inc.status;
            if (JSON.stringify(merged) !== JSON.stringify(local)) { result[i] = merged; updated++; }
          }
        });
        const mergedChantiers = result;
        setChantiers(mergedChantiers);

        // Binômes : compléter ceux qui manquent (par id), sans écraser les existants
        if (Array.isArray(data.binomes)) {
          const curBin = sGet(SK.binomes, binomes) || [];
          const binIds = new Set(curBin.map(b => b.id));
          const newBins = [...curBin, ...data.binomes.filter(b => !binIds.has(b.id))];
          if (newBins.length !== curBin.length) setBinomes(newBins);
        }
        // Réglages / dépôt : on garde les réglages actuels, on ne complète que si vide
        if (data.settings && typeof data.settings === 'object') {
          const curSettings = sGet(SK.settings, {}) || {};
          const mergedSettings = { ...data.settings, ...curSettings }; // l'actuel prime
          sSet(SK.settings, mergedSettings);
          if (!curSettings.depot && data.settings.depot) setDepot(data.settings.depot);
          if (!curSettings.workday && data.settings.workday) setWorkday(data.settings.workday);
          // Indisponibilités : fusion (sans doublon d'id)
          if (Array.isArray(data.settings.unavail) && data.settings.unavail.length) {
            const curU = unavail || [];
            const ids = new Set(curU.map(u => u.id));
            const mergedU = [...curU, ...data.settings.unavail.filter(u => !ids.has(u.id))].sort((a, b) => (a.from || '').localeCompare(b.from || ''));
            if (mergedU.length !== curU.length) setUnavail(mergedU);
          }
        }
        // Emplois du temps enregistrés : fusion par clé de semaine (sans écraser une semaine existante)
        if (data.edt && typeof data.edt === 'object') {
          const curEdt = sGet(SK.edt, {}) || {};
          const mergedEdt = { ...data.edt, ...curEdt };
          sSet(SK.edt, mergedEdt);
        }
        // Clés API : restaurées si présentes dans la sauvegarde. On écrase la clé locale
        // par celle de la sauvegarde (c'est le but : propager la config entre postes).
        let keysRestored = 0;
        if (data.keys && typeof data.keys === 'object') {
          if (data.keys.apiKey) { sSet(SK.apiKey, data.keys.apiKey); setApiKey(data.keys.apiKey); setKeyDraft(data.keys.apiKey); keysRestored++; }
          if (data.keys.orsKey) { sSet(SK.orsKey, data.keys.orsKey); setOrsDraft(data.keys.orsKey); setOrsSaved(true); setOrsTestResult(null); keysRestored++; }
          if (data.keys.modelName) { sSet(SK.modelName, data.keys.modelName); setModelDraft(data.keys.modelName); }
        }
        try { localStorage.setItem('jmb_last_export', String(Date.now())); } catch (e) {}
        showToast(`${added.length} chantier(s) ajouté(s) · ${updated} mis à jour${keysRestored ? ` · ${keysRestored} clé(s) API restaurée(s)` : ''}`);
      } catch (err) {
        showToast('Fichier invalide — ce n\'est pas une sauvegarde JM Bâches.');
      } finally {
        if (importInputRef.current) importInputRef.current.value = '';
      }
    };
    reader.readAsText(file);
  };

  return (
    <div className="pt-10 fadein">
      <div className="mb-8">
        <div className="label-cap mb-2">Configuration</div>
        <h1 className="font-display text-5xl leading-none tracking-tight">Paramètres</h1>
      </div>

      {/* Sauvegarde / Restauration */}
      <section className="card p-6 mb-6">
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded flex items-center justify-center shrink-0" style={{ background: 'var(--accent)' }}>
            <span style={{ color: '#fff' }}><I.save size={20} /></span>
          </div>
          <div className="flex-1">
            <h2 className="font-display text-2xl font-semibold mb-1">Sauvegarde des données</h2>
            <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>
              Tes données (chantiers, binômes, réglages, plannings) sont stockées dans ce navigateur. <strong>Exporte régulièrement</strong> un fichier de sauvegarde pour ne rien perdre en cas de changement d'ordinateur ou de nettoyage du navigateur. La restauration <strong>fusionne</strong> sans écraser : les doublons sont ignorés.
            </p>
            <div className="flex flex-wrap gap-3">
              <button onClick={exportData} className="btn-primary"><I.download size={16} /> Exporter une sauvegarde</button>
              <button onClick={() => importInputRef.current?.click()} className="btn-secondary"><I.upload size={16} /> Restaurer / importer</button>
              <button onClick={dedupChantiers} className="btn-secondary" title="Fusionne les chantiers en double (même client + adresse), en gardant la version la plus complète"><I.layers size={16} /> Nettoyer les doublons</button>
              <input ref={importInputRef} type="file" accept="application/json,.json" onChange={onImportFile} style={{ display: 'none' }} />
            </div>
            <label className="flex items-start gap-2 mt-3 cursor-pointer" style={{ maxWidth: 580 }}>
              <input type="checkbox" checked={includeKeys} onChange={e => setIncludeKeys(e.target.checked)} style={{ marginTop: 3 }} />
              <span className="text-xs" style={{ color: 'var(--ink-soft)' }}>
                Inclure les clés API (Anthropic + routage) dans la sauvegarde — pratique pour partager la config entre les postes de JM sans tout ressaisir.
                <span style={{ color: 'var(--ink-faint)' }}> Ces clés sont des secrets : ne transmets ce fichier qu'en interne, à des personnes de confiance.</span>
              </span>
            </label>
            <label className="flex items-start gap-2 mt-3 cursor-pointer" style={{ maxWidth: 580 }}>
              <input type="checkbox" checked={!!autoBackup} onChange={e => { const v = e.target.checked; setAutoBackup(v); try { localStorage.setItem('jmb_autobackup', v ? '1' : '0'); } catch (err) {} showToast(v ? 'Sauvegarde automatique activée' : 'Sauvegarde automatique désactivée'); }} style={{ marginTop: 3 }} />
              <span className="text-xs" style={{ color: 'var(--ink-soft)' }}>
                Sauvegarde automatique : télécharge un fichier de secours toutes les 6 h d'utilisation, sans y penser.
                <span style={{ color: 'var(--ink-faint)' }}> Le navigateur peut demander où l'enregistrer la 1re fois ; choisis ton dossier partagé pour ne plus avoir à y penser.</span>
              </span>
            </label>
            <p className="text-xs mt-3" style={{ color: 'var(--ink-faint)' }}>
              {chantiers.length} chantier(s) actuellement en mémoire.{(() => { try { const l = Number(localStorage.getItem('jmb_last_export') || 0); return l ? ` Dernière sauvegarde : ${new Date(l).toLocaleString('fr-FR')}.` : ' Aucune sauvegarde encore exportée.'; } catch { return ''; } })()}
            </p>
          </div>
        </div>
      </section>

      {/* Archivage des chantiers terminés */}
      <section className="card p-6 mb-6">
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded flex items-center justify-center shrink-0" style={{ background: 'var(--ink-soft)' }}>
            <span style={{ color: '#fff' }}><I.layers size={20} /></span>
          </div>
          <div className="flex-1">
            <h2 className="font-display text-2xl font-semibold mb-1">Archivage des chantiers</h2>
            <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>
              Pour garder la liste des chantiers légère, les chantiers terminés peuvent être archivés (sortis de la liste, mais conservés dans les statistiques et les sauvegardes). Le bouton « Archiver les anciens » de l'onglet Chantiers range tous les chantiers terminés au-delà du délai ci-dessous. C'est réversible.
            </p>
            <div className="flex items-center gap-3">
              <span className="text-sm" style={{ color: 'var(--ink-soft)' }}>Archiver les chantiers terminés depuis plus de</span>
              <select value={archiveMonths ?? 3} onChange={e => setArchiveMonths(Number(e.target.value))} style={{ width: 'auto' }}>
                <option value={1}>1 mois</option>
                <option value={2}>2 mois</option>
                <option value={3}>3 mois</option>
                <option value={6}>6 mois</option>
                <option value={12}>1 an</option>
              </select>
            </div>
          </div>
        </div>
      </section>

      {/* Indisponibilités / congés / fériés */}
      <section className="card p-6 mb-6">
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded flex items-center justify-center shrink-0" style={{ background: 'var(--teal, #4E9D8E)' }}>
            <span style={{ color: '#fff' }}><I.calendarDays size={20} /></span>
          </div>
          <div className="flex-1">
            <h2 className="font-display text-2xl font-semibold mb-1">Indisponibilités, congés et jours fériés</h2>
            <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>
              Déclare les jours où une équipe (ou tout le monde) ne travaille pas. Lors de l'optimisation, ces jours sont bloqués et les chantiers reportés sur les autres jours disponibles de la semaine.
            </p>
            <div className="grid md:grid-cols-4 gap-3 items-end">
              <Field label="Qui ?">
                <select value={uScope} onChange={e => setUScope(e.target.value)}>
                  <option value="all">Tous (jour férié)</option>
                  {binomes.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
              </Field>
              <Field label="Du"><input type="date" value={uFrom} onChange={e => setUFrom(e.target.value)} /></Field>
              <Field label="Au"><input type="date" value={uTo} onChange={e => setUTo(e.target.value)} /></Field>
              <Field label="Motif (optionnel)"><input type="text" placeholder="Congés, férié…" value={uLabel} onChange={e => setULabel(e.target.value)} /></Field>
            </div>
            <div className="mt-3 flex flex-wrap items-center gap-3">
              <button onClick={addUnavail} className="btn-primary"><I.plus size={16} /> Ajouter</button>
              <span className="text-xs" style={{ color: 'var(--ink-faint)' }}>ou</span>
              <div className="flex items-center gap-2">
                <select value={holidayYear} onChange={e => setHolidayYear(Number(e.target.value))} style={{ width: 'auto', padding: '6px 8px' }}>
                  {[0, 1, 2].map(o => { const y = new Date().getFullYear() + o; return <option key={y} value={y}>{y}</option>; })}
                </select>
                <button onClick={addHolidays} className="btn-secondary"><I.calendarDays size={14} /> Ajouter les jours fériés</button>
              </div>
            </div>

            {(unavail || []).length > 0 ? (
              <div className="mt-5 space-y-2">
                {(unavail || []).map(u => (
                  <div key={u.id} className="flex items-center justify-between p-3 rounded" style={{ background: 'var(--cream)' }}>
                    <div className="flex items-center gap-3 text-sm">
                      <span className="font-medium" style={{ color: u.scope === 'all' ? 'var(--accent)' : (binomes.find(b => b.id === u.scope)?.color || 'var(--ink)') }}>{scopeLabel(u.scope)}</span>
                      <span style={{ color: 'var(--ink-soft)' }}>
                        {u.from === u.to ? fmtDateLong(u.from) : `du ${fmtDate(u.from)} au ${fmtDate(u.to)}`}
                      </span>
                      {u.ferie && <span className="text-xs px-2 py-0.5 rounded" style={{ background: '#FBE3C0', color: '#9A5A12' }}>férié</span>}
                      {u.label && <span className="text-xs px-2 py-0.5 rounded" style={{ background: 'var(--border)', color: 'var(--ink-soft)' }}>{u.label}</span>}
                    </div>
                    <button onClick={() => removeUnavail(u.id)} className="text-xs flex items-center gap-1" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-faint)' }}>
                      <I.trash size={12} /> Retirer
                    </button>
                  </div>
                ))}
              </div>
            ) : (
              <p className="text-xs mt-4" style={{ color: 'var(--ink-faint)' }}>Aucune indisponibilité déclarée. Toutes les équipes sont considérées disponibles du lundi au jeudi.</p>
            )}
          </div>
        </div>
      </section>

      {/* Clé API */}
      <section className="card p-6 mb-6 relative overflow-hidden">
        <div className="absolute top-0 left-0 right-0 h-1 stripe" />
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded flex items-center justify-center shrink-0" style={{ background: 'var(--ink)' }}>
            <span style={{ color: 'var(--cream)' }}><I.key size={20} /></span>
          </div>
          <div className="flex-1">
            <h2 className="font-display text-2xl font-semibold mb-1">Clé API Anthropic</h2>
            <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>
              Nécessaire pour l'extraction automatique des contrats. Crée ta clé sur <a href="https://console.anthropic.com/" target="_blank" style={{ color: 'var(--accent)', textDecoration: 'underline' }}>console.anthropic.com</a> (≈3-5€/mois pour ton volume). Elle est stockée uniquement dans ton navigateur, jamais envoyée ailleurs.
            </p>
            <div className="flex gap-3">
              <input type="password" placeholder="sk-ant-..." value={keyDraft} onChange={e => setKeyDraft(e.target.value)} style={{ flex: 1, fontFamily: 'JetBrains Mono, monospace' }} />
              <button onClick={() => { setApiKey(keyDraft); showToast('Clé API enregistrée'); }} className="btn-primary"><I.save size={14} /> Enregistrer</button>
            </div>
            {apiKey && <div className="text-xs mt-2" style={{ color: '#2D5A3D' }}>✓ Clé configurée — l'extraction IA est active</div>}
            <div className="mt-4 pt-4" style={{ borderTop: '1px solid var(--border)' }}>
              <label className="label-cap" style={{ display: 'block', marginBottom: 6 }}>Modèle d'IA utilisé pour l'extraction</label>
              <div className="flex gap-3">
                <input type="text" placeholder={DEFAULT_MODEL} value={modelDraft} onChange={e => setModelDraft(e.target.value)} style={{ flex: 1, fontFamily: 'JetBrains Mono, monospace' }} />
                <button onClick={() => { sSet(SK.modelName, (modelDraft || '').trim() || DEFAULT_MODEL); showToast('Modèle enregistré'); }} className="btn-secondary"><I.save size={14} /> Enregistrer</button>
              </div>
              <p className="text-xs mt-2" style={{ color: 'var(--ink-faint)' }}>
                Si l'extraction renvoie une erreur « model not found », le nom du modèle a changé : récupère le nom exact sur <a href="https://docs.claude.com/en/docs/about-claude/models" target="_blank" style={{ color: 'var(--accent)', textDecoration: 'underline' }}>la documentation des modèles</a> et colle-le ici. Valeur par défaut : {DEFAULT_MODEL}.
              </p>
            </div>
          </div>
        </div>
      </section>

      {/* Clé routage OpenRouteService */}
      <section className="card p-6 mb-6 relative overflow-hidden">
        <div className="absolute top-0 left-0 right-0 h-1" style={{ background: 'var(--teal)' }} />
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded flex items-center justify-center shrink-0" style={{ background: 'var(--teal)' }}>
            <span style={{ color: 'white' }}><I.mapPin size={20} /></span>
          </div>
          <div className="flex-1">
            <h2 className="font-display text-2xl font-semibold mb-1">Clé routage (OpenRouteService)</h2>
            <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>
              Rend les temps de trajet fiables et stables. Crée un compte et un token gratuits sur <a href="https://openrouteservice.org/dev/#/signup" target="_blank" style={{ color: 'var(--accent)', textDecoration: 'underline' }}>openrouteservice.org</a> (offre gratuite ≈ 500 calculs/jour, largement suffisant). Sans clé, l'appli utilise le routage public de secours, moins fiable. Stockée uniquement dans ce navigateur.
            </p>
            <div className="flex gap-3">
              <input type="password" placeholder="Colle ton token ORS ici…" value={orsDraft} onChange={e => { setOrsDraft(e.target.value); setOrsTestResult(null); }} style={{ flex: 1, fontFamily: 'JetBrains Mono, monospace' }} />
              <button onClick={async () => { setOrsTesting(true); setOrsTestResult(null); const res = await testOrsKey(orsDraft); setOrsTestResult(res); setOrsTesting(false); }} disabled={orsTesting || !orsDraft.trim()} className="btn-secondary">
                {orsTesting ? <><span className="spin"><I.loader size={14} /></span> Test…</> : <><I.sparkles size={14} /> Tester</>}
              </button>
              <button onClick={() => { sSet(SK.orsKey, orsDraft.trim()); setOrsSaved(!!orsDraft.trim()); showToast(orsDraft.trim() ? 'Clé routage enregistrée' : 'Clé routage effacée'); }} className="btn-primary"><I.save size={14} /> Enregistrer</button>
            </div>
            {orsTestResult && (
              <div className="text-xs mt-2" style={{ color: orsTestResult.ok ? '#2D5A3D' : 'var(--accent)' }}>
                {orsTestResult.ok ? '✓ ' : '⚠ '}{orsTestResult.message}
              </div>
            )}
            {!orsTestResult && (orsSaved
              ? <div className="text-xs mt-2" style={{ color: '#2D5A3D' }}>✓ Routage fiable activé (OpenRouteService) — secours automatique si indisponible</div>
              : <div className="text-xs mt-2" style={{ color: 'var(--ink-faint)' }}>Aucune clé — routage public de secours utilisé</div>)}
          </div>
        </div>
      </section>

      <section className="card p-6 mb-6 relative overflow-hidden">
        <div className="absolute top-0 left-0 right-0 h-1" style={{ background: 'var(--navy)' }} />
        <div className="flex items-start gap-4">
          <div className="w-12 h-12 rounded flex items-center justify-center shrink-0" style={{ background: 'var(--navy)' }}>
            <span style={{ color: 'white' }}><I.mapPin size={20} /></span>
          </div>
          <div className="flex-1">
            <h2 className="font-display text-2xl font-semibold mb-1">Point de départ (dépôt)</h2>
            <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>
              Adresse d'où partent les binômes le matin. Sert de base à l'optimisation des tournées et au calcul du temps de retour. Laisse vide si tu ne veux pas de point fixe.
            </p>
            <div className="grid md:grid-cols-4 gap-3">
              <div className="md:col-span-2"><Field label="Adresse"><input value={depot.address} onChange={e => setDepot({ ...depot, address: e.target.value })} placeholder="N° et rue du dépôt" /></Field></div>
              <Field label="Code postal"><input value={depot.postalCode} onChange={e => setDepot({ ...depot, postalCode: e.target.value })} /></Field>
              <Field label="Ville"><input value={depot.city} onChange={e => setDepot({ ...depot, city: e.target.value })} /></Field>
            </div>
            <button onClick={() => showToast('Dépôt enregistré')} className="btn-primary mt-4"><I.save size={14} /> Enregistrer</button>
          </div>
        </div>
      </section>

      <section className="card p-6 mb-6">
        <div className="flex items-center gap-3 mb-1">
          <span style={{ color: 'var(--ink-faint)' }}><I.clock size={20} /></span>
          <h2 className="font-display text-2xl font-semibold">Horaires de travail</h2>
        </div>
        <p className="text-sm mb-4" style={{ color: 'var(--ink-soft)' }}>Base de calcul de l'emploi du temps minuté (départ, pause déjeuner).</p>
        <div className="grid md:grid-cols-3 gap-3">
          <Field label="Début de journée"><input type="time" value={workday.start} onChange={e => setWorkday({ ...workday, start: e.target.value })} /></Field>
          <Field label="Début pause déjeuner"><input type="time" value={workday.lunchStart} onChange={e => setWorkday({ ...workday, lunchStart: e.target.value })} /></Field>
          <Field label="Durée déjeuner (min)"><input type="number" min="0" step="15" value={workday.lunchDuration} onChange={e => setWorkday({ ...workday, lunchDuration: parseInt(e.target.value) || 0 })} /></Field>
        </div>
        <button onClick={() => showToast('Horaires enregistrés')} className="btn-primary mt-4"><I.save size={14} /> Enregistrer</button>
      </section>

      <div className="grid md:grid-cols-2 gap-6">
        <section className="card p-6">
          <h2 className="font-display text-2xl font-semibold mb-4">Binômes</h2>
          <div className="space-y-4">
            {binomes.map((b, idx) => (
              <div key={b.id} className="p-3 rounded" style={{ border: '1px solid var(--border)' }}>
                <div className="flex items-center gap-3 mb-2">
                  <input type="color" value={b.color} onChange={e => { const c = [...binomes]; c[idx].color = e.target.value; setBinomes(c); }} style={{ width: 50, padding: 2, height: 36 }} />
                  <input value={b.name} onChange={e => { const c = [...binomes]; c[idx].name = e.target.value; setBinomes(c); }} />
                </div>
                <div className="grid grid-cols-2 gap-2">
                  {b.members.map((m, mi) => (
                    <input key={mi} value={m} placeholder={`Poseur ${mi+1}`} onChange={e => { const c = [...binomes]; c[idx].members[mi] = e.target.value; setBinomes(c); }} />
                  ))}
                </div>
                <div className="grid grid-cols-2 gap-2 mt-2">
                  <input type="tel" value={b.phone || ''} placeholder="Téléphone (SMS)" onChange={e => { const c = [...binomes]; c[idx] = { ...c[idx], phone: e.target.value }; setBinomes(c); }} />
                  <input type="email" value={b.email || ''} placeholder="Email" onChange={e => { const c = [...binomes]; c[idx] = { ...c[idx], email: e.target.value }; setBinomes(c); }} />
                </div>
              </div>
            ))}
            <button onClick={() => showToast('Binômes sauvegardés')} className="btn-primary"><I.save size={14} /> Enregistrer</button>
          </div>
        </section>

        <section className="card p-6">
          <h2 className="font-display text-2xl font-semibold mb-4">Types de pose</h2>
          <p className="text-xs mb-4" style={{ color: 'var(--ink-soft)' }}>
            Définit les durées par défaut. Affine ces valeurs avec ton vrai chrono terrain — c'est ce qui transforme la qualité du planning.
          </p>
          <div className="space-y-2">
            {poseTypes.map((p, i) => (
              <div key={i} className="grid grid-cols-12 gap-2 items-center">
                <input className="col-span-7" value={p.name} onChange={e => { const c = [...poseTypes]; c[i].name = e.target.value; setPoseTypes(c); }} />
                <input className="col-span-3" type="number" min="0.5" step="0.5" value={p.duration} onChange={e => { const c = [...poseTypes]; c[i].duration = parseFloat(e.target.value) || 0; setPoseTypes(c); }} />
                <button className="col-span-2 text-xs flex items-center gap-1" style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--ink-soft)' }}
                        onClick={() => setPoseTypes(poseTypes.filter((_, j) => j !== i))}>
                  <I.trash size={12} /> Suppr.
                </button>
              </div>
            ))}
            <button onClick={() => setPoseTypes([...poseTypes, { name: 'Nouveau type', duration: 4, weather: true }])} className="btn-secondary mt-2">
              <I.plus size={14} /> Ajouter un type
            </button>
          </div>
        </section>
      </div>

      <section className="card p-6 mt-6 grain">
        <h2 className="font-display text-2xl font-semibold mb-2">À propos de cet outil</h2>
        <p className="text-sm" style={{ color: 'var(--ink-soft)' }}>
          Prototype JM Bâches V1 — gestion chantiers + extraction IA contrats + planning binômes + optimisation de tournée + feuilles de route imprimables. <br />
          Données stockées localement dans ton navigateur. Appels réseau : API Anthropic (lecture des contrats), API Adresse data.gouv.fr (géocodage) et OSRM (temps de trajet) — seules les adresses transitent, jamais les données client. <br />
          <strong>Évolutions pour la prod</strong> : carte géographique interactive, météo intégrée, signature électronique tablette, multi-utilisateurs, export Excel, et un serveur de routage dédié (le serveur OSRM public est réservé aux tests).
        </p>
      </section>
    </div>
  );
}

/* Render */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
