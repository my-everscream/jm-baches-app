<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JM Bâches — Gestion des chantiers</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F4F2;
    --paper: #FFFFFF;
    --ink: #16181D;
    --ink-soft: #565A63;
    --ink-faint: #8B8F98;
    --border: #E2E3E6;
    --border-strong: #C7C9CE;
    --accent: #1B5FCC;
    --accent-deep: #14479B;
    --navy: #1B5FCC;
    --teal: #4E9D8E;
    --teal-deep: #3A7A6E;
    --cream: #EAF0F9;
    --charcoal: #1C1E22;
    /* polish : ombres et courbe d'animation homogènes (mêmes teintes, juste plus fini) */
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
    --shadow-sm: 0 1px 2px rgba(22, 24, 29, 0.04), 0 1px 3px rgba(22, 24, 29, 0.05);
    --shadow-md: 0 2px 6px rgba(22, 24, 29, 0.06), 0 4px 14px rgba(22, 24, 29, 0.06);
    --shadow-lg: 0 6px 18px rgba(22, 24, 29, 0.10), 0 12px 40px rgba(22, 24, 29, 0.10);
    --ring: 0 0 0 3px rgba(27, 95, 204, 0.18);
  }
  * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; }
  body { background: var(--bg); color: var(--ink); font-family: 'DM Sans', system-ui, sans-serif; margin: 0; }
  .font-display { font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: -0.01em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  .grain { background-image: radial-gradient(rgba(0,0,0,0.022) 1px, transparent 1px); background-size: 3px 3px; }
  .stripe { background: repeating-linear-gradient(45deg, rgba(27,95,204,0.07), rgba(27,95,204,0.07) 8px, transparent 8px, transparent 16px); }
  .diamond-sep { color: var(--ink-faint); opacity: 0.5; font-size: 9px; }

  .btn-primary { background: var(--charcoal); color: #fff; padding: 10px 18px; border-radius: 3px; font-weight: 500; font-size: 14px; letter-spacing: 0.01em; display: inline-flex; align-items: center; gap: 8px; transition: background .2s var(--ease), transform .2s var(--ease), box-shadow .2s var(--ease); cursor: pointer; border: none; box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: #000; transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-primary:active { transform: translateY(0); box-shadow: var(--shadow-sm); }
  .btn-primary:focus-visible { outline: none; box-shadow: var(--shadow-sm), var(--ring); }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary { background: transparent; color: var(--ink); padding: 9px 16px; border-radius: 3px; font-weight: 500; font-size: 14px; border: 1px solid var(--border-strong); display: inline-flex; align-items: center; gap: 8px; cursor: pointer; transition: background .2s var(--ease), border-color .2s var(--ease), transform .2s var(--ease); }
  .btn-secondary:hover { background: var(--cream); border-color: var(--accent); transform: translateY(-1px); }
  .btn-secondary:active { transform: translateY(0); }
  .btn-secondary:focus-visible { outline: none; box-shadow: var(--ring); }
  .btn-accent { background: var(--accent); color: white; padding: 10px 18px; border-radius: 3px; font-weight: 500; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; cursor: pointer; border: none; transition: background .2s var(--ease), transform .2s var(--ease), box-shadow .2s var(--ease); box-shadow: var(--shadow-sm); }
  .btn-accent:hover { background: var(--accent-deep); transform: translateY(-1px); box-shadow: var(--shadow-md); }
  .btn-accent:active { transform: translateY(0); box-shadow: var(--shadow-sm); }
  .btn-accent:focus-visible { outline: none; box-shadow: var(--shadow-sm), var(--ring); }
  .btn-accent:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  input, select, textarea { background: var(--paper); border: 1px solid var(--border); border-radius: 3px; padding: 10px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--ink); width: 100%; transition: border-color .2s var(--ease), box-shadow .2s var(--ease); box-sizing: border-box; }
  input:hover, select:hover, textarea:hover { border-color: var(--border-strong); }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); box-shadow: var(--ring); }
  input[type=checkbox] { width: auto; accent-color: var(--accent); }

  .card { background: var(--paper); border: 1px solid var(--border); border-radius: 4px; box-shadow: var(--shadow-sm); transition: box-shadow .2s var(--ease), border-color .2s var(--ease), transform .2s var(--ease); }
  .card-hover:hover { box-shadow: var(--shadow-md); border-color: var(--border-strong); transform: translateY(-2px); }
  .label-cap { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-faint); font-weight: 600; font-family: 'JetBrains Mono', monospace; }
  .fadein { animation: fadeIn .35s var(--ease); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .spin { animation: spin 1s linear infinite; display: inline-flex; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* barre de défilement discrète, dans les tons de la DA */
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 6px; border: 3px solid var(--bg); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
  * { scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; }
  ::selection { background: rgba(27, 95, 204, 0.16); }
  @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; } }

  @media print {
    body { background: white; }
    .no-print { display: none !important; }
    .print-page { page-break-after: always; }
    .card, .btn-primary, .btn-accent, .btn-secondary { box-shadow: none !important; }
  }
</style>
</head>

const fmtDate = (iso) => iso ? parseISO(iso).toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: 'short' }) : '—';

const addDays = (date, n) => { const d = new Date(date); d.setDate(d.getDate() + n); return d; };

// Indisponibilité : une entrée { scope:'all'|binomeId, from, to } bloque [from..to] inclus.
// Renvoie true si le binôme binId ne peut pas travailler à la date iso.
const isUnavailable = (unavail, binId, iso) => {
  if (!Array.isArray(unavail)) return false;
  return unavail.some(u => {
    if (u.scope !== 'all' && u.scope !== binId) return false;
    const from = u.from || u.to, to = u.to || u.from;
    return iso >= from && iso <= to; // comparaison lexicographique OK sur ISO YYYY-MM-DD
  });
};
// Un chantier peut-il être posé à la date iso, vu sa fenêtre client (notBefore / notAfter) ?

  if (!iso) return true;

  if (chantier.fixedTime && chantier.scheduledDate) return chantier.scheduledDate === iso;

};

  return !poseDaysISO.some(iso => dateAllowed(chantier, iso));
};
// Dimanche de Pâques pour une année (algorithme de Gauss / Butcher) → {month (1-12), day}
const easterSunday = (year) => {
  const a = year % 19, b = Math.floor(year / 100), c = year % 100;
  const d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25);
  const g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30;
  const i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7;
  const m = Math.floor((a + 11 * h + 22 * l) / 451);
  const month = Math.floor((h + l - 7 * m + 114) / 31);
  const day = ((h + l - 7 * m + 114) % 31) + 1;
  return { month, day };
};

/* =========================================================================
   OPTIMISATION DE TOURNÉE — géocodage + matrice de temps + TSP
   ========================================================================= */

/* Distance à vol d'oiseau (km) — utilisée en repli si le routage est indispo */
const haversineKm = (a, b) => {
  const R = 6371, toRad = x => x * Math.PI / 180;
  const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lon - a.lon);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(s), Math.sqrt(1 - s));
};

/* Cache de géocodage (localStorage) pour ne pas re-géocoder à chaque fois */
const GEO_CACHE_KEY = 'jmb_geocache_v1';
const normAddr = (s) => (s || '').trim().toLowerCase().replace(/\s+/g, ' ');

/* Géocodage via l'API Adresse (Base Adresse Nationale) — gratuit, sans clé */
async function geocodeFr(address, postalCode, city) {
  const full = [address, postalCode, city].filter(Boolean).join(' ').trim();
  if (!full) return null;
  const cache = sGet(GEO_CACHE_KEY, {});
  const key = normAddr(full);
  if (cache[key]) return cache[key];
  const q = encodeURIComponent([address, city].filter(Boolean).join(' ') || full);
  const url = `https://api-adresse.data.gouv.fr/search/?q=${q}` + (postalCode ? `&postcode=${encodeURIComponent(postalCode)}` : '') + '&limit=1';
  const r = await fetch(url);
  if (!r.ok) throw new Error('Géocodage indisponible (' + r.status + ')');
  const j = await r.json();
  const f = j.features && j.features[0];
  if (!f) return null;
  const [lon, lat] = f.geometry.coordinates;
  const pt = { lat, lon, label: f.properties.label };
  cache[key] = pt; sSet(GEO_CACHE_KEY, cache);
  return pt;
}

/* Matrice de durées (secondes). Priorité de routage :
   1) OpenRouteService (fiable, avec la clé saisie dans Paramètres) — découpe si > 50 points
   2) OSRM public (secours, sans clé)
   3) estimation à vol d'oiseau (dernier recours)
   Toute case manquante est comblée par l'estimation → matrice toujours pleine et numérique. */
async function durationMatrix(points) {
  const n = points.length;
  const AVG_KMH = 35, ROAD_FACTOR = 1.3;
  const estimate = (i, j) => i === j ? 0 : (haversineKm(points[i], points[j]) * ROAD_FACTOR / AVG_KMH) * 3600;
  const fullEstimate = () => {
    const m = Array.from({ length: n }, () => new Array(n).fill(0));
    for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) if (i !== j) m[i][j] = estimate(i, j);
    return m;
  };
  const fillHoles = (m) => {
    let holes = 0;
    const out = Array.from({ length: n }, (_, i) => Array.from({ length: n }, (_, j) => {
      const v = (m[i] && typeof m[i][j] === 'number' && isFinite(m[i][j])) ? m[i][j] : null;
      if (v == null) { holes++; return estimate(i, j); }
      return v;
    }));
    return { out, holes };
  };

  // ---- 1) OpenRouteService (si une clé est configurée) ----
  const orsKey = sGet(SK.orsKey, '');
  if (orsKey) {
    try {
      const ORS_MAX = 50; // limite de points par requête matrice (plan gratuit)
      if (n <= ORS_MAX) {
        const m = await orsMatrix(points, orsKey);
        const { out, holes } = fillHoles(m);
        return { matrix: out, source: holes > 0 ? 'ors+estimation' : 'ors' };
      }
      // gros lot : on découpe en blocs et on assemble la matrice par sous-requêtes sources→destinations
      const full = Array.from({ length: n }, () => new Array(n).fill(null));
      const idx = Array.from({ length: n }, (_, i) => i);
      const blocks = [];
      for (let i = 0; i < n; i += ORS_MAX) blocks.push(idx.slice(i, i + ORS_MAX));
      for (const src of blocks) {
        for (const dst of blocks) {
          const sub = [...new Set([...src, ...dst])];
          const subPts = sub.map(i => points[i]);
          const subM = await orsMatrix(subPts, orsKey);
          sub.forEach((gi, li) => sub.forEach((gj, lj) => {
            if (subM[li] && typeof subM[li][lj] === 'number') full[gi][gj] = subM[li][lj];
          }));
        }
      }
      const { out, holes } = fillHoles(full);
      return { matrix: out, source: holes > 0 ? 'ors+estimation' : 'ors' };
    } catch (e) { /* ORS indisponible → on bascule sur OSRM */ }
  }

  // ---- 2) OSRM public (secours) ----
  try {
    const coords = points.map(p => `${p.lon},${p.lat}`).join(';');
    const url = `https://router.project-osrm.org/table/v1/driving/${coords}?annotations=duration`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('OSRM ' + r.status);
    const j = await r.json();
    if (j.code !== 'Ok' || !Array.isArray(j.durations)) throw new Error('OSRM réponse invalide');
    const { out, holes } = fillHoles(j.durations);
    return { matrix: out, source: holes > 0 ? 'osrm+estimation' : 'osrm' };
  } catch (e) {
    // ---- 3) estimation ----
    return { matrix: fullEstimate(), source: 'estimation' };
  }
}

/* Appel matrice OpenRouteService. Coordonnées attendues en [lon, lat]. Renvoie durations (secondes). */
async function orsMatrix(points, key) {
  const body = { locations: points.map(p => [p.lon, p.lat]), metrics: ['duration'], units: 'm' };
  const r = await fetch('https://api.openrouteservice.org/v2/matrix/driving-car', {
    method: 'POST',
    headers: { 'Authorization': key, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!r.ok) throw new Error('ORS ' + r.status);
  const j = await r.json();
  if (!Array.isArray(j.durations)) throw new Error('ORS réponse invalide');
  return j.durations;
}

/* Teste une clé ORS par un appel minimal (2 points proches). Renvoie { ok, message }. */
async function testOrsKey(key) {
  if (!key || !key.trim()) return { ok: false, message: 'Aucune clé saisie.' };
  try {
    const r = await fetch('https://api.openrouteservice.org/v2/matrix/driving-car', {
      method: 'POST',
      headers: { 'Authorization': key.trim(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ locations: [[4.97, 44.92], [5.05, 45.04]], metrics: ['duration'], units: 'm' }),
    });
    if (r.status === 401 || r.status === 403) return { ok: false, message: 'Clé refusée (401/403) — vérifie le token, il est peut-être incorrect ou pas encore activé.' };
    if (r.status === 429) return { ok: true, message: 'Clé valide, mais quota du jour atteint (réessaie demain). Le routage de secours prendra le relais entre-temps.' };
    if (!r.ok) return { ok: false, message: 'Erreur ORS ' + r.status + ' — réessaie dans un moment.' };
    const j = await r.json();
    if (Array.isArray(j.durations) && typeof j.durations[0]?.[1] === 'number') {
      const min = Math.round(j.durations[0][1] / 60);
      return { ok: true, message: `Clé valide ✓ Routage fiable actif (test : ${min} min entre deux points).` };
    }
    return { ok: false, message: 'Réponse inattendue du service — clé peut-être invalide.' };
  } catch (e) {
    return { ok: false, message: 'Impossible de joindre OpenRouteService (connexion internet ?).' };
  }
}

/* TSP : ordre des arrêts minimisant le temps total.
   start = index de départ fixé (le dépôt), returnToStart = retour au dépôt en fin de journée */
function optimizeOrder(matrix, { start = 0, returnToStart = false } = {}) {
  const n = matrix.length;
  if (n <= 2) return { order: Array.from({ length: n }, (_, i) => i) };
  // 1) plus proche voisin
  const remaining = []; for (let i = 0; i < n; i++) if (i !== start) remaining.push(i);
  let route = [start], cur = start;
  while (remaining.length) {
    let bi = 0, bd = Infinity;
    remaining.forEach((node, idx) => { if (matrix[cur][node] < bd) { bd = matrix[cur][node]; bi = idx; } });
    cur = remaining[bi]; route.push(cur); remaining.splice(bi, 1);
  }
  // 2) raffinage 2-opt (on garde le départ en position 0)
  const cost = (rt) => {
    let c = 0;
    for (let i = 0; i < rt.length - 1; i++) c += matrix[rt[i]][rt[i + 1]];
    if (returnToStart) c += matrix[rt[rt.length - 1]][rt[0]];
    return c;
  };
  let improved = true;
  while (improved) {
    improved = false;
    for (let i = 1; i < route.length - 1; i++) {
      for (let k = i + 1; k < route.length; k++) {
        const nr = route.slice(0, i).concat(route.slice(i, k + 1).reverse(), route.slice(k + 1));
        if (cost(nr) < cost(route) - 1e-6) { route = nr; improved = true; }
      }
    }
  }
  return { order: route, total: cost(route) };
}

/* =========================================================================
   PLANIFICATION HORAIRE — pose des arrêts sur l'horloge
   ========================================================================= */
function parseHHMM(s, fallbackMin) {
  if (!s || !/^\d{1,2}:\d{2}$/.test(s)) return fallbackMin;
  const [h, m] = s.split(':').map(Number);
  return h * 60 + m;
}
const minToHHMM = (min) => {
  const h = Math.floor(min / 60), m = Math.round(min % 60);
  return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
};

/* =========================================================================
   ENVOI DES FEUILLES DE ROUTE AUX POSEURS (SMS / email pré-remplis)
   Une page HTML ne peut pas envoyer seule : on prépare le message et on ouvre
   l'app SMS (sms:) ou mail (mailto:) avec tout rempli. Reste à appuyer Envoyer.
   ========================================================================= */

/* Texte d'une feuille de route d'UNE journée pour un binôme. chantiers triés/ordonnés. */
function routeSheetText({ binome, dateLabel, chantiers }) {
  const lines = [];
  lines.push(`JM Bâches — Feuille de route`);
  lines.push(`${binome?.name || ''} · ${dateLabel}`);
  lines.push('');
  if (!chantiers.length) { lines.push('Aucun chantier ce jour.'); return lines.join('\n'); }
  chantiers.forEach((c, i) => {
    const heure = c._startLabel ? `${c._startLabel} ` : '';
    lines.push(`${i + 1}. ${heure}${c.clientName || 'Client'}`);
    const adr = [c.address, [c.postalCode, c.city].filter(Boolean).join(' ')].filter(Boolean).join(', ');
    if (adr) lines.push(`   ${adr}`);
    const det = [c.type, c.estimatedDuration ? c.estimatedDuration + 'h' : null].filter(Boolean).join(' · ');
    if (det) lines.push(`   ${det}`);
    if (c.clientPhone) lines.push(`   Tél client : ${c.clientPhone}`);
    if (c.constraints) lines.push(`   ⚠ ${c.constraints}`);
  });
  return lines.join('\n');
}

/* Ouvre l'app SMS avec le message pré-rempli (numéro optionnel). */
function sendSMS(phone, message) {
  const num = (phone || '').replace(/[^\d+]/g, '');
  // séparateur de corps : '?body=' fonctionne sur iOS et Android récents
  const url = `sms:${num}${num ? '' : ''}?body=${encodeURIComponent(message)}`;
  window.open(url, '_blank');
}

/* Ouvre l'app mail avec destinataire, objet et corps pré-remplis. */
function sendEmail(email, subject, body) {
  const url = `mailto:${encodeURIComponent(email || '')}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.open(url, '_blank');
}

/* Texte d'une feuille de route HEBDO pour un binôme. byDay = [{ iso, list }]. */
function routeWeekText({ bin, byDay, weekLabel }) {
  const lines = [];
  lines.push(`JM Bâches — Feuille de route semaine`);
  lines.push(`${bin?.name || ''} · ${weekLabel}`);
  byDay.forEach(({ iso, list }) => {
    lines.push('');
    lines.push(`— ${fmtDateLong(iso)} —`);
    if (!list.length) { lines.push('  (rien)'); return; }
    list.forEach((c, i) => {
      lines.push(`${i + 1}. ${c.clientName || 'Client'}${c.estimatedDuration ? ` (${c.estimatedDuration}h)` : ''}`);
      const adr = [c.address, [c.postalCode, c.city].filter(Boolean).join(' ')].filter(Boolean).join(', ');
      if (adr) lines.push(`   ${adr}`);
      if (c.type) lines.push(`   ${c.type}`);
      if (c.clientPhone) lines.push(`   Tél client : ${c.clientPhone}`);
      if (c.constraints) lines.push(`   ⚠ ${c.constraints}`);
    });
  });
  return lines.join('\n');
}



/* Insère la pause déjeuner : décale la suite, et scinde une pose en cours si besoin */
function injectLunch(events, lunchStart, lunchDur) {
  if (!events.length || !lunchDur) return events;
  const dayEnd = events[events.length - 1].end;
  if (lunchStart >= dayEnd) return events;
  const out = []; let inserted = false;
  for (const ev of events) {
    if (inserted) { out.push({ ...ev, start: ev.start + lunchDur, end: ev.end + lunchDur }); continue; }
    if (ev.end <= lunchStart) { out.push(ev); continue; }
    if (ev.start >= lunchStart) {
      out.push({ type: 'lunch', start: lunchStart, end: lunchStart + lunchDur, label: 'Pause déjeuner' });
      out.push({ ...ev, start: ev.start + lunchDur, end: ev.end + lunchDur });
      inserted = true; continue;
    }
    out.push({ ...ev, end: lunchStart });
    out.push({ type: 'lunch', start: lunchStart, end: lunchStart + lunchDur, label: 'Pause déjeuner' });
    out.push({ ...ev, start: lunchStart + lunchDur, end: ev.end + lunchDur, contd: true });
    inserted = true;
  }
  return out;
}

/* Emploi du temps minuté d'une journée pour un binôme.
   Réutilise géocodage + routage ; repli sur 20 min/trajet si indisponible. */
/* Planifie une SEMAINE pour un binôme : une tournée optimisée découpée en
   journées plafonnées 8h–18h. Poses du LUNDI au JEUDI (4 jours) ; le VENDREDI
   est réservé au retour au dépôt (aucune pose). Les trajets d'approche
   (dépôt→1er site, et liaisons entre deux jours) se font la veille au soir si
   ça tient avant 18h, sinon le lendemain matin (nuit sur place). Un chantier
   qui ne tient pas en 4 jours part en « à reporter ».
   pool : chantiers du binôme à caser. days : 6 dates Lun→Sam. */
async function planWeek(poolInput, depot, workday, days, poseDaysISO) {
  // Jours réellement posables de la semaine (Lun→Jeu, après indisponibilités) — calculé tôt pour
  // pouvoir écarter les chantiers dont la fenêtre client (notBefore/notAfter) ne croise pas la semaine.
  const POSE_DAYS_EARLY = 4;
  const poseListEarly = (Array.isArray(poseDaysISO) && poseDaysISO.length >= 0)
    ? poseDaysISO.slice(0, POSE_DAYS_EARLY)
    : days.slice(0, POSE_DAYS_EARLY).map(d => toISO(d));
  // Chantiers dont AUCUN jour posable de la semaine ne convient → reportés (fenêtre hors semaine).
  const outOfWindow = poolInput.filter(c => windowMissesWeek(c, poseListEarly));
  const pool = poolInput.filter(c => !windowMissesWeek(c, poseListEarly));

  const dayStart = parseHHMM(workday?.start, 480);
  const DAY_END = 18 * 60;                  // fin de journée tolérée : 18h00 (on remplit jusque-là)
  const TARGET_END = 17 * 60;               // fin idéale des poses : 17h00 (sans bloquer le remplissage)
  const TOLERATE_END = 18 * 60;             // on remplit chaque journée jusqu'à 18h00
  const lunchStart = parseHHMM(workday?.lunchStart, 720);
  const lunchDur = workday?.lunchDuration ?? 60;
  // budgets de pose (déjeuner réservé) : on vise à remplir jusqu'à 18h
  const contentTargetSec = ((TARGET_END - dayStart) - lunchDur) * 60;
  const contentMaxSec    = ((TOLERATE_END - dayStart) - lunchDur) * 60;
  const hasDepot = !!(depot && (depot.address || depot.city || depot.postalCode));
  const DEFAULT_LEG = 20 * 60;

  let matrix = null, source = 'osrm';
  let order = pool.map((_, i) => i);
  let geoByIdx = {};   // index chantier → {lat, lon} (pour la carte)
  let depotGeo = null; // {lat, lon} du dépôt
  try {
    if (!pool.length) throw new Error('vide');
    const pts = [];
    for (let ci = 0; ci < pool.length; ci++) { const c = pool[ci]; const p = await geocodeFr(c.address, c.postalCode, c.city); if (!p) throw new Error('geo'); pts.push(p); geoByIdx[ci] = { lat: p.lat, lon: p.lon }; }
    let points = pts;
    if (hasDepot) { const dp = await geocodeFr(depot.address, depot.postalCode, depot.city); if (!dp) throw new Error('depot'); depotGeo = { lat: dp.lat, lon: dp.lon }; points = [dp, ...pts]; }
    const dm = await durationMatrix(points); matrix = dm.matrix; source = dm.source;
    const opt = optimizeOrder(matrix, { start: 0, returnToStart: false });
    order = opt.order.filter(i => !(hasDepot && i === 0)).map(i => hasDepot ? i - 1 : i);
  } catch (e) {
    source = 'défaut'; matrix = null;
    order = pool.map((_, i) => i).sort((a, b) => (pool[a].postalCode || '').localeCompare(pool[b].postalCode || ''));
  }

  // Accès robustes à la matrice de durées : si une ligne/case est absente ou non numérique
  // (réponse OSRM partielle sur un gros lot), on retombe sur la durée par défaut au lieu de planter.
  const cell = (i, j) => {
    if (!matrix) return null;
    const row = matrix[i];
    if (!row) return null;
    const v = row[j];
    return (typeof v === 'number' && isFinite(v)) ? v : null;
  };
  const legBetween = (a, b) => { const v = cell(hasDepot ? a + 1 : a, hasDepot ? b + 1 : b); return v == null ? DEFAULT_LEG : v; };
  const legFromDepot = (a) => { if (!hasDepot) return 0; const v = cell(0, a + 1); return v == null ? DEFAULT_LEG : v; };
  const legToDepot = (a) => { if (!hasDepot) return 0; const v = cell(a + 1, 0); return v == null ? DEFAULT_LEG : v; };

  // ---- DÉCOUPAGE EN JOURNÉES PLEINES ----
  // Objectif : remplir chaque jour au maximum SANS finir trop tard. On raisonne en HEURE DE FIN réelle
  // (déjeuner inclus), pas en volume abstrait : on n'ajoute un chantier que si la journée finit ≤ 17h30.
  // Conséquence : un volet immergé de 6h se retrouve seul sur sa journée (ajouter une pose dépasserait),
  // et aucun mélange ne peut finir à 20h.
  const poseSecOf = (idx) => (pool[idx].estimatedDuration || 0) * 3600;

  // Heure de fin (en minutes depuis minuit) d'une journée composée de `stops`, en partant du dépôt
  // le matin, avec trajets internes et pause déjeuner réservée si elle tombe dans la journée.
  const dayEndMinFor = (stops) => {
    let t = dayStart;
    t += (legFromDepot(stops[0]) || 0) / 60;          // trajet dépôt → 1er chantier
    for (let k = 0; k < stops.length; k++) {
      if (k > 0) t += (legBetween(stops[k - 1], stops[k]) || 0) / 60; // trajet entre chantiers
      t += poseSecOf(stops[k]) / 60;                   // pose
    }
    // déjeuner : s'il commence avant la fin de journée, il décale la fin d'autant
    if (lunchStart < t && lunchDur) t += lunchDur;
    return t;
  };

  // Remplit jour par jour. On ajoute un chantier au jour courant tant que la journée ne DÉMARRE pas
  // ce chantier après 18h : même s'il finit après 18h, on le commence aujourd'hui et le builder
  // coupera la pose (le reste reprend demain matin). On ne laisse donc plus d'après-midi vides.
  const dayStartTimeFor = (stops, lastIdx) => {
    // heure de DÉBUT du dernier chantier ajouté (approche + poses précédentes + trajets + déjeuner traversé)
    let t = dayStart + (legFromDepot(stops[0]) || 0) / 60;
    for (let k = 0; k < stops.length; k++) {
      if (k > 0) t += (legBetween(stops[k - 1], stops[k]) || 0) / 60;
      if (k === stops.length - 1) return t; // début du dernier
      const b = t; t += poseSecOf(stops[k]) / 60; if (b < lunchStart && t > lunchStart) t += lunchDur;
    }
    return t;
  };
  const buildChunks = (endLimitMin) => {
    const ch = []; let cur = null;
    for (const idx of order) {
      if (cur) {
        const trial = [...cur.stops, idx];
        // on accepte d'AJOUTER idx si sa pose peut COMMENCER avant 18h (laisser au moins 30 min de pose)
        const startOfIdx = dayStartTimeFor(trial, idx);
        if (startOfIdx + 30 <= endLimitMin) {
          cur.legs.push(legBetween(cur.stops[cur.stops.length - 1], idx));
          cur.stops.push(idx);
          cur.content += (cur.legs[cur.legs.length - 1] || 0) + poseSecOf(idx);
          continue;
        }
      }
      // sinon : nouveau jour, on part du dépôt
      const approach = legFromDepot(idx);
      const aloneEnd = dayEndMinFor([idx]);
      cur = { stops: [idx], legs: [approach], content: poseSecOf(idx) + approach, oversized: aloneEnd > DAY_END + 1, _carryIn: null };
      ch.push(cur);
    }
    return ch;
  };

  // On remplit en visant une fin à 18h max → journées pleines.
  let chunks = buildChunks(TOLERATE_END);
  // Règle JM Bâches : poses du lundi au jeudi (4 jours max), un jour réservé au retour dépôt.
  // poseDaysISO (si fourni) = liste des dates RÉELLEMENT posables (après retrait des indisponibilités).
  const POSE_DAYS = 4;
  // Liste des dates posables : soit fournie (filtrée des absences), soit les 4 premiers jours.
  const poseList = (Array.isArray(poseDaysISO) && poseDaysISO.length >= 0)
    ? poseDaysISO.slice(0, POSE_DAYS)
    : days.slice(0, POSE_DAYS).map(d => toISO(d));
  // Jour de retour dépôt = 1er jour de la semaine après le dernier jour posable (sinon dernier dispo).
  const lastPoseISO = poseList.length ? poseList[poseList.length - 1] : (days[0] ? toISO(days[0]) : null);
  const returnDayISO = (() => {
    if (!lastPoseISO) return days[4] ? toISO(days[4]) : null;
    const allISO = days.map(d => toISO(d));
    const idx = allISO.indexOf(lastPoseISO);
    return (idx >= 0 && idx + 1 < allISO.length) ? allISO[idx + 1] : null;
  })();

  // Les chunks au-delà des jours posables ne tiennent pas dans la semaine → à reporter.
  const usablePoseDays = poseList.length;

  // PRÉ-PLACEMENT DES CHANTIERS À HEURE FIXE : on s'assure que chaque chantier d'urgence (fixedTime)
  // se trouve bien dans le chunk du JOUR de sa date fixée. On le retire de là où le découpage l'a mis,
  // et on l'insère dans le chunk correspondant à poseList[index] = sa date. Ainsi l'ancrage horaire
  // (plus bas) trouvera bien la pose le bon jour.
  {
    // index de jour cible pour une date donnée
    const dayIndexOf = (iso) => poseList.indexOf(iso);
    // retire les fixés de tous les chunks
    const fixedEntries = []; // { idx, legFromChunk }
    chunks.forEach(ch => {
      const keepS = [], keepL = [];
      for (let k = 0; k < ch.stops.length; k++) {
        const c = pool[ch.stops[k]];
        if (c.fixedTime && c.scheduledDate && dayIndexOf(c.scheduledDate) >= 0) {
          fixedEntries.push({ idx: ch.stops[k] });
        } else { keepS.push(ch.stops[k]); keepL.push(ch.legs[k]); }
      }
      ch.stops = keepS; ch.legs = keepL;
    });
    // (ré)insère chaque fixé dans le chunk de sa date (en créant les chunks manquants)
    fixedEntries.forEach(({ idx }) => {
      const di = dayIndexOf(pool[idx].scheduledDate);
      while (chunks.length <= di) chunks.push({ stops: [], legs: [], _carryIn: null });
      const ch = chunks[di];
      // on le met en tête de journée (l'ancrage le repositionnera à l'heure exacte ensuite)
      ch.stops.unshift(idx);
      ch.legs.unshift(legFromDepot(idx));
    });
    // NB : on ne purge PAS les chunks vides — leur index doit rester aligné sur poseList (les jours).
  }

  const scheduledDaysCount = Math.min(chunks.length, usablePoseDays);

  // affectation aux jours de la semaine + construction des horaires
  const dayPlans = {}; const assignments = []; const overflow = [];
  // morningTravel[di] : trajet à poser le MATIN du jour di.
  //  - { sec, returnDepot:false, fromDepot:false } : liaison "nuit sur place" reportée (déborde 18h la veille)
  //  - { sec, fromDepot:true } : ré-approche depuis le SIÈGE le matin (la veille on est rentré au siège)
  const morningTravel = {};
  const SIEGE_SEUIL_SEC = 2 * 3600;   // retour < 2h du siège → on rentre le soir
  const SOIR_TOLERANCE = 30;          // dépassement toléré le soir : 18h30 max

  for (let di = 0; di < chunks.length; di++) {
    const chunk = chunks[di];
    if (!chunk.stops || chunk.stops.length === 0) continue; // jour sans pose (peut arriver avec un créneau fixe placé un autre jour)
    if (di >= usablePoseDays) { chunk.stops.forEach(s => overflow.push(pool[s])); continue; }
    const iso = poseList[di];

    // Respect IMPÉRATIF de la fenêtre client : tout chantier de ce chunk dont la fenêtre n'autorise
    // pas le jour 'iso' est retiré et reporté (jamais posé hors de sa fenêtre).
    {
      const keptStops = [], keptLegs = [];
      for (let k = 0; k < chunk.stops.length; k++) {
        const ch = pool[chunk.stops[k]];
        if (dateAllowed(ch, iso)) { keptStops.push(chunk.stops[k]); keptLegs.push(chunk.legs[k]); }
        else overflow.push(ch);
      }
      if (keptStops.length === 0) continue; // plus rien à poser ce jour-là
      chunk.stops = keptStops; chunk.legs = keptLegs;
    }

    // REMPLISSAGE jusqu'à 18h avec DÉCOUPAGE de pose. On garde tous les chantiers du jour ;
    // si la dernière pose franchit 18h, on en fait la part qui rentre aujourd'hui et le RESTE
    // reprend demain matin (pose « (suite) »). carryIn = reste d'une pose de la veille à finir ce matin.
    const carryIn = chunks[di]._carryIn || null;   // { chantierIdx, remainingMin }
    // (le découpage effectif est géré dans buildDay ci-dessous)

    // Construit les events de la journée à partir des stops courants du chunk.
    let carryOut = null; // { chantierIdx, remainingMin } à reprendre demain matin
    const buildDay = () => {
      carryOut = null;
      let events = []; let t = dayStart;
      const approachSec = di === 0 ? (chunk.legs[0] || 0) : (morningTravel[di]?.sec || 0);
      const approachFromDepot = di === 0 || !!(morningTravel[di]?.fromDepot);
      if (approachSec > 0) {
        const aMin = approachSec / 60;
        events.push({ type: 'travelApproach', start: dayStart, end: dayStart + aMin, fromDepot: approachFromDepot });
        t = dayStart + aMin;
      }
      const localAssign = [];
      // a) reprise éventuelle d'une pose entamée la veille (commence dès le matin, après l'approche)
      if (carryIn) {
        const ch = pool[carryIn.chantierIdx];
        events.push({ type: 'pose', start: t, end: t + carryIn.remainingMin, chantier: ch, contd: true });
        t += carryIn.remainingMin;
      }
      // b) chantiers du jour : on place tout, PUIS on tronque à 18h après insertion du déjeuner.
      //    La 1re pose qui dépasse 18h est coupée à 18h (reste demain) ; les suivantes partent demain.
      for (let k = 0; k < chunk.stops.length; k++) {
        if (k > 0) { const legMin = (chunk.legs[k] || 0) / 60; if (legMin > 0) { events.push({ type: 'travel', start: t, end: t + legMin, _k: k }); t += legMin; } }
        const ch = pool[chunk.stops[k]];
        const durMin = (ch.estimatedDuration || 0) * 60;
        events.push({ type: 'pose', start: t, end: t + durMin, chantier: ch, _k: k, _idx: chunk.stops[k] });
        t += durMin;
        localAssign.push({ id: ch.id, iso, order: k, geo: geoByIdx[chunk.stops[k]] || null });
      }
      // insertion du déjeuner (décale ce qui suit) — l'heure de fin réelle est alors connue
      events = injectLunch(events, lunchStart, lunchDur);

      // TRONCATURE STRICTE À 18h : on parcourt dans l'ordre ; dès qu'un évènement dépasse 18h, on coupe.
      const capped = []; const deferredK = new Set(); let cutDoneForK = null;
      for (const ev of events) {
        if (ev.start >= DAY_END) {                      // commence après 18h → entièrement reporté
          if (ev.type === 'pose') deferredK.add(ev._k);
          continue;
        }
        if (ev.end > DAY_END) {                          // chevauche 18h
          if (ev.type === 'pose') {
            const doneMin = DAY_END - ev.start;          // temps réellement posé aujourd'hui (peut inclure le déjeuner)
            // durée réelle de pose (hors déjeuner) de ce chantier
            const fullPoseMin = (pool[ev._idx]?.estimatedDuration || 0) * 60;
            // part de pose effectivement réalisée aujourd'hui (on retire le déjeuner s'il tombe dedans)
            const lunchInside = (ev.start < lunchStart && DAY_END > lunchStart) ? Math.min(lunchDur, DAY_END - lunchStart) : 0;
            const posedToday = doneMin - lunchInside;
            // on ne commence la dernière pose que si on en fait AU MOINS 50 % aujourd'hui
            if (fullPoseMin > 0 && posedToday >= fullPoseMin * 0.5) {
              capped.push({ ...ev, end: DAY_END, partial: true });
              carryOut = { chantierIdx: ev._idx, remainingMin: fullPoseMin - posedToday };
              cutDoneForK = ev._k;
            } else {
              deferredK.add(ev._k);                      // moins de 50 % faisable → report entier au lendemain
            }
          }
          // un trajet qui dépasse 18h : on le laisse (retour), mais il ne devrait pas porter de pose
          else { capped.push(ev); }
          continue;
        }
        capped.push(ev);
      }
      events = capped;

      // retirer du jour les poses reportées / coupées et préparer le lendemain
      const movedStops = []; const keptStops = []; const keptLegs = [];
      for (let k = 0; k < chunk.stops.length; k++) {
        const isDeferred = deferredK.has(k);
        const isCutAway = false; // la pose coupée reste "du jour" (sa part faite), le reste passe via carryOut
        if (isDeferred && k !== cutDoneForK) { movedStops.push(chunk.stops[k]); }
        else { keptStops.push(chunk.stops[k]); keptLegs.push(chunk.legs[k]); }
      }
      // nettoyer localAssign des chantiers entièrement reportés
      for (const k of deferredK) { if (k !== cutDoneForK) { const id = pool[chunk.stops[k]].id; const ix = localAssign.findIndex(a => a.id === id); if (ix >= 0) localAssign.splice(ix, 1); } }
      chunk.stops = keptStops; chunk.legs = keptLegs;
      if (movedStops.length) {
        const ni = di + 1;
        if (ni < usablePoseDays) {
          chunks[ni] = chunks[ni] || { stops: [], legs: [], _carryIn: null };
          const movedLegs = movedStops.map((s, i) => i === 0 ? legFromDepot(s) : legBetween(movedStops[i - 1], s));
          chunks[ni].stops = [...movedStops, ...chunks[ni].stops];
          chunks[ni].legs = [...movedLegs, ...chunks[ni].legs];
        } else {
          movedStops.forEach(s => overflow.push(pool[s]));
        }
      }

      const endMin = events.length ? events[events.length - 1].end : dayStart;
      return { events, endMin, localAssign };
    };

    const isLastPoseDayRef = { v: di >= scheduledDaysCount - 1 };
    let { events, endMin, localAssign } = buildDay();
    const isLastPoseDay = isLastPoseDayRef.v;

    // ANCRAGE HORAIRE : si un chantier de ce jour a une heure fixe demandée (fixedTime), on cale sa
    // pose à cette heure et on réagence les autres poses autour. On CONSERVE les temps de trajet entre
    // chantiers et la pause déjeuner. Si l'heure demandée n'est pas atteignable (trajets + poses avant
    // + déjeuner la dépassent), on cale l'ancre au plus tôt possible et on le signale (anchorLate).
    const fixedHere = events.find(ev => ev.type === 'pose' && ev.chantier && ev.chantier.fixedTime && ev.chantier.scheduledDate === iso);
    if (fixedHere) {
      const want = parseHHMM(fixedHere.chantier.fixedTime, fixedHere.start);
      // Récupère les poses dans l'ordre, avec le trajet qui précède chacune (0 pour la 1re du jour).
      // injectLunch a pu couper une pose en deux (contd) : on refusionne par durée réelle du chantier.
      const poseSeq = [];
      let pendingTravel = 0;
      for (const ev of events) {
        if (ev.type === 'travel') { pendingTravel += (ev.end - ev.start); continue; }
        if (ev.type === 'pose') {
          const prev = poseSeq[poseSeq.length - 1];
          if (ev.contd && prev && prev.ev.chantier === ev.chantier) {
            // suite d'une pose coupée par le déjeuner → on rallonge la durée logique, sans double trajet
            prev.realDur += (ev.end - ev.start);
          } else {
            poseSeq.push({ ev, lead: pendingTravel, realDur: ev.end - ev.start });
          }
          pendingTravel = 0;
        }
      }
      const dur = (ev) => ev.end - ev.start;
      const others = poseSeq.filter(p => p.ev !== fixedHere);
      const anchorObj = poseSeq.find(p => p.ev === fixedHere);

      // Avance le temps en intégrant un trajet (lead) puis une pose, en insérant le déjeuner si on
      // franchit l'heure de pause. Renvoie le nouvel instant.
      const advance = (t, lead, d, out, evRef, extra) => {
        if (lead > 0) { out.push({ type: 'travel', start: t, end: t + lead }); t += lead; }
        if (lunchDur && t < lunchStart && t + d > lunchStart) { out.push({ type: 'lunch', start: lunchStart, end: lunchStart + lunchDur }); t = lunchStart + lunchDur; }
        else if (lunchDur && t >= lunchStart && t < lunchStart + lunchDur) { out.push({ type: 'lunch', start: lunchStart, end: lunchStart + lunchDur }); t = lunchStart + lunchDur; }
        out.push({ ...evRef, start: t, end: t + d, ...(extra || {}) });
        return t + d;
      };

      // 1) On place les "autres" poses qui tiennent ENTIÈREMENT avant l'ancre (trajet + pose + déjeuner
      //    éventuel), en simulant le temps réel. Le reste ira après l'ancre.
      const before = [], after = [];
      let sim = dayStart;
      for (const p of others) {
        let s = sim;
        if (p.lead > 0) s += p.lead;
        if (lunchDur && s < lunchStart && s + p.realDur > lunchStart) s += lunchDur; // déjeuner traversé
        const endIfHere = s + p.realDur;
        // il faut aussi pouvoir rejoindre l'ancre après cette pose (trajet de l'ancre)
        if (endIfHere + (anchorObj.lead || 0) <= want) { before.push(p); sim = endIfHere; }
        else after.push(p);
      }

      // 2) Reconstruction réelle de la journée
      const out = [];
      let t = dayStart;
      for (const p of before) t = advance(t, p.lead, p.realDur, out, p.ev);
      // trajet pour rejoindre l'ancre depuis la dernière pose "avant"
      if (anchorObj.lead > 0) { out.push({ type: 'travel', start: t, end: t + anchorObj.lead }); t += anchorObj.lead; }
      // déjeuner si l'arrivée à l'ancre l'enjambe
      if (lunchDur && t < lunchStart && Math.max(t, want) > lunchStart && t <= lunchStart) {
        // si on a du temps avant l'heure voulue et que midi tombe là, on déjeune
        if (want > lunchStart) { out.push({ type: 'lunch', start: lunchStart, end: lunchStart + lunchDur }); t = Math.max(t, lunchStart + lunchDur); }
      }
      // l'ancre : à l'heure voulue si atteignable, sinon au plus tôt (et on signale le retard)
      const anchorStart = Math.max(t, want, dayStart);
      const anchorLate = anchorStart > want + 1; // plus d'1 min de retard sur l'heure demandée
      t = anchorStart;
      out.push({ ...fixedHere, start: t, end: t + anchorObj.realDur, fixed: true, anchorLate });
      t += anchorObj.realDur;
      // poses APRÈS l'ancre : on ne les pose que si elles finissent avant 18h ; sinon elles sont
      // reportées (on ne crée pas de pose qui finit à 19h-20h).
      for (const p of after) {
        const lead = p.lead > 0 ? p.lead : 0;
        let s = t + lead;
        if (lunchDur && s < lunchStart && s + p.realDur > lunchStart) s += lunchDur;
        const e = s + p.realDur;
        if (e > DAY_END) {
          // ne tient pas après l'ancre aujourd'hui → reporté
          const id = p.ev.chantier && p.ev.chantier.id;
          const ix = localAssign.findIndex(a => a.id === id);
          if (ix >= 0) localAssign.splice(ix, 1);
          if (p.ev._idx != null) overflow.push(pool[p.ev._idx]);
          continue;
        }
        t = advance(t, lead, p.realDur, out, p.ev);
      }
      events = out;
      endMin = events.length ? events[events.length - 1].end : dayStart;
    }
    // si une pose a été coupée, on transmet le reste au lendemain (en tête de journée)
    if (carryOut) {
      const ni = di + 1;
      if (ni < usablePoseDays) {
        chunks[ni] = chunks[ni] || { stops: [], legs: [] };
        chunks[ni]._carryIn = carryOut;
        if (!chunks[ni].stops.length) { chunks[ni].stops = []; chunks[ni].legs = []; }
        morningTravel[ni] = morningTravel[ni] || { sec: 0, fromDepot: false }; // la reprise démarre sur place, pas de trajet
      } else {
        overflow.push(pool[carryOut.chantierIdx]); // pas de jour suivant dispo → reste à reporter
      }
    }

    // ---- Décision de fin de journée ----
    let eveningSec = 0, eveningReturn = false;
    if (!isLastPoseDay && !carryOut) {
      const lastStop = chunk.stops[chunk.stops.length - 1];
      const returnSiege = legToDepot(lastStop); // dernier chantier → siège
      // Si on est à moins de 2h du siège ET qu'on a le temps de rentrer avant 18h30, on rentre le soir.
      const proche = hasDepot && returnSiege > 0 && returnSiege < SIEGE_SEUIL_SEC;
      let rentre = proche && (endMin + returnSiege / 60 <= DAY_END + SOIR_TOLERANCE);

      if (rentre) {
        const rs = legToDepot(chunk.stops[chunk.stops.length - 1]);
        events.push({ type: 'travelEvening', start: endMin, end: endMin + rs / 60, returnDepot: true });
        eveningSec = rs; eveningReturn = true;
        // le lendemain repart du SIÈGE
        if (chunks[di + 1]) morningTravel[di + 1] = { sec: (chunks[di + 1].legs[0] || 0), fromDepot: true };
      } else if (chunks[di + 1] && chunks[di + 1].stops && chunks[di + 1].stops.length) {
        // NUIT SUR PLACE : on dort près du dernier chantier. Le trajet vers le 1er chantier du
        // lendemain est le COURT saut site→site (legBetween), PAS le trajet depuis le siège.
        const lastStopToday = chunk.stops[chunk.stops.length - 1];
        const firstStopNext = chunks[di + 1].stops[0];
        const linkSec = legBetween(lastStopToday, firstStopNext);
        // on corrige aussi le leg d'entrée du chunk suivant pour la cohérence des calculs aval
        chunks[di + 1].legs[0] = linkSec;
        if (linkSec > 0) {
          if (endMin + linkSec / 60 <= DAY_END) {
            // le petit trajet se fait le soir même → demain matin = AUCUN trajet (on est sur place)
            events.push({ type: 'travelEvening', start: endMin, end: endMin + linkSec / 60, returnDepot: false });
            eveningSec = linkSec;
            morningTravel[di + 1] = { sec: 0, fromDepot: false };
          } else {
            // sinon le court saut se fait demain matin (toujours site→site, pas depuis le siège)
            morningTravel[di + 1] = { sec: linkSec, fromDepot: false };
          }
        } else {
          morningTravel[di + 1] = { sec: 0, fromDepot: false };
        }
      }
    }

    localAssign.forEach(a => assignments.push(a));
    const totalDriveSec = chunk.legs.slice(1).reduce((s, x) => s + (x || 0), 0);
    // Avec le découpage à 18h, une pose ne dépasse 18h que si elle est seule et trop longue ce jour-là.
    const oversized = !!chunk.oversized || endMin > DAY_END + 1;
    // Info retour siège (affichée partout) : durée dernier chantier → siège, et si on rentre ou dort sur place.
    const lastStopId = chunk.stops[chunk.stops.length - 1];
    const siegeReturnSec = (hasDepot && lastStopId != null) ? legToDepot(lastStopId) : 0;
    const staysOnSite = !isLastPoseDay && !eveningReturn; // dernier jour de pose → vendredi gère le retour
    dayPlans[iso] = { events, totalDriveSec, approachSec: (di === 0 ? (chunk.legs[0] || 0) : (morningTravel[di]?.sec || 0)), eveningSec, eveningReturn, endMin, source, oversized, siegeReturnSec, staysOnSite, isLastPoseDay };
  }

  // Retour au dépôt : posé le lendemain du dernier jour de pose (à partir de 8h00).
  if (hasDepot && scheduledDaysCount > 0 && returnDayISO) {
    const lastChunk = chunks[scheduledDaysCount - 1];
    const returnSec = legToDepot(lastChunk.stops[lastChunk.stops.length - 1]);
    if (returnSec > 0) {
      const iso = returnDayISO;
      dayPlans[iso] = {
        events: [{ type: 'travelApproach', start: dayStart, end: dayStart + returnSec / 60, fromDepot: false, returnDepot: true }],
        totalDriveSec: 0, approachSec: returnSec, eveningSec: 0, eveningReturn: true,
        endMin: dayStart + returnSec / 60, source, oversized: false, returnOnly: true,
      };
    }
  }

  // Chantiers écartés car leur fenêtre client ne tombe pas dans cette semaine → à reporter, motif marqué.
  outOfWindow.forEach(c => overflow.push(c));

  return { dayPlans, assignments, overflow, source, count: pool.length, depotGeo, outOfWindow };
}

/* =========================================================================
   AFFECTATION AUTO PAR ZONE — k-means géographique (1 cluster par binôme)
   ========================================================================= */
const dist2 = (a, b) => { const d = haversineKm(a, b); return d * d; };

function kmeansppInit(points, k) {
  const centroids = [points[Math.floor(Math.random() * points.length)]];
  while (centroids.length < k) {
    const d2 = points.map(p => Math.min(...centroids.map(c => dist2(p, c))));
    const sum = d2.reduce((a, b) => a + b, 0) || 1;
    let r = Math.random() * sum, idx = 0;
    for (; idx < points.length - 1; idx++) { r -= d2[idx]; if (r <= 0) break; }
    centroids.push(points[idx]);
  }
  return centroids.map(c => ({ lat: c.lat, lon: c.lon }));
}

function kmeans(points, k, iters = 40, restarts = 6) {
  if (points.length <= k) return points.map((_, i) => i);
  let best = null, bestCost = Infinity;
  for (let r = 0; r < restarts; r++) {
    let centroids = kmeansppInit(points, k);
    let assign = new Array(points.length).fill(0);
    for (let it = 0; it < iters; it++) {
      let changed = false;
      for (let i = 0; i < points.length; i++) {
        let bi = 0, bd = Infinity;
        for (let c = 0; c < k; c++) { const d = dist2(points[i], centroids[c]); if (d < bd) { bd = d; bi = c; } }
        if (assign[i] !== bi) { assign[i] = bi; changed = true; }
      }
      const sum = Array.from({ length: k }, () => ({ lat: 0, lon: 0, n: 0 }));
      points.forEach((p, i) => { const c = assign[i]; sum[c].lat += p.lat; sum[c].lon += p.lon; sum[c].n++; });
      centroids = sum.map((s, c) => s.n ? { lat: s.lat / s.n, lon: s.lon / s.n } : centroids[c]);
      if (!changed && it > 0) break;
    }
    const cost = points.reduce((acc, p, i) => acc + dist2(p, centroids[assign[i]]), 0);
    if (cost < bestCost) { bestCost = cost; best = assign.slice(); }
  }
  return best;
}

/* Géocode tous les chantiers, les répartit par zone entre les binômes,
   puis planifie la semaine de chaque zone. */
async function autoAssignAndPlan(allChantiers, binomes, depot, workday, days, unavail, lockedDaysByBin) {
  const valid = [], pts = [];
  for (const c of allChantiers) {
    let p = null;
    try { p = await geocodeFr(c.address, c.postalCode, c.city); } catch (e) {}
    if (p) { valid.push(c); pts.push(p); }
  }
  const k = binomes.length;

  // Géocode le siège pour mesurer l'éloignement de chaque chantier.
  let depotPt = null;
  if (depot && (depot.address || depot.city || depot.postalCode)) {
    try { depotPt = await geocodeFr(depot.address, depot.postalCode, depot.city); } catch (e) {}
  }
  const FAR_KM = 250;       // au-delà de 250 km du siège = chantier "lointain"
  const CLUSTER_KM = 80;    // deux chantiers lointains à < 80 km = même zone lointaine

  // assign[i] = index du binôme pour le chantier valid[i]
  const assign = new Array(valid.length).fill(0);
  const loadByBin = new Array(k).fill(0); // charge (heures) attribuée à chaque binôme

  // CHANTIERS À HEURE FIXE (urgences placées à la main) : on RESPECTE le binôme choisi et on ne les
  // réaffecte pas. On note leur index pour les exclure de la répartition géographique automatique.
  const fixedForced = new Set();
  valid.forEach((c, i) => {
    if (c.fixedTime && c.scheduledBinome) {
      const bi = binomes.findIndex(b => b.id === c.scheduledBinome);
      if (bi >= 0) { assign[i] = bi; loadByBin[bi] += (c.estimatedDuration || 0); fixedForced.add(i); }
    }
  });

  // budget de pose d'une semaine pour un binôme : 4 jours (Lun→Jeu) × heures utiles/jour.
  // heures utiles ≈ (18h - heure de début - déjeuner). Par défaut 8h00→18h moins 1h déjeuner = 9h,
  // mais on retient 8h de pose effective/jour pour garder une marge trajets.
  const POSE_HOURS_PER_DAY = 8;
  const WEEK_POSE_BUDGET = 4 * POSE_HOURS_PER_DAY; // ~32 h de pose posables/semaine

  // 1) Séparer chantiers PROCHES et LOINTAINS (par rapport au siège). On EXCLUT les fixés (déjà affectés).
  const proche = [], lointain = [];
  valid.forEach((c, i) => {
    if (fixedForced.has(i)) return; // urgence à heure fixe : binôme déjà imposé
    const far = depotPt ? haversineKm(pts[i], depotPt) > FAR_KM : false;
    (far ? lointain : proche).push(i);
  });

  // 2) LOINTAINS D'ABORD (priorité). On regroupe par zone (Paris = une zone), et chaque zone ENTIÈRE
  //    va à UN seul binôme — jamais deux équipes sur la même zone lointaine. On choisit le binôme le
  //    moins chargé. Objectif : réserver la semaine de ce binôme à son déplacement lointain.
  const farLoadByBin = new Array(k).fill(0); // part de charge lointaine par binôme
  if (lointain.length) {
    const zoneOf = {}; let nz = 0;
    lointain.forEach(i => { if (zoneOf[i] === undefined) {
      const stack = [i]; zoneOf[i] = nz;
      while (stack.length) { const a = stack.pop();
        lointain.forEach(j => { if (zoneOf[j] === undefined && haversineKm(pts[a], pts[j]) < CLUSTER_KM) { zoneOf[j] = nz; stack.push(j); } });
      }
      nz++;
    }});
    const zones = Array.from({ length: nz }, () => []);
    lointain.forEach(i => zones[zoneOf[i]].push(i));
    // zones les plus grosses d'abord (pour bien réserver une semaine entière au plus gros déplacement)
    zones.sort((A, B) => B.reduce((s, i) => s + (valid[i].estimatedDuration || 0), 0) - A.reduce((s, i) => s + (valid[i].estimatedDuration || 0), 0));
    zones.forEach(zone => {
      let best = 0; for (let b = 1; b < k; b++) if (loadByBin[b] < loadByBin[best]) best = b;
      zone.forEach(i => { assign[i] = best; const h = (valid[i].estimatedDuration || 0); loadByBin[best] += h; farLoadByBin[best] += h; });
    });
  }

  // 3) PROCHES : équilibrage de charge, MAIS en réservant la place du déplacement lointain.
  //    Capacité locale restante d'un binôme = budget semaine − heures de son déplacement lointain.
  //    On remplit en priorité les binômes qui ont le plus de capacité locale libre → le binôme parti
  //    loin (ex : Paris) reçoit peu (ou pas) de local, pour que tout son Paris tienne dans la semaine.
  const localCapacityLeft = (b) => (WEEK_POSE_BUDGET - farLoadByBin[b]) - (loadByBin[b] - farLoadByBin[b]);
  proche.sort((a, b) => (valid[b].estimatedDuration || 0) - (valid[a].estimatedDuration || 0));
  proche.forEach(i => {
    // binôme avec le PLUS de capacité locale restante (les binômes "lointains" en ont le moins)
    let best = 0; for (let b = 1; b < k; b++) if (localCapacityLeft(b) > localCapacityLeft(best)) best = b;
    assign[i] = best; loadByBin[best] += (valid[i].estimatedDuration || 0);
  });

  const byBin = {}, pools = {};
  // 4 premiers jours de la semaine (lun→jeu) = jours de pose candidats
  const candidateDays = days.slice(0, 4).map(d => toISO(d));
  for (let ci = 0; ci < binomes.length; ci++) {
    const pool = valid.filter((_, i) => assign[i] === ci);
    pools[binomes[ci].id] = pool;
    // jours réellement posables pour ce binôme = candidats non bloqués par une indisponibilité
    const locked = (lockedDaysByBin && lockedDaysByBin[binomes[ci].id]) || new Set();
    const poseDaysISO = candidateDays.filter(iso => !isUnavailable(unavail, binomes[ci].id, iso) && !locked.has(iso));
    if (pool.length) byBin[binomes[ci].id] = await planWeek(pool, depot, workday, days, poseDaysISO);
  }
  const ungeocoded = allChantiers.filter(c => !valid.includes(c));
  return { byBin, pools, ungeocoded };
}

/* =========================================================================
   EXTRACTION IA — appel API Anthropic depuis le navigateur
   ========================================================================= */
async function extractContractFromPDF(pdfBase64, apiKey, modelName) {
  if (!apiKey) throw new Error('Aucune clé API configurée. Va dans Paramètres pour en ajouter une.');
  const model = (modelName && modelName.trim()) || 'claude-sonnet-4-5';

  const prompt = `Tu es un assistant qui extrait des informations de contrats de pose de volets et couvertures de piscine pour l'entreprise JM Bâches.

Extrais du contrat ci-joint les informations suivantes au format JSON STRICT (rien d'autre, pas de markdown) :

{
  "clientName": "nom complet du client — à prendre dans la partie EXPÉDITION (première ligne du bloc expédition/livraison, pas dans la partie client/facturation)",
  "clientPhone": "téléphone si trouvé sinon ''",
  "clientEmail": "email si trouvé sinon ''",
  "address": "adresse complète du chantier (rue+numéro)",
  "city": "ville",
  "postalCode": "code postal",
  "type": "type de produit (ex: Volet hors-sol Silver Roll, Volet hors-sol solaire Golden Roll, Volet hors-sol avec coffre, Volet déplaçable Mouv&Roll, Volet immergé Subwater, Volet immergé Subwater Total)",
  "dimensions": "dimensions du bassin ex: 8m x 4m",
  "estimatedDuration": nombre_d_heures_estimees_pour_la_pose (volet hors-sol fixe ≈ 2.5, volet déplaçable Mouv&Roll ≈ 3.5, volet immergé Subwater ≈ 4, volet immergé Subwater Total ≈ 6),
  "materials": ["matériel spécifique requis"],
  "constraints": "contraintes particulières (accès bassin, local technique éloigné, margelles à percer, alimentation électrique, etc.)",
  "notes": "informations utiles supplémentaires en quelques mots",
  "weatherSensitive": true_ou_false
}

Si une info est absente : chaîne vide, tableau vide, ou 2.5 pour la durée. Réponds UNIQUEMENT le JSON.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: model,
      max_tokens: 1024,
      messages: [{
        role: 'user',
        content: [
          { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 } },
          { type: 'text', text: prompt },
        ],
      }],
    }),
  });

  if (!response.ok) {
    const err = await response.text();
    throw new Error('API : ' + response.status + ' — ' + err.slice(0, 200));
  }
  const data = await response.json();
  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

/* =========================================================================
   COMPOSANT PRINCIPAL
   ========================================================================= */
function App() {
  const [tab, setTab] = useState('dashboard');
  const [chantiers, setChantiers] = useState(() => sGet(SK.chantiers, null) || []);
  const [binomes, setBinomes] = useState(() => sGet(SK.binomes, DEFAULT_BINOMES));
  const [poseTypes, setPoseTypes] = useState(() => sGet(SK.settings, {})?.poseTypes || DEFAULT_POSE_TYPES);
  const [depot, setDepot] = useState(() => sGet(SK.settings, {})?.depot || { address: 'Zone artisanale, Rue les Tilleuls', postalCode: '26120', city: 'Montélier' });
  const [workday, setWorkday] = useState(() => sGet(SK.settings, {})?.workday || { start: '08:00', lunchStart: '12:00', lunchDuration: 60 });
  const [unavail, setUnavail] = useState(() => sGet(SK.settings, {})?.unavail || []);
  const [archiveMonths, setArchiveMonths] = useState(() => sGet(SK.settings, {})?.archiveMonths ?? 3);
  const [apiKey, setApiKey] = useState(() => sGet(SK.apiKey, ''));
  const [toast, setToast] = useState(null);
  const [showExportReminder, setShowExportReminder] = useState(false);
  const [autoBackup, setAutoBackup] = useState(() => { try { return localStorage.getItem('jmb_autobackup') === '1'; } catch { return false; } });

  useEffect(() => sSet(SK.chantiers, chantiers), [chantiers]);
  useEffect(() => sSet(SK.binomes, binomes), [binomes]);
  useEffect(() => sSet(SK.settings, { poseTypes, depot, workday, unavail, archiveMonths }), [poseTypes, depot, workday, unavail, archiveMonths]);
  useEffect(() => sSet(SK.apiKey, apiKey), [apiKey]);

  // Rappel d'export : si des modifications ont été enregistrées depuis le dernier export
  // (jmb_dirty_since > jmb_last_export) et qu'elles datent de plus de 2 min, on propose d'exporter.
  useEffect(() => {
    const check = () => {
      try {
        const dirty = Number(localStorage.getItem('jmb_dirty_since') || 0);
        const last = Number(localStorage.getItem('jmb_last_export') || 0);
        setShowExportReminder(dirty > last && (Date.now() - dirty) > 2 * 60 * 1000);
      } catch (e) {}
    };
    check();
    const id = setInterval(check, 60 * 1000);
    return () => clearInterval(id);
  }, [tab]);

  // Sauvegarde automatique : si activée, télécharge une sauvegarde toutes les 6 h d'utilisation
  // (et au plus une fois par session si beaucoup de temps s'est écoulé). Fichier horodaté.
  useEffect(() => {
    if (!autoBackup) return;
    const AUTO_MS = 6 * 60 * 60 * 1000;
    const tick = () => {
      try {
        const last = Number(localStorage.getItem('jmb_last_autobackup') || 0);
        if (Date.now() - last < AUTO_MS) return;
        const data = {
          _app: 'JM Bâches', _version: 1, _exportedAt: new Date().toISOString(), _auto: true,
          chantiers: sGet(SK.chantiers, []), binomes: sGet(SK.binomes, []),
          settings: sGet(SK.settings, {}), edt: sGet(SK.edt, {}),
          keys: { apiKey: sGet(SK.apiKey, ''), orsKey: sGet(SK.orsKey, '') },
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `JM_Baches_auto_${stampFile()}.json`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(url);
        localStorage.setItem('jmb_last_autobackup', String(Date.now()));
        localStorage.setItem('jmb_last_export', String(Date.now()));
        showToast('Sauvegarde automatique téléchargée');
      } catch (e) {}
    };
    const id = setInterval(tick, 10 * 60 * 1000); // vérifie toutes les 10 min
    const t0 = setTimeout(tick, 5000); // et une fois peu après le démarrage
    return () => { clearInterval(id); clearTimeout(t0); };
  }, [autoBackup]);

  const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 2800); };

  const upsertChantier = (ch) => setChantiers(prev => {
    const idx = prev.findIndex(x => x.id === ch.id);
    if (idx >= 0) { const copy = [...prev]; copy[idx] = ch; return copy; }
    return [...prev, ch];

   ================================================================ */
function exporterVersGestion(chantiers) {
  const data = chantiers.map(c => ({
    id: c.ref || c.id || '',
    poseDate: c.poseDate || c.dateISO || '',
    client: c.client || c.nom || '',
  })).filter(c => c.id && c.poseDate);
  const export_str = 'JMB_IMPORT_V1:' + JSON.stringify(data);
  function copy(text, count) {
    if(navigator.clipboard) {
      navigator.clipboard.writeText(text).then(() => {
        alert('✓ ' + count + ' date(s) copiées !\nCollez dans Gestion dossiers → Planning → "Importer depuis planning".');
      }).catch(() => fallback(text, count));
    } else { fallback(text, count); }
  }
  function fallback(text, count) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    alert('✓ ' + count + ' date(s) copiées !\nCollez dans Gestion dossiers → Planning → "Importer depuis planning".');
  }
  copy(export_str, data.length);
}
function importerDepuisGestion(setChantiers, chantiers) {
  const txt = prompt('Collez le code exporté depuis Gestion dossiers :');
  if(!txt) return;
  const prefix = 'JMB_EXPORT_V1:';
  if(!txt.trim().startsWith(prefix)) {
    alert('Format invalide. Utilisez "Exporter vers planning" dans Gestion dossiers.');
    return;
  }
  try {
    const imported = JSON.parse(txt.trim().substring(prefix.length));
    const existing = [...chantiers];
    let added = 0; let updated = 0;
    imported.forEach(item => {
      const idx = existing.findIndex(c => (c.ref||c.id) === item.id);
      if(idx >= 0) { existing[idx] = {...existing[idx], poseDate: item.poseDate}; updated++; }
      else {
        existing.push({
          id: 'jmb_' + item.id,
          ref: item.id,
          nom: item.client,
          client: item.client,
          adresse: item.adresse || '',
          postalCode: item.cp || '',
          city: item.ville || '',
          structure: item.structure || '',
          tel: item.tel || '',
          notBefore: item.dateFrom || '',
          notAfter: item.dateTo || '',
          duration: 2.5,
          statut: item.statut || '',
        });
        added++;
      }
    });
    setChantiers(existing);
    alert('Import reussi : ' + added + ' ajouté(s), ' + updated + ' mis à jour.');
  } catch(e) { alert('Erreur : ' + e.message); }
}

function Chantiers({ chantiers, binomes, poseTypes, apiKey, upsert, del, showToast, setTab, archiveMonths }) {
  const [view, setView] = useState('list');
  const [editing, setEditing] = useState(null);
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const filtered = useMemo(() => chantiers.filter(c => {
    // Les archivés ne s'affichent que via le filtre "Archivés" dédié.
    if (filter === 'archived') { if (!c.archived) return false; }
    else { if (c.archived) return false; if (filter !== 'all' && c.status !== filter) return false; }
    if (search) { const s = search.toLowerCase(); return (c.clientName + c.city + c.type + c.address).toLowerCase().includes(s); }
    return true;
  }), [chantiers, filter, search]);

  const archivedCount = useMemo(() => chantiers.filter(c => c.archived).length, [chantiers]);

  // Archivage groupé : chantiers terminés depuis plus de N mois (date planifiée comme repère).
  const archiveOld = () => {
    const months = archiveMonths ?? 3;
    const cutoff = new Date(); cutoff.setMonth(cutoff.getMonth() - months);
    const cutoffISO = toISO(cutoff);
    const toArchive = chantiers.filter(c => !c.archived && (c.status === 'fait' || c.status === 'valide') && c.scheduledDate && c.scheduledDate < cutoffISO);
    if (!toArchive.length) { showToast(`Aucun chantier terminé de plus de ${months} mois à archiver`); return; }
    if (!window.confirm(`Archiver ${toArchive.length} chantier(s) terminé(s) il y a plus de ${months} mois ?\n\nIls sortent de la liste mais restent dans les statistiques et les sauvegardes. Réversible à tout moment.`)) return;
    toArchive.forEach(c => upsert({ ...c, archived: true }));
    showToast(`${toArchive.length} chantier(s) archivé(s)`);
  };

  if (view === 'form') {
    return (
      <ChantierForm
        existing={editing}
        binomes={binomes} poseTypes={poseTypes} apiKey={apiKey}
        onSave={(c) => {
          if (Array.isArray(c)) { c.forEach(x => upsert(x)); showToast(`${c.length} chantiers liés créés`); }
          else { upsert(c); showToast(editing ? 'Chantier mis à jour' : 'Chantier créé'); }
          setEditing(null); setView('list');
        }}
        onCancel={() => { setEditing(null); setView('list'); }}
        showToast={showToast}
        goToSettings={() => setTab('parametres')}
      />
    );
  }

  return (
    <div className="pt-10 fadein">
      <div className="flex items-end justify-between mb-8 flex-wrap gap-4">
        <div>
          <div className="label-cap mb-2">Gestion</div>
          <h1 className="font-display text-5xl leading-none tracking-tight">Chantiers</h1>
        </div>
        <button onClick={() => { setEditing(null); setView('form'); }} className="btn-accent">
          <I.plus size={16} /> Nouveau chantier
        </button>
      </div>

      <div className="flex gap-3 mb-6 flex-wrap items-center">
        <div className="relative flex-1 min-w-[220px] max-w-md">
          <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--ink-faint)' }}>
            <I.search size={16} />
          </span>
          <input placeholder="Rechercher client, ville, type..." value={search} onChange={e => setSearch(e.target.value)} style={{ paddingLeft: 36 }} />
        </div>
        <div className="flex gap-1 flex-wrap">
          {[{id:'all',label:'Tous'},{id:'a_planifier',label:'À planifier'},{id:'planifie',label:'Planifiés'},{id:'en_attente',label:'En attente'},{id:'fait',label:'Terminés'},{id:'archived',label:archivedCount ? `Archivés (${archivedCount})` : 'Archivés'}].map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              className="px-3 py-2 text-xs font-mono uppercase tracking-wider rounded"
              style={{
                background: filter === f.id ? 'var(--ink)' : 'transparent',
                color: filter === f.id ? 'var(--cream)' : 'var(--ink-soft)',
                border: '1px solid ' + (filter === f.id ? 'var(--ink)' : 'var(--border)'),
                cursor: 'pointer',
              }}>{f.label}</button>
          ))}
        </div>
        <button onClick={archiveOld} className="btn-secondary" style={{ fontSize: 12, padding: '8px 12px' }} title={`Archive les chantiers terminés il y a plus de ${archiveMonths ?? 3} mois`}>
          <I.layers size={14} /> Archiver les anciens
        </button>
      </div>

      {filtered.length === 0 ? (
        <div className="card p-12 text-center"><p style={{ color: 'var(--ink-faint)' }}>Aucun chantier ne correspond.</p></div>
      ) : (
        <div className="grid md:grid-cols-2 gap-4">
          {filtered.map(c => (
            <ChantierCard key={c.id} c={c} binomes={binomes}
              onEdit={() => { setEditing(c); setView('form'); }}
              onFeedback={(patch) => { upsert({ ...c, ...patch }); }}
              onArchive={() => { upsert({ ...c, archived: !c.archived }); showToast(c.archived ? 'Chantier désarchivé' : 'Chantier archivé'); }}
              onToggleValidate={() => {
                if (c.status === 'valide') { upsert({ ...c, status: 'planifie' }); showToast('Chantier dévalidé'); }
                else if (c.scheduledDate && c.scheduledBinome) { upsert({ ...c, status: 'valide' }); showToast('Chantier validé (verrouillé)'); }
              }}
              onDelete={() => { if (confirm('Supprimer ce chantier ?')) { del(c.id); showToast('Chantier supprimé'); } }} />
          ))}
        </div>
      )}
    </div>
  );
}
