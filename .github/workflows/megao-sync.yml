name: Mégao Sync

on:
  workflow_dispatch:   # déclenchement manuel + auto-relance

permissions:
  actions: write       # nécessaire pour déclencher le workflow suivant

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer les dépendances
        run: npm install
        working-directory: scripts

      - name: Lancer la sync Mégao
        working-directory: scripts
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node megao-sync.js

      - name: Planifier la prochaine sync dans 15 min
        if: always()   # relancer même si la sync a échoué
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 900
          gh workflow run megao-sync.yml --ref main
